<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SURVIVAL REALMS · SPIDER INFESTATION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #1a1a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .hud {
            position: fixed;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 16px;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            z-index: 20;
            border-left: 3px solid #0f0;
            pointer-events: none;
        }
        .stats-right {
            position: fixed;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 16px;
            color: #ffaa44;
            font-family: monospace;
            font-size: 11px;
            z-index: 20;
            text-align: right;
            pointer-events: none;
        }
        .inventory-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            z-index: 30;
            border: 1px solid gold;
            overflow-x: auto;
            max-width: 95%;
        }
        .inv-slot {
            background: #2a2a2a;
            padding: 6px 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            min-width: 65px;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #555;
        }
        .inv-slot:active { transform: scale(0.95); background: #3a6a3a; }
        .selected { background: #3a8a3a; border: 2px solid #ffcc44; box-shadow: 0 0 10px gold; }
        .day-cycle {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            font-size: 11px;
        }
        .action-buttons {
            position: fixed;
            bottom: 100px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 30;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #2a3a2a;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
        }
        .action-btn.active {
            background: #3a8a3a;
            border: 1px solid gold;
            box-shadow: 0 0 8px gold;
        }
        .shop-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1aee;
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 30px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            border: 2px solid gold;
            min-width: 200px;
        }
        .shop-panel button {
            background: #3a4a3a;
            border: none;
            padding: 10px;
            border-radius: 20px;
            color: gold;
            font-weight: bold;
            cursor: pointer;
        }
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a, #0a0a0a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-family: monospace;
        }
        .start-title { font-size: 42px; color: #0f0; text-shadow: 0 0 20px green; margin-bottom: 10px; letter-spacing: 4px; }
        .start-sub { color: #aaa; margin-bottom: 20px; font-size: 12px; text-align: center; padding: 0 20px; }
        .start-btns { display: flex; gap: 20px; }
        .start-btn { background: #2a6a2a; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .load-btn { background: #3a4a6a; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .event-toast {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: black;
            color: cyan;
            padding: 8px 18px;
            border-radius: 40px;
            z-index: 150;
            font-weight: bold;
            animation: fadeUp 2s forwards;
            pointer-events: none;
            white-space: nowrap;
            font-size: 12px;
        }
        @keyframes fadeUp { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%,-80%); } }
        .mode-indicator {
            position: fixed;
            top: 80px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: cyan;
            z-index: 20;
        }
        .hunger-bar {
            position: fixed;
            top: 55px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            color: #ffaa66;
            z-index: 20;
        }
        .weapon-slot {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: gold;
            z-index: 20;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="hud" id="hudStats">❤️ 500/500 | ⚔️ DMG 1 | 🧪 L1 | ✨ 0/100</div>
<div class="stats-right" id="statsRight">🪙 10 | 🪵 0 | 🪨 0</div>
<div class="hunger-bar" id="hungerBar">🍗 HUNGER: 100%</div>
<div class="weapon-slot" id="weaponSlot">🗡️ WEAPON: Fists</div>
<div class="inventory-bar" id="inventoryBar"></div>
<div class="day-cycle" id="dayCycle">🌞 DAY 1</div>
<div class="action-buttons">
    <button class="action-btn" id="shopWeaponBtn">🛒 WEAPONS</button>
    <button class="action-btn" id="buildBtn">🏗️ BUILD</button>
    <button class="action-btn" id="fishBtn">🎣 FISH</button>
    <button class="action-btn" id="saveBtn">💾 SAVE</button>
</div>
<div class="shop-panel" id="weaponShop">
    <button id="buySpear">🗡️ SPEAR (50🪙) +5 DMG</button>
    <button id="buySword">⚔️ SWORD (100🪙) +12 DMG</button>
    <button id="buyCrossbow">🏹 CROSSBOW (200🪙) +25 DMG</button>
    <button id="closeShop">❌ CLOSE</button>
</div>
<div class="mode-indicator" id="modeIndicator">📍 MOVE MODE</div>
<div class="start-overlay" id="startOverlay">
    <div class="start-title">⚙️ SURVIVAL REALMS ⚙️</div>
    <div class="start-sub">spiders everywhere | buy weapons | fight to survive</div>
    <div class="start-btns">
        <button class="start-btn" id="startBtn">▶ NEW GAME</button>
        <button class="load-btn" id="loadBtn">📀 LOAD SAVE</button>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let gameRunning = false;
        
        const WORLD_SIZE = 6000;
        let camera = { x: 0, y: 0 };
        let attackAnimation = 0;
        let currentWeapon = { name: "Fists", damage: 0, bonus: 0 };
        
        let player = {
            x: WORLD_SIZE/2, y: WORLD_SIZE/2,
            hp: 500, maxHp: 500,
            baseDamage: 1,
            level: 1, xp: 0, xpNeeded: 100,
            coins: 15,
            wood: 0, stone: 0,
            hunger: 100,
            food: { Fish: 4, Berry: 8 }
        };
        
        let inventory = {
            seeds: { Pumpkin: 5, Apple: 3, Corn: 6, Wheat: 4, Carrot: 5 },
            selectedCrop: "Pumpkin"
        };
        
        let trees = [];
        let rocks = [];
        let enemies = [];
        let structures = [];
        let particles = [];
        
        let targetX = null, targetY = null;
        let dayCount = 1;
        let timeOfDay = 0;
        let isNight = false;
        let campfireX = player.x, campfireY = player.y;
        let enemyRespawnTimer = 0;
        let eventTimer = 0;
        
        function getTotalDamage() { return player.baseDamage + currentWeapon.bonus; }
        
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        function updateCamera() { camera.x = player.x - width/2.5; camera.y = player.y - height/2.5; camera.x = Math.min(Math.max(camera.x, 0), WORLD_SIZE - width); camera.y = Math.min(Math.max(camera.y, 0), WORLD_SIZE - height); }
        function worldToScreen(wx, wy) { return { x: wx - camera.x, y: wy - camera.y }; }
        
        function showToast(msg) { let div = document.createElement('div'); div.className = 'event-toast'; div.innerText = msg; document.body.appendChild(div); setTimeout(()=>div.remove(), 2000); }
        
        function updateUI() {
            document.getElementById('hudStats').innerHTML = `❤️ ${Math.floor(player.hp)}/${player.maxHp} | ⚔️ DMG ${getTotalDamage()} | 🧪 L${player.level} | ✨ ${player.xp}/${player.xpNeeded}`;
            document.getElementById('statsRight').innerHTML = `🪙 ${Math.floor(player.coins)} | 🪵 ${player.wood} | 🪨 ${player.stone}`;
            document.getElementById('hungerBar').innerHTML = `🍗 HUNGER: ${Math.floor(player.hunger)}%`;
            document.getElementById('weaponSlot').innerHTML = `🗡️ WEAPON: ${currentWeapon.name} (+${currentWeapon.bonus} DMG)`;
            document.getElementById('dayCycle').innerHTML = isNight ? `🌙 NIGHT ${dayCount} 🔥` : `🌞 DAY ${dayCount}`;
            let bar = document.getElementById('inventoryBar');
            bar.innerHTML = '';
            let foodSlot = document.createElement('div'); foodSlot.className = `inv-slot`; foodSlot.innerHTML = `🐟 Fish<br>${player.food.Fish}`; foodSlot.onclick = () => { if(player.food.Fish > 0) { player.food.Fish--; player.hunger = Math.min(100, player.hunger+20); updateUI(); } }; bar.appendChild(foodSlot);
            let berrySlot = document.createElement('div'); berrySlot.className = `inv-slot`; berrySlot.innerHTML = `🍓 Berry<br>${player.food.Berry}`; berrySlot.onclick = () => { if(player.food.Berry > 0) { player.food.Berry--; player.hunger = Math.min(100, player.hunger+10); updateUI(); } }; bar.appendChild(berrySlot);
            for(let [crop, amount] of Object.entries(inventory.seeds)) {
                let slot = document.createElement('div'); slot.className = `inv-slot ${inventory.selectedCrop === crop ? 'selected' : ''}`; slot.innerHTML = `🌱 ${crop}<br>${amount}`;
                slot.onclick = (e) => { e.stopPropagation(); inventory.selectedCrop = crop; updateUI(); showToast(`Selected ${crop} seeds`); };
                bar.appendChild(slot);
            }
        }
        
        function addXP(amount) {
            player.xp += amount;
            while(player.xp >= player.xpNeeded) {
                player.xp -= player.xpNeeded;
                player.level++;
                player.baseDamage++;
                player.maxHp += 25;
                player.hp = player.maxHp;
                player.xpNeeded = Math.floor(100 + player.level * 15);
                showToast(`⚡ LEVEL UP! L${player.level} +DMG +HP`);
            }
            updateUI();
        }
        
        function saveGame() {
            let save = { player: { x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp, baseDamage: player.baseDamage, level: player.level, xp: player.xp, coins: player.coins, wood: player.wood, stone: player.stone, hunger: player.hunger, food: player.food }, inventory: inventory, dayCount: dayCount, timeOfDay: timeOfDay, structures: structures, currentWeapon: currentWeapon };
            localStorage.setItem('survivalRealmSave', JSON.stringify(save));
            showToast("💾 GAME SAVED!");
        }
        
        function loadGame() {
            let saveData = localStorage.getItem('survivalRealmSave');
            if(!saveData) { showToast("No save found!"); return false; }
            let save = JSON.parse(saveData);
            player = { ...player, ...save.player };
            inventory = save.inventory;
            dayCount = save.dayCount;
            timeOfDay = save.timeOfDay;
            structures = save.structures;
            if(save.currentWeapon) currentWeapon = save.currentWeapon;
            for(let s of structures) if(s.type === 'campfire') { campfireX = s.x; campfireY = s.y; }
            showToast("📀 GAME LOADED!");
            updateUI();
            return true;
        }
        
        function spawnWorld() {
            for(let i=0;i<120;i++) { trees.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, tapsNeeded: 8, tapsRemaining: 8 }); rocks.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, tapsNeeded: 8, tapsRemaining: 8 }); }
            for(let i=0;i<8;i++) spawnEnemy();
            updateUI();
        }
        
        function spawnEnemy() {
            let angle = Math.random() * Math.PI * 2;
            let dist = 400 + Math.random() * 350;
            let x = player.x + Math.cos(angle)*dist, y = player.y + Math.sin(angle)*dist;
            x = Math.min(Math.max(x, 50), WORLD_SIZE-50); y = Math.min(Math.max(y, 50), WORLD_SIZE-50);
            let spiderTypes = ["BROWN SPIDER", "BLACK SPIDER", "POISON SPIDER", "FANG SPIDER"];
            let type = spiderTypes[Math.floor(Math.random()*spiderTypes.length)];
            enemies.push({ x, y, hp: 50, maxHp: 50, damage: 2, radius: 20, speed: 38, attackCooldown: 0, type });
        }
        
        function buyWeapon(name, cost, bonus) {
            if(player.coins >= cost) {
                player.coins -= cost;
                currentWeapon = { name: name, bonus: bonus, damage: bonus };
                showToast(`🔪 Bought ${name}! +${bonus} DMG`);
                updateUI();
                document.getElementById('weaponShop').style.display = 'none';
            } else { showToast(`Need ${cost} coins!`); }
        }
        
        function updateGame(delta) {
            if(!gameRunning) return;
            if(delta > 0.033) delta = 0.033;
            
            timeOfDay += delta / 140;
            if(timeOfDay >= 1) { timeOfDay = 0; dayCount++; isNight = false; showToast("🌅 DAYBREAK"); updateUI(); }
            isNight = timeOfDay > 0.55;
            
            player.hunger -= 0.4 * delta;
            if(player.hunger <= 0) { player.hp -= 2 * delta; player.hunger = 0; if(player.hp <= 0) { gameRunning = false; alert("You starved!"); location.reload(); } }
            if(player.hunger > 100) player.hunger = 100;
            
            let nearCampfire = false;
            for(let s of structures) if(s.type === 'campfire' && Math.hypot(player.x - s.x, player.y - s.y) < 150) nearCampfire = true;
            
            if(targetX !== null && targetY !== null) {
                let dx = targetX - player.x, dy = targetY - player.y;
                if(Math.hypot(dx,dy) < 30) { targetX = null; targetY = null; }
                else {
                    let angle = Math.atan2(dy,dx);
                    let speed = 210;
                    player.x += Math.cos(angle) * speed * delta;
                    player.y += Math.sin(angle) * speed * delta;
                    player.x = Math.min(Math.max(player.x, 35), WORLD_SIZE-35);
                    player.y = Math.min(Math.max(player.y, 35), WORLD_SIZE-35);
                }
            }
            
            // Attack animation
            if(attackAnimation > 0) attackAnimation -= delta * 4;
            
            // Auto combat + enemies
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let dist = Math.hypot(e.x - player.x, e.y - player.y);
                if(dist < 260 && !(nearCampfire && isNight)) {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    e.x += Math.cos(angle) * e.speed * delta;
                    e.y += Math.sin(angle) * e.speed * delta;
                    if(dist < 45) {
                        if(e.attackCooldown <= 0) { player.hp -= e.damage; e.attackCooldown = 0.9; if(player.hp <= 0) { gameRunning = false; alert("GAME OVER"); location.reload(); } updateUI(); }
                        // Auto attack with weapon animation
                        e.hp -= getTotalDamage() * delta * 4;
                        attackAnimation = 0.3;
                        if(e.hp <= 0) {
                            enemies.splice(i,1); i--;
                            let gain = 15+player.level*2;
                            addXP(gain); player.coins += 3+Math.floor(Math.random()*5);
                            updateUI(); showToast(`+${gain} XP +🪙`);
                            for(let p=0;p<10;p++) particles.push({ x: e.x, y: e.y, life: 0.5, vx: (Math.random()-0.5)*50, vy: (Math.random()-0.5)*50 });
                        }
                    }
                }
                if(e.attackCooldown > 0) e.attackCooldown -= delta;
            }
            
            // Resource respawn
            enemyRespawnTimer += delta;
            if(enemyRespawnTimer > 55 && gameRunning) {
                enemyRespawnTimer = 0;
                let toSpawn = 3 + Math.floor(Math.random()*5);
                for(let i=0;i<toSpawn;i++) spawnEnemy();
                // respawn trees & rocks
                if(trees.length < 80) trees.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, tapsNeeded: 8, tapsRemaining: 8 });
                if(rocks.length < 80) rocks.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, tapsNeeded: 8, tapsRemaining: 8 });
                showToast(`🕷️ Spiders emerge from shadows!`);
            }
            
            // Particles
            for(let i=0;i<particles.length;i++) { particles[i].life -= delta; if(particles[i].life<=0) particles.splice(i,1), i--; else { particles[i].x += particles[i].vx * delta; particles[i].y += particles[i].vy * delta; } }
            
            eventTimer += delta;
            if(eventTimer > 60 && gameRunning) {
                eventTimer = 0;
                let r = Math.random();
                if(r<0.3) { player.coins += 12; showToast("💰 WANDERING TRADER +12 coins"); updateUI(); }
                else if(r<0.6) { addXP(20); showToast("✨ MYSTIC SHRINE +20 XP"); }
                else { for(let i=0;i<3;i++) spawnEnemy(); showToast("💀 SPIDER NEST DISTURBED!"); }
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,width,height);
            // SOLID STONE GROUND
            ctx.fillStyle = "#2a2a2a"; ctx.fillRect(0,0,width,height);
            // Stone pattern
            for(let i=0;i<600;i++) { ctx.fillStyle = `rgba(60,60,70,0.5)`; ctx.fillRect(((i*73)%width), ((i*41)%height), 4,4); }
            for(let i=0;i<200;i++) { ctx.fillStyle = `rgba(80,80,90,0.4)`; ctx.fillRect(((i*131)%width), ((i*89)%height), 2,2); }
            
            // Trees
            for(let t of trees) { let s=worldToScreen(t.x,t.y); ctx.fillStyle="#4a3a2a"; ctx.fillRect(s.x-8,s.y-15,16,30); ctx.fillStyle="#2a8c2a"; ctx.beginPath(); ctx.arc(s.x,s.y-18,14,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText(`${t.tapsRemaining}`, s.x-4,s.y-26); }
            // Rocks (BLACK)
            for(let r of rocks) { let s=worldToScreen(r.x,r.y); ctx.fillStyle="#111"; ctx.fillRect(s.x-10,s.y-7,20,14); ctx.fillStyle="#333"; ctx.fillRect(s.x-8,s.y-5,16,10); ctx.fillStyle="white"; ctx.fillText(`${r.tapsRemaining}`, s.x-4,s.y-12); }
            
            // Spiders
            for(let e of enemies) {
                let s=worldToScreen(e.x,e.y);
                ctx.fillStyle = "#2a1a1a";
                ctx.beginPath(); ctx.ellipse(s.x,s.y,18,14,0,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "#4a2a2a";
                for(let leg=0;leg<8;leg++) { let angle = Math.PI*2*leg/8; ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x+Math.cos(angle)*22, s.y+Math.sin(angle)*12); ctx.lineWidth=3; ctx.stroke(); }
                ctx.fillStyle = "#aa3333"; ctx.beginPath(); ctx.arc(s.x-6,s.y-4,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(s.x+6,s.y-4,3,0,Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.fillRect(s.x-15,s.y-18, (e.hp/e.maxHp)*30,4);
                ctx.fillStyle = "white"; ctx.font="9px monospace"; ctx.fillText(e.type[0], s.x-4,s.y-12);
            }
            
            // Structures
            for(let s of structures) { let scr=worldToScreen(s.x,s.y); if(s.type==='wall'){ ctx.fillStyle="#aa8866"; ctx.fillRect(scr.x-15,scr.y-10,30,20); } else if(s.type==='campfire'){ ctx.fillStyle="#ff6600"; ctx.beginPath(); ctx.arc(scr.x,scr.y,18,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#ffcc44"; ctx.beginPath(); ctx.arc(scr.x,scr.y,8,0,Math.PI*2); ctx.fill(); } }
            
            let campPos = worldToScreen(campfireX, campfireY);
            ctx.globalAlpha=0.2; ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(campPos.x,campPos.y,130,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
            
            // Player with weapon animation
            let ps = worldToScreen(player.x, player.y);
            // Attack swing
            if(attackAnimation > 0) {
                ctx.beginPath(); ctx.moveTo(ps.x+15, ps.y-5); ctx.lineTo(ps.x+45, ps.y-15); ctx.lineTo(ps.x+40, ps.y+5); ctx.fillStyle = "rgba(255,200,100,0.8)"; ctx.fill();
            }
            ctx.fillStyle="#3a6ea5"; ctx.fillRect(ps.x-12,ps.y-8,24,32);
            ctx.fillStyle="#e8c8a0"; ctx.beginPath(); ctx.arc(ps.x,ps.y-14,14,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#5a3a2a"; ctx.fillRect(ps.x-12,ps.y-26,24,14);
            ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(ps.x-6,ps.y-17,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(ps.x+6,ps.y-17,3,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#2a3a5a"; ctx.beginPath(); ctx.arc(ps.x-6,ps.y-17,1.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(ps.x+6,ps.y-17,1.5,0,Math.PI*2); ctx.fill();
            // Weapon in hand
            if(currentWeapon.name === "Spear") { ctx.fillStyle="#8a6a4a"; ctx.fillRect(ps.x+12,ps.y-12,25,5); ctx.fillStyle="#aaa"; ctx.fillRect(ps.x+32,ps.y-13,8,7); }
            else if(currentWeapon.name === "Sword") { ctx.fillStyle="#ccaa88"; ctx.fillRect(ps.x+12,ps.y-14,28,6); ctx.fillStyle="#ffcc44"; ctx.fillRect(ps.x+35,ps.y-16,10,10); }
            else if(currentWeapon.name === "Crossbow") { ctx.fillStyle="#8a6a4a"; ctx.fillRect(ps.x+12,ps.y-15,30,10); ctx.fillStyle="#aaa"; ctx.fillRect(ps.x+38,ps.y-13,12,6); }
            ctx.fillStyle="white"; ctx.font="bold 9px monospace"; ctx.fillText("SURVIVOR", ps.x-20, ps.y-30);
            
            for(let p of particles) { let s=worldToScreen(p.x,p.y); ctx.fillStyle=`rgba(200,50,50,${p.life*0.8})`; ctx.fillRect(s.x-2,s.y-2,4,4); }
        }
        
        function handleTap(e) {
            if(!gameRunning) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let sx = (e.touches ? e.touches[0].clientX : e.clientX);
            let sy = (e.touches ? e.touches[0].clientY : e.clientY);
            let wx = camera.x + sx, wy = camera.y + sy;
            targetX = wx; targetY = wy;
            // Harvest trees/rocks on tap
            for(let i=0;i<trees.length;i++) { if(Math.hypot(wx - trees[i].x, wy - trees[i].y) < 50) { trees[i].tapsRemaining -= getTotalDamage(); if(trees[i].tapsRemaining<=0) { trees.splice(i,1); player.wood+=5+Math.floor(Math.random()*4); showToast(`+${5}🪵`); updateUI(); } return; } }
            for(let i=0;i<rocks.length;i++) { if(Math.hypot(wx - rocks[i].x, wy - rocks[i].y) < 50) { rocks[i].tapsRemaining -= getTotalDamage(); if(rocks[i].tapsRemaining<=0) { rocks.splice(i,1); player.stone+=3+Math.floor(Math.random()*3); showToast(`+${3}🪨`); updateUI(); } return; } }
        }
        
        document.getElementById('shopWeaponBtn').onclick = () => { document.getElementById('weaponShop').style.display = 'flex'; };
        document.getElementById('buySpear').onclick = () => buyWeapon("Spear", 50, 5);
        document.getElementById('buySword').onclick = () => buyWeapon("Sword", 100, 12);
        document.getElementById('buyCrossbow').onclick = () => buyWeapon("Crossbow", 200, 25);
        document.getElementById('closeShop').onclick = () => document.getElementById('weaponShop').style.display = 'none';
        document.getElementById('buildBtn').onclick = () => showToast("🏗️ Build system coming soon!");
        document.getElementById('fishBtn').onclick = () => { if(Math.random()>0.5) { player.food.Fish++; showToast("🐟 Caught a fish!"); updateUI(); } else showToast("❌ Nothing bites..."); };
        document.getElementById('saveBtn').onclick = () => saveGame();
        document.getElementById('startBtn').onclick = () => { gameRunning = true; document.getElementById('startOverlay').style.display = 'none'; spawnWorld(); updateUI(); };
        document.getElementById('loadBtn').onclick = () => { if(loadGame()) { gameRunning = true; document.getElementById('startOverlay').style.display = 'none'; } };
        
        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('mousedown', handleTap);
        window.addEventListener('resize', ()=>{ resize(); updateCamera(); });
        resize();
        let lastTime=0;
        function loop(now) { let delta = Math.min(0.033, (now-lastTime)/1000); if(delta>0.01 && gameRunning) { updateGame(delta); updateCamera(); draw(); } lastTime=now; requestAnimationFrame(loop); }
        loop(performance.now());
        setInterval(()=>{ if(gameRunning) updateUI(); }, 100);
    })();
</script>
</body>
</html>
