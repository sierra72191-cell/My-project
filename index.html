<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON RUSH: GLITCH EDITION</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --glitch-red: #ff0044; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; padding-top: 60px;
            z-index: 5;
        }
        .score-box { font-size: 40px; color: var(--neon); text-shadow: 0 0 20px var(--neon); font-weight: 900; letter-spacing: 2px; transition: 0.1s; }
        .combo-text { font-size: 30px; color: var(--pink); opacity: 0; transition: 0.2s; transform: translateY(10px); text-shadow: 0 0 15px var(--pink); }
        .combo-active { opacity: 1; transform: translateY(0); }

        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center;
        }
        .logo { font-size: 3.5rem; margin: 0; background: linear-gradient(to bottom, var(--neon), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--neon)); font-weight: 900; }
        .best-score { color: #555; margin-top: 10px; font-size: 1.2rem; letter-spacing: 3px; }
        button {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 18px 50px; font-size: 22px; cursor: pointer; border-radius: 4px;
            box-shadow: 0 0 15px var(--neon); margin-top: 40px; transition: 0.3s;
            text-transform: uppercase; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="logo">NEON RUSH</h1>
        <div class="best-score">HIGH SCORE: <span id="best">0</span></div>
        <button onclick="bootGame()">INITIALIZE ENGINE</button>
    </div>

    <div id="ui-layer">
        <div class="score-box" id="scoreDisplay">0000</div>
        <div class="combo-text" id="comboDisplay">COMBO X2</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const bestDisplay = document.getElementById('best');

        let score = 0, combo = 0, isActive = false, frameCount = 0;
        let speed = 8, shake = 0, glitchIntensity = 0;
        let bestScore = localStorage.getItem('trance_best_v2') || 0;
        
        let tiles = [], particles = [];
        const lanes = 4;
        let laneW, canvasW, canvasH;

        let audioCtx;
        const scale = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63];

        bestDisplay.innerText = bestScore;

        function resize() {
            canvasW = canvas.width = window.innerWidth * window.devicePixelRatio;
            canvasH = canvas.height = window.innerHeight * window.devicePixelRatio;
            laneW = canvasW / lanes;
        }
        window.addEventListener('resize', resize);
        resize();

        class Tile {
            constructor(lane) {
                this.lane = lane;
                this.x = lane * laneW;
                this.y = -400;
                this.h = 320;
                this.active = true;
                this.color = `hsl(${180 + (Math.random() * 100)}, 100%, 60%)`;
            }
            update() { this.y += speed; }
            draw(offsetY = 0, offsetX = 0) {
                if (!this.active) return;
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x + 12 + offsetX, this.y + offsetY, laneW - 24, this.h);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.globalAlpha = 0.4;
                ctx.strokeRect(this.x + 30 + offsetX, this.y + 30 + offsetY, laneW - 60, this.h - 60);
                ctx.restore();
            }
        }

        function triggerAudio(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = (type === 'bass') ? 'sawtooth' : 'triangle';
            const freq = scale[Math.floor(Math.random() * scale.length)];
            osc.frequency.setValueAtTime(type === 'bass' ? freq / 2 : freq * 1.5, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function createBurst(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 0.5) * 25,
                    life: 1.0,
                    color
                });
            }
        }

        function bootGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
            score = 0; speed = 8; combo = 0; glitchIntensity = 0;
            tiles = []; particles = [];
            scoreDisplay.innerText = "0000";
            isActive = true;
            updateLoop();
        }

        function gameOver() {
            isActive = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('trance_best_v2', score);
            }
            bestDisplay.innerText = bestScore;
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('.logo').innerText = "VIBE LOST";
            comboDisplay.classList.remove('combo-active');
        }

        function updateLoop() {
            if (!isActive) return;

            // GLITCH LOGIC
            glitchIntensity = Math.min(score / 5000, 1); // Max glitch at 5000 score
            const isGlitching = Math.random() < (0.05 * glitchIntensity);
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; 
            ctx.fillRect(0, 0, canvasW, canvasH);
            
            if (shake > 0 || isGlitching) {
                let s = shake + (isGlitching ? 20 * glitchIntensity : 0);
                ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
                shake *= 0.92;
            }

            // Draw Background static during glitch
            if (isGlitching) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                for(let i=0; i<10; i++) ctx.fillRect(Math.random()*canvasW, Math.random()*canvasH, canvasW, 2);
            }

            // Spawn Tiles
            if (frameCount % Math.floor(Math.max(12, 45 - speed)) === 0) {
                tiles.push(new Tile(Math.floor(Math.random() * lanes)));
            }

            for (let i = tiles.length - 1; i >= 0; i--) {
                let t = tiles[i];
                t.update();
                
                // Chromatic Aberration Effect on tiles during Glitch
                if (isGlitching) {
                    ctx.globalCompositeOperation = 'screen';
                    t.draw(0, 5); // Red offset
                    ctx.fillStyle = '#ff0044';
                    t.draw(0, -5); // Cyan offset
                    ctx.globalCompositeOperation = 'source-over';
                } else {
                    t.draw();
                }

                if (t.y > canvasH) {
                    if (t.active) gameOver();
                    tiles.splice(i, 1);
                }
            }

            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 6, 6);
                if (p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;

            frameCount++;
            speed += 0.002;
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            requestAnimationFrame(updateLoop);
        }

        const handleInput = (clientX, clientY) => {
            if (!isActive) return;
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * (canvasW / rect.width);
            const y = (clientY - rect.top) * (canvasH / rect.height);
            
            let hit = false;
            tiles.forEach(t => {
                if (t.active && x > t.x && x < t.x + laneW && y > t.y - 100 && y < t.y + t.h + 100) {
                    t.active = false;
                    hit = true;
                    score += 10 + (combo * 2);
                    combo++;
                    shake = 18;
                    
                    scoreDisplay.innerText = score.toString().padStart(4, '0');
                    if (combo > 4) {
                        comboDisplay.innerText = `COMBO X${Math.floor(combo/4) + 1}`;
                        comboDisplay.classList.add('combo-active');
                    }
                    
                    createBurst(x, y, t.color);
                    triggerAudio(combo % 8 === 0 ? 'bass' : 'lead');
                }
            });

            if (!hit && y > canvasH * 0.4) {
                gameOver();
            }
        };

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY);
        }, {passive: false});

        canvas.addEventListener('mousedown', (e) => {
            handleInput(e.clientX, e.clientY);
        });

    </script>
</body>
</html>
