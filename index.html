<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · LIVING WORLD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000814; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        #stats { padding: 15px; color: #00fbff; text-shadow: 0 0 8px #00fbff; font-weight: bold; background: rgba(0,0,0,0.3); }
        #controls {
            padding: 15px; display: flex; gap: 10px; pointer-events: auto;
            background: linear-gradient(transparent, #001529);
        }
        .btn {
            background: rgba(0, 51, 102, 0.9); color: white; border: 2px solid #00fbff;
            padding: 20px 10px; border-radius: 12px; flex: 1; text-align: center;
            font-size: 14px; font-weight: bold; text-transform: uppercase;
        }
        .btn:active { background: #00fbff; color: #000; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="stats">
            HEALTH: <span id="hp">100%</span> | COINS: <span id="coins">0</span> | FRIENDS: <span id="fcount">0</span>
        </div>
        <div id="controls">
            <div class="btn" onclick="spawnPet('Protector', 5)">Summon Protector (5c)</div>
            <div class="btn" onclick="spawnPet('Scout', 10)">Summon Scout (10c)</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let world = { width: 5000, height: 5000 };
    let cam = { x: 0, y: 0 };
    let coins = 0;
    let fish = { x: 2500, y: 2500, tx: 2500, ty: 2500, angle: 0, size: 18, hp: 100 };
    let entities = []; // Coins, Enemies, Pets

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function spawnPet(type, cost) {
        if (coins >= cost) {
            coins -= cost;
            entities.push({ type: 'pet', x: fish.x, y: fish.y, petType: type, v: 0 });
            updateUI();
        }
    }

    // Input Handling
    function handleInput(e) {
        let x = (e.clientX || e.touches[0].clientX) + cam.x;
        let y = (e.clientY || e.touches[0].clientY) + cam.y;
        
        // Check if clicking enemy
        let hitEnemy = false;
        entities.forEach(en => {
            if(en.type === 'enemy' && Math.hypot(en.x - x, en.y - y) < 40) {
                en.dead = true;
                hitEnemy = true;
                coins += 2;
            }
        });

        if(!hitEnemy) { fish.tx = x; fish.ty = y; }
        updateUI();
    }

    window.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('mousedown', handleInput);

    function updateUI() {
        document.getElementById('coins').innerText = coins;
        document.getElementById('fcount').innerText = entities.filter(e => e.type === 'pet').length;
    }

    // Main Game Loop
    function loop() {
        // Camera follows fish
        cam.x = fish.x - canvas.width/2;
        cam.y = fish.y - canvas.height/2;

        // Fish Movement
        fish.x += (fish.tx - fish.x) * 0.04;
        fish.y += (fish.ty - fish.y) * 0.04;
        fish.angle = Math.atan2(fish.ty - fish.y, fish.tx - fish.x);

        // Spawn logic
        if(Math.random() < 0.02 && entities.length < 100) {
            let rx = fish.x + (Math.random()-0.5) * 1500;
            let ry = fish.y + (Math.random()-0.5) * 1500;
            entities.push({ type: Math.random() < 0.3 ? 'enemy' : 'coin', x: rx, y: ry });
        }

        ctx.fillStyle = '#000814';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw World Grid
        ctx.strokeStyle = 'rgba(0, 251, 255, 0.05)';
        for(let i=0; i<world.width; i+=200) {
            ctx.beginPath(); ctx.moveTo(i-cam.x, 0-cam.y); ctx.lineTo(i-cam.x, world.height-cam.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0-cam.x, i-cam.y); ctx.lineTo(world.width-cam.x, i-cam.y); ctx.stroke();
        }

        entities = entities.filter(en => {
            let dist = Math.hypot(fish.x - en.x, fish.y - en.y);
            
            if(en.type === 'coin' && dist < 40) { coins++; updateUI(); return false; }
            
            if(en.type === 'pet') {
                let target = fish;
                // If enemy nearby, protectors attack!
                let enemy = entities.find(e => e.type === 'enemy' && Math.hypot(e.x - en.x, e.y - en.y) < 300);
                if(enemy && en.petType === 'Protector') target = enemy;
                
                en.x += (target.x - en.x) * 0.06;
                en.y += (target.y - en.y) * 0.06;
                if(enemy && Math.hypot(en.x - enemy.x, en.y - enemy.y) < 30) enemy.dead = true;
            }

            if(en.type === 'enemy') {
                if(en.dead) return false;
                en.x += Math.sin(Date.now()/500) * 2; // Drifting
            }

            // Drawing
            ctx.save();
            ctx.translate(en.x - cam.x, en.y - cam.y);
            if(en.type === 'coin') {
                ctx.fillStyle = '#ffd700'; ctx.shadowBlur = 10; ctx.shadowColor = 'gold';
                ctx.beginPath(); ctx.arc(0,0, 6, 0, 7); ctx.fill();
            } else if(en.type === 'enemy') {
                ctx.fillStyle = '#ff3300'; ctx.beginPath();
                for(let i=0; i<6; i++) { ctx.lineTo(Math.cos(i)*15, Math.sin(i)*15); ctx.lineTo(Math.cos(i+0.5)*5, Math.sin(i+0.5)*5); }
                ctx.fill();
            } else if(en.type === 'pet') {
                ctx.rotate(fish.angle);
                ctx.fillStyle = en.petType === 'Protector' ? '#ff4444' : '#44ff88';
                ctx.beginPath(); ctx.ellipse(0,0, 10, 6, 0, 0, 7); ctx.fill();
            }
            ctx.restore();
            return true;
        });

        // Draw Main Fish
        ctx.save();
        ctx.translate(fish.x - cam.x, fish.y - cam.y);
        ctx.rotate(fish.angle);
        ctx.fillStyle = '#00fbff';
        ctx.shadowBlur = 20; ctx.shadowColor = '#00fbff';
        // Tail
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-25, 10); ctx.lineTo(-25, -10); ctx.fill();
        // Body
        ctx.beginPath(); ctx.ellipse(0, 0, 22, 15, 0, 0, 7); ctx.fill();
        // Eye
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(10, -5, 5, 0, 7); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(12, -5, 2, 0, 7); ctx.fill();
        ctx.restore();

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
