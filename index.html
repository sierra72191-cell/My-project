<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Abyssal Neon: Visual Chaos</title>
    <style>
        * { user-select: none; touch-action: none; box-sizing: border-box; }
        body { margin: 0; background: #000428; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #004e92, #000428); transition: filter 0.3s; }

        .overlay {
            position: absolute; top: 15px; left: 15px;
            color: #00f2ff; text-shadow: 0 0 8px rgba(0,0,0,0.8);
            pointer-events: none; z-index: 10;
        }
        .hp-cont { width: 180px; height: 10px; background: rgba(0,0,0,0.4); border: 1px solid #00f2ff; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: #00ff88; width: 100%; transition: width 0.2s; }
        
        .stats-right { position: absolute; top: 15px; right: 15px; text-align: right; color: #fff; font-size: 14px; pointer-events: none; }

        /* Visual FX Layers */
        #fxOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.2s; }
        .ink-fx { background: radial-gradient(circle, transparent 20%, #000 80%); }
        .shock-fx { background: #fff; }
        .dark-fx { background: #000; }
        
        @keyframes strobe { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .strobing { animation: strobe 0.1s infinite; }
    </style>
</head>
<body>

<div id="fxOverlay"></div>

<div class="overlay">
    <div style="font-weight: bold; letter-spacing: 1px;">NEON PREDATOR [LVL <span id="lvl">1</span>]</div>
    <div class="hp-cont"><div class="hp-fill" id="hpBar"></div></div>
    <div id="timer" style="font-size: 11px; margin-top: 4px; opacity: 0.8;">SURVIVED: 0s</div>
    <div style="font-size: 10px; color: #add8e6;">REGEN: 1 HP/s | AURA: <span id="auraStat">77</span>m</div>
</div>

<div class="stats-right">
    💀 <span id="kills">0</span><br>
    <span style="font-size: 11px; color: #ffd700;">XP: <span id="xpStat">0</span></span><br>
    <span id="coord" style="font-size: 10px; opacity: 0.5;">X: 0 Y: 0</span>
</div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);

const WORLD_SIZE = 12000;
let cam = { x: 0, y: 0 };
let player = {
    x: 6000, y: 6000, hp: 100, maxHp: 100,
    lvl: 1, kills: 0, xp: 0, size: 22, speed: 2.2,
    angle: 0, targetAngle: 0, isManual: false,
    color: "#ffd700", startTime: Date.now()
};

let entities = [];
let bubbles = [];
let backgrounds = [];
const fx = document.getElementById('fxOverlay');

function init() {
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();

    // Mass Spawning
    const counts = { fish: 300, squid: 80, shark: 40, whale: 15, jelly: 50, puffer: 40, angler: 20 };
    Object.keys(counts).forEach(type => {
        for(let i=0; i<counts[type]; i++) spawnEntity(type);
    });

    for(let i=0; i<200; i++) bubbles.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, r: Math.random()*3+1, s: Math.random()*2+0.5});
    for(let i=0; i<15; i++) backgrounds.push({x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE, size: 400 + Math.random()*600, angle: Math.random()*Math.PI*2, s: 0.4});

    requestAnimationFrame(loop);
}

function spawnEntity(type) {
    let stats = {
        fish: { size: 12, hp: 30, speed: 1.8, color: "#4fc3f7", dmg: 0.5 },
        squid: { size: 20, hp: 70, speed: 1.4, color: "#e1bee7", dmg: 1.5 },
        jelly: { size: 15, hp: 50, speed: 0.8, color: "#fff", dmg: 2 },
        puffer: { size: 18, hp: 100, speed: 1.0, color: "#c0ca33", dmg: 3 },
        shark: { size: 55, hp: 400, speed: 2.8, color: "#90a4ae", dmg: 4 },
        angler: { size: 25, hp: 150, speed: 2.0, color: "#263238", dmg: 5 },
        whale: { size: 180, hp: 4000, speed: 0.7, color: "#37474f", dmg: 0 }
    };
    let s = stats[type];
    entities.push({
        x: Math.random()*WORLD_SIZE, y: Math.random()*WORLD_SIZE,
        type, hp: s.hp, maxHp: s.hp, size: s.size, speed: s.speed,
        angle: Math.random()*Math.PI*2, color: s.color, dmg: s.dmg, stateTimer: 0
    });
}

function triggerFX(type, duration) {
    fx.className = type + '-fx';
    if(type === 'shock') fx.classList.add('strobing');
    fx.style.opacity = "1";
    if(type === 'puffer') canvas.style.filter = "blur(8px)";
    
    setTimeout(() => {
        fx.style.opacity = "0";
        fx.classList.remove('strobing');
        canvas.style.filter = "blur(0px)";
    }, duration);
}

function drawFishy(x, y, size, angle, color, type, hpPercent, isPlayer = false) {
    ctx.save();
    ctx.translate(x, y);
    if (!isPlayer) {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(-15, -size - 10, 30, 2);
        ctx.fillStyle = "#00ff88";
        ctx.fillRect(-15, -size - 10, hpPercent * 30, 2);
    }
    ctx.rotate(angle);
    ctx.fillStyle = color;
    if(isPlayer) { ctx.shadowBlur = 25; ctx.shadowColor = color; }

    if (type === 'jelly') {
        ctx.beginPath(); ctx.arc(0, 0, size, Math.PI, 0); ctx.fill();
        for(let i=0; i<3; i++) ctx.fillRect(-size + (i*size), 0, 2, size*1.5);
    } else if (type === 'puffer') {
        ctx.beginPath(); ctx.arc(0, 0, size, 0, Math.PI*2); ctx.fill();
        for(let i=0; i<8; i++) { ctx.rotate(Math.PI/4); ctx.fillRect(size-2, -1, 5, 2); }
    } else {
        ctx.beginPath(); ctx.ellipse(0, 0, size, size/1.8, 0, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-size, 0); ctx.lineTo(-size-12, -8); ctx.lineTo(-size-12, 8); ctx.fill();
    }
    if (isPlayer) { ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(size/2, -2, 3, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
}

function loop() {
    // Movement Physics (Maintained)
    if (!player.isManual) player.targetAngle += (Math.random() - 0.5) * 0.15;
    player.angle += (player.targetAngle - player.angle) * 0.06;
    player.x += Math.cos(player.angle) * player.speed;
    player.y += Math.sin(player.angle) * player.speed;
    
    player.x = Math.max(0, Math.min(WORLD_SIZE, player.x));
    player.y = Math.max(0, Math.min(WORLD_SIZE, player.y));
    player.hp = Math.min(player.maxHp, player.hp + (1/60));

    cam.x += (player.x - canvas.width/2 - cam.x) * 0.08;
    cam.y += (player.y - canvas.height/2 - cam.y) * 0.08;

    let aura = player.size * 3.6;

    entities.forEach((e, i) => {
        let d = Math.hypot(e.x - player.x, e.y - player.y);
        if (d < aura) {
            e.hp -= 1.5;
            if (e.hp <= 0) {
                player.kills++;
                player.xp += Math.floor(e.size);
                if (player.xp >= player.lvl * 250) { 
                    player.lvl++; player.xp = 0; player.size += 6; 
                    player.speed += 0.1; player.maxHp += 50; player.hp = player.maxHp; 
                }
                entities.splice(i, 1); spawnEntity(e.type);
            }
        }
        
        // Status FX Triggers
        if (d < 150 && Date.now() > e.stateTimer) {
            if (e.type === 'squid') triggerFX('ink', 800);
            if (e.type === 'jelly') triggerFX('shock', 600);
            if (e.type === 'puffer') triggerFX('puffer', 1200);
            if (e.type === 'angler') triggerFX('dark', 1000);
            e.stateTimer = Date.now() + 5000;
            player.hp -= e.dmg * 2;
        }

        let angleToP = Math.atan2(player.y - e.y, player.x - e.x);
        if ((e.type === 'shark' || e.type === 'angler') && d < 700) e.angle += (angleToP - e.angle) * 0.05;
        else e.angle += (Math.random()-0.5) * 0.06;

        e.x += Math.cos(e.angle) * e.speed;
        e.y += Math.sin(e.angle) * e.speed;
        if (d < player.size + e.size) player.hp -= (e.dmg/60);
    });

    // Draw
    ctx.clearRect(0,0, canvas.width, canvas.height);
    
    // Rays
    ctx.fillStyle = "rgba(255,255,255,0.05)";
    for(let i=0; i<8; i++) {
        ctx.beginPath(); ctx.moveTo(canvas.width*0.12 * i, 0);
        ctx.lineTo(canvas.width*0.12 * i + 200, canvas.height);
        ctx.lineTo(canvas.width*0.12 * i - 200, canvas.height); ctx.fill();
    }

    ctx.save();
    ctx.translate(-cam.x, -cam.y);
    backgrounds.forEach(bg => {
        ctx.fillStyle = "rgba(0,0,0,0.1)";
        ctx.beginPath(); ctx.ellipse(bg.x, bg.y, bg.size, bg.size/3, bg.angle, 0, Math.PI*2); ctx.fill();
    });
    bubbles.forEach(b => {
        ctx.fillStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
    });

    entities.forEach(e => drawFishy(e.x, e.y, e.size, e.angle, e.color, e.type, e.hp/e.maxHp));
    
    // Aura
    ctx.strokeStyle = "rgba(0, 242, 255, 0.4)";
    ctx.setLineDash([12, 12]);
    ctx.beginPath(); ctx.arc(player.x, player.y, aura, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    drawFishy(player.x, player.y, player.size, player.angle, player.color, 'fish', 1, true);
    ctx.restore();

    // UI
    document.getElementById('lvl').innerText = player.lvl;
    document.getElementById('kills').innerText = player.kills;
    document.getElementById('xpStat').innerText = player.xp;
    document.getElementById('auraStat').innerText = Math.floor(aura);
    document.getElementById('hpBar').style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById('timer').innerText = `SURVIVED: ${Math.floor((Date.now() - player.startTime)/1000)}s`;
    document.getElementById('coord').innerText = `X: ${Math.floor(player.x)} Y: ${Math.floor(player.y)}`;
    
    if (player.hp <= 0) location.reload();
    requestAnimationFrame(loop);
}

window.addEventListener('touchstart', (e) => {
    player.isManual = true;
    player.targetAngle = Math.atan2(e.touches[0].clientY - canvas.height/2, e.touches[0].clientX - canvas.width/2);
    clearTimeout(window.ct);
    window.ct = setTimeout(() => player.isManual = false, 3000);
});

init();
</script>
</body>
</html>
