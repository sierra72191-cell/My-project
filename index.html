<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · ABYSSAL INK</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #001a33 0%, #00050a 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        #stats-panel { position: absolute; top: 10px; left: 10px; color: #cc00ff; font-size: 11px; pointer-events: none; background: rgba(0,0,0,0.85); padding: 12px; border: 1px solid #cc00ff; border-radius: 8px; line-height: 1.5; z-index: 10; }
        .hp-bar-bg { width: 120px; height: 8px; background: #300; border: 1px solid #f00; margin: 5px 0; }
        #hp-fill { width: 100%; height: 100%; background: #ff0055; transition: width 0.2s; }
        #audio-prompt { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00fbff; background: rgba(0,21,41,0.95); padding: 30px; border: 2px solid #00fbff; border-radius: 20px; text-align: center; z-index: 200; font-weight: bold; }
        #controls { height: 140px; background: #000d1a; border-top: 2px solid #cc00ff; display: flex; gap: 15px; padding: 20px 15px 45px 15px; z-index: 100; }
        .btn { flex: 1; background: linear-gradient(#1a0033, #000d1a); color: white; border: 1px solid #cc00ff; border-radius: 15px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; font-weight: bold; }
        .btn:active { background: #cc00ff; color: #000; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="game-container">
        <div id="audio-prompt">TAP TO AWAKEN</div>
        <div id="stats-panel">
            <b>ENTITY: NEON SOUL</b><br>
            HP: <span id="hpText">15000</span>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            AGE: <span id="ageUI">0</span>s | SIZE: <span id="sizeUI">1.0</span>x<br>
            BIOMASS: <span id="coinUI">0</span> | GUARD: <span id="friendUI">0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyShrimp">SHRIMP<br>(DMG)</div>
        <div class="btn" id="buyScout">STARFISH<br>(STUN)</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0, friends = [], entities = [], bubbles = [], reefs = [], ruins = [], inkClouds = [];
    let cam = { x: 2500, y: 2500 };
    let fish = { x: 2500, y: 2500, tx: 2505, ty: 2505, angle: 0, hp: 15000, maxHp: 15000, age: 0, scale: 0.5, tailWiggle: 0 };
    let audioStarted = false, audioCtx, masterGain;

    function startAudio() {
        if (audioStarted) return; audioStarted = true;
        document.getElementById('audio-prompt').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.1; masterGain.connect(audioCtx.destination);
    }

    for(let i=0; i<40; i++) reefs.push({x: Math.random()*6000, y: Math.random()*6000, size: 50+Math.random()*100, depth: 0.2+Math.random()*0.3, color: `hsl(280, 30%, ${5+Math.random()*5}%)`});
    for(let i=0; i<10; i++) ruins.push({x: Math.random()*6000, y: Math.random()*6000, w: 40+Math.random()*60, h: 100+Math.random()*200});

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.addEventListener('resize', resize); resize();

    const setupBtn = (id, cost, type) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            if(coins >= cost) { coins -= cost; friends.push({x:fish.x, y:fish.y, type, hp: 100}); updateUI(); }
            e.preventDefault();
        });
    };
    setupBtn('buyShrimp', 5, 'Shrimp');
    setupBtn('buyScout', 10, 'Scout');

    function updateUI() {
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('friendUI').innerText = friends.length;
        document.getElementById('hpText').innerText = Math.floor(fish.hp);
        document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp)*100 + "%";
        document.getElementById('ageUI').innerText = Math.floor(fish.age);
        document.getElementById('sizeUI').innerText = fish.scale.toFixed(2);
    }

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
    });

    function drawOctopus(x, y, i) {
        ctx.save(); ctx.translate(x-cam.x, y-cam.y);
        ctx.fillStyle = '#800000'; ctx.beginPath(); ctx.ellipse(0,0, 18, 12, 0, 0, 7); ctx.fill();
        ctx.strokeStyle = '#800000'; ctx.lineWidth = 3;
        for(let j=0; j<8; j++) {
            ctx.beginPath(); ctx.moveTo(0,0);
            let ang = (j * Math.PI/4) + Math.sin(Date.now()/300 + i)*0.5;
            ctx.lineTo(Math.cos(ang)*25, Math.sin(ang)*25); ctx.stroke();
        }
        ctx.restore();
    }

    function loop() {
        fish.age += 1/60; fish.scale = 0.5 + (fish.age / 500);
        if(fish.hp < fish.maxHp) fish.hp += 0.8;

        // NEW INTELLIGENT MOVEMENT
        let distToTarget = Math.hypot(fish.tx - fish.x, fish.ty - fish.y);
        if(distToTarget < 20) {
            let nearest = entities.find(e => e.type === 'coin' && Math.hypot(e.x-fish.x, e.y-fish.y) < 500);
            if(nearest) { fish.tx = nearest.x; fish.ty = nearest.y; }
            else if (Math.random() < 0.01) { fish.tx += (Math.random()-0.5)*400; fish.ty += (Math.random()-0.5)*400; }
        }

        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;
        fish.x += (fish.tx - fish.x) * 0.03;
        fish.y += (fish.ty - fish.y) * 0.03;
        fish.angle = Math.atan2(fish.ty - fish.y, fish.tx - fish.x);
        fish.tailWiggle += 0.15;

        ctx.clearRect(0,0, canvas.width, canvas.height);
        ruins.forEach(r => { ctx.fillStyle = '#020a14'; ctx.fillRect(r.x-cam.x*0.2, r.y-cam.y*0.2, r.w, r.h); });
        reefs.forEach(r => { ctx.fillStyle = r.color; ctx.beginPath(); ctx.arc(r.x - cam.x*r.depth, r.y - cam.y*r.depth, r.size, 0, 7); ctx.fill(); });

        // Ink Clouds
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        inkClouds = inkClouds.filter(c => {
            c.r += 0.5; c.life -= 0.01;
            ctx.beginPath(); ctx.arc(c.x-cam.x, c.y-cam.y, c.r, 0, 7); ctx.fill();
            if(Math.hypot(fish.x-c.x, fish.y-c.y) < c.r) fish.hp -= 0.1; 
            return c.life > 0;
        });

        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            if(en.type === 'coin' && d < 50) { coins++; updateUI(); return false; }
            if(en.stun > 0) { en.stun--; ctx.globalAlpha = 0.4; }

            ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y);
            if(en.type === 'shark') {
                en.x += (fish.x - en.x) * 0.01; en.y += (fish.y - en.y) * 0.01;
                ctx.rotate(Math.atan2(fish.y-en.y, fish.x-en.x));
                ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.ellipse(0,0,50,16,0,0,7); ctx.fill();
            } else if(en.type === 'octopus') {
                if(Math.random() < 0.01) inkClouds.push({x: en.x, y: en.y, r: 10, life: 1});
                drawOctopus(0,0, 0);
            } else if(en.type === 'enemyFish') {
                en.x += (fish.x - en.x) * 0.02; en.y += (fish.y - en.y) * 0.02;
                ctx.fillStyle='#ff4400'; ctx.beginPath(); ctx.ellipse(0,0,15,8,0,0,7); ctx.fill();
            } else {
                ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(0,0,6,0,7); ctx.fill();
            }
            ctx.restore(); ctx.globalAlpha = 1.0;
            if(d < 60 && en.stun <= 0) {
                if(en.type==='shark') fish.hp -= 1.5;
                if(en.type==='octopus' || en.type==='enemyFish') fish.hp -= 0.5;
            }
            return !en.dead;
        });

        friends.forEach((fr, i) => {
            let orbitX = fish.x + Math.cos(Date.now()/1000 + i) * (80 + fish.scale*10);
            let orbitY = fish.y + Math.sin(Date.now()/1000 + i) * (80 + fish.scale*10);
            let target = { x: orbitX, y: orbitY };
            let enemy = entities.find(e => (e.type!=='coin') && Math.hypot(e.x-fish.x, e.y-fish.y) < 300);
            
            if(enemy) target = enemy;
            fr.x += (target.x - fr.x) * 0.1; fr.y += (target.y - fr.y) * 0.1;
            
            if(enemy && Math.hypot(fr.x-enemy.x, fr.y-enemy.y) < 50) {
                if(fr.type === 'Shrimp') { enemy.hp -= 0.2; if(enemy.hp <= 0) { enemy.dead=true; coins+=2; } }
                if(fr.type === 'Scout') { enemy.stun = 100; }
            }
            
            ctx.fillStyle = fr.type === 'Shrimp' ? '#ff7f50' : '#f0ff00';
            ctx.beginPath(); ctx.arc(fr.x-cam.x, fr.y-cam.y, 7, 0, 7); ctx.fill();
        });

        // PLAYER: BIOLUMINESCENT NEON VIOLET
        ctx.save(); ctx.translate(fish.x-cam.x, fish.y-cam.y); ctx.rotate(fish.angle); ctx.scale(fish.scale, fish.scale);
        ctx.shadowBlur=30; ctx.shadowColor='#cc00ff';
        ctx.fillStyle = '#cc00ff'; ctx.beginPath(); ctx.ellipse(0,0,25,14,0,0,7); ctx.fill(); // Body
        ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-35, 12 * Math.sin(fish.tailWiggle)); ctx.lineTo(-35, -12 * Math.sin(fish.tailWiggle)); ctx.fill(); // Tail
        ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(12,-6,5,0,7); ctx.fill();
        ctx.restore();

        // Balanced Spawning
        if(Math.random() < 0.05 && entities.length < 50) {
            let r = Math.random();
            let type = r < 0.05 ? 'shark' : (r < 0.15 ? 'octopus' : (r < 0.4 ? 'enemyFish' : 'coin'));
            let hp = type === 'shark' ? 500 : (type === 'coin' ? 1 : 100);
            entities.push({x: fish.x+(Math.random()-0.5)*2000, y: fish.y+(Math.random()-0.5)*2000, type, hp, stun:0, dead:false});
        }

        updateUI(); requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
