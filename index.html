<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLITCH DASH - Rhythm Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
            touch-action: manipulation;
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            font-weight: bold;
            font-size: 18px;
            z-index: 10;
            pointer-events: none;
            font-family: monospace;
        }

        #score {
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        #best {
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        #game-over {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
            display: none;
        }

        #game-over h1 {
            color: #f0f;
            font-size: 48px;
            text-shadow: 0 0 20px #f0f;
            letter-spacing: 5px;
        }

        #game-over p {
            color: #fff;
            margin-top: 20px;
            font-size: 20px;
        }

        .tap-instruction {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes glitchText {
            0%, 100% { transform: skew(0deg, 0deg); opacity: 1; }
            95% { transform: skew(5deg, 2deg); opacity: 0.8; }
        }

        .glitch-text {
            animation: glitchText 0.1s infinite;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <span id="score">SCORE: 0</span>
        <span id="best">BEST: 0</span>
    </div>
    <div id="game-over">
        <h1>⚡ GLITCHED ⚡</h1>
        <p>TAP TO RISE AGAIN</p>
    </div>
    <div class="tap-instination">⚡ TAP ANYWHERE - JUMP ⚡</div>

    <script>
        (function(){
            // ---------- CANVAS ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // ---------- GAME STATE ----------
            let gameRunning = true;
            let score = 0;
            let bestScore = localStorage.getItem('glitchBest') || 0;
            let frame = 0;
            let glitchIntensity = 0;
            let bassDrop = false;
            let beatPulse = 0;
            
            // Cube properties
            let cube = {
                x: 100,
                y: 0,
                vy: 0,
                width: 35,
                height: 35,
                grounded: true,
                shape: 'cube', // cube, triangle, diamond, glitch
                shapeTimer: 0
            };
            
            const GRAVITY = 0.8;
            const JUMP_POWER = -11;
            const GROUND_Y = 500;
            
            cube.y = GROUND_Y - cube.height;
            
            // Obstacles
            let obstacles = [];
            let obstacleTimer = 0;
            let lastObstacleFrame = 0;
            
            // Parallax / background
            let bgOffset = 0;
            
            // Audio context (Web Audio for bass drops)
            let audioCtx = null;
            let bassGain = null;
            let isAudioReady = false;
            
            // Glitch effects array
            let glitchFrames = 0;
            
            // Best score UI
            document.getElementById('best').innerText = `BEST: ${bestScore}`;
            
            // ---------- RESIZE ----------
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // ---------- INIT AUDIO (on first tap) ----------
            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                bassGain = audioCtx.createGain();
                bassGain.gain.value = 0.7;
                bassGain.connect(audioCtx.destination);
                
                // Create bass oscillator loop (dummy but effective)
                function playBassDrop() {
                    if (!audioCtx || !gameRunning) return;
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.value = 60;
                    gain.gain.value = 0.5;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.3);
                    osc.stop(now + 0.3);
                    
                    // extra bass rumble
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'triangle';
                    osc2.frequency.value = 80;
                    gain2.gain.value = 0.3;
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.2);
                    osc2.stop(now + 0.2);
                }
                
                // Piano notes (random melody)
                function playPianoNote() {
                    if (!audioCtx || !gameRunning) return;
                    const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
                    const randomNote = notes[Math.floor(Math.random() * notes.length)];
                    const now = audioCtx.currentTime;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = randomNote;
                    gain.gain.value = 0.2;
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.6);
                    osc.stop(now + 0.6);
                }
                
                // Schedule rhythmic bass drops + piano
                let lastBeat = 0;
                function beatLoop() {
                    if (!gameRunning && audioCtx) return;
                    const now = audioCtx.currentTime;
                    if (now - lastBeat > 0.9) { // every ~0.9 sec
                        lastBeat = now;
                        bassDrop = true;
                        playBassDrop();
                        // random piano over melody
                        if (Math.random() > 0.5) playPianoNote();
                        // trigger visual glitch spike
                        glitchIntensity = 0.8;
                        beatPulse = 15;
                    }
                    requestAnimationFrame(() => {
                        if(gameRunning) setTimeout(beatLoop, 400);
                    });
                }
                
                // start the loop only if game running
                if(gameRunning) beatLoop();
                isAudioReady = true;
            }
            
            // ---------- OBSTACLE GEN ----------
            function generateObstacle() {
                const types = ['spike', 'saw', 'block', 'glitchBlock'];
                const type = types[Math.floor(Math.random() * types.length)];
                obstacles.push({
                    x: canvas.width,
                    y: GROUND_Y - 35,
                    width: 30,
                    height: 35,
                    type: type,
                    passed: false
                });
                
                // double trouble sometimes!
                if (Math.random() < 0.25 && gameRunning) {
                    obstacles.push({
                        x: canvas.width + 90,
                        y: GROUND_Y - 50,
                        width: 28,
                        height: 50,
                        type: 'saw',
                        passed: false
                    });
                }
            }
            
            // ---------- UPDATE ----------
            function updateGame() {
                if (!gameRunning) return;
                
                frame++;
                
                // Score increments over time
                score += 0.2;
                document.getElementById('score').innerText = `SCORE: ${Math.floor(score)}`;
                if (Math.floor(score) > bestScore) {
                    bestScore = Math.floor(score);
                    localStorage.setItem('glitchBest', bestScore);
                    document.getElementById('best').innerText = `BEST: ${bestScore}`;
                }
                
                // Rhythm glitch intensity gradually fades
                glitchIntensity *= 0.95;
                if (bassDrop) {
                    bassDrop = false;
                }
                if (beatPulse > 0) beatPulse -= 0.5;
                
                // Shape morphing every 4 secs
                cube.shapeTimer++;
                if (cube.shapeTimer > 120) { // ~2 sec at 60fps? adjusted
                    cube.shapeTimer = 0;
                    const shapes = ['cube', 'triangle', 'diamond', 'glitch'];
                    let newShape = shapes[Math.floor(Math.random() * shapes.length)];
                    cube.shape = newShape;
                    glitchIntensity = 0.6;
                }
                
                // Parallax
                bgOffset = (bgOffset + 4) % 200;
                
                // Physics
                cube.vy += GRAVITY;
                cube.y += cube.vy;
                
                if (cube.y >= GROUND_Y - cube.height) {
                    cube.y = GROUND_Y - cube.height;
                    cube.vy = 0;
                    cube.grounded = true;
                } else {
                    cube.grounded = false;
                }
                
                if (cube.y < 0) cube.y = 0;
                
                // Obstacles logic
                if (obstacleTimer <= 0 && gameRunning) {
                    generateObstacle();
                    obstacleTimer = 45 + Math.random() * 30; // frames between obstacles
                } else {
                    obstacleTimer--;
                }
                
                for (let i = 0; i < obstacles.length; i++) {
                    const obs = obstacles[i];
                    obs.x -= 6.5;
                    
                    // collision detection (AABB)
                    if (!obs.passed && obs.x < cube.x + cube.width && obs.x + obs.width > cube.x &&
                        obs.y < cube.y + cube.height && obs.y + obs.height > cube.y) {
                        // DIE! with audio and glitch explosion
                        gameRunning = false;
                        if (audioCtx) {
                            // death sound: horrible bass crunch
                            const deathOsc = audioCtx.createOscillator();
                            const deathGain = audioCtx.createGain();
                            deathOsc.type = 'square';
                            deathOsc.frequency.value = 40;
                            deathGain.gain.value = 0.5;
                            deathOsc.connect(deathGain);
                            deathGain.connect(audioCtx.destination);
                            deathOsc.start();
                            deathGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.4);
                            deathOsc.stop(audioCtx.currentTime + 0.4);
                        }
                        glitchIntensity = 2.0;
                        document.getElementById('game-over').style.display = 'block';
                        break;
                    }
                    
                    // scoring per obstacle passed
                    if (!obs.passed && obs.x + obs.width < cube.x) {
                        obs.passed = true;
                        score += 15;
                        // piano happy note
                        if (audioCtx && isAudioReady) {
                            const noteOsc = audioCtx.createOscillator();
                            const noteGain = audioCtx.createGain();
                            noteOsc.type = 'sine';
                            noteOsc.frequency.value = 523.25;
                            noteGain.gain.value = 0.15;
                            noteOsc.connect(noteGain);
                            noteGain.connect(audioCtx.destination);
                            noteOsc.start();
                            noteGain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                            noteOsc.stop(audioCtx.currentTime + 0.3);
                        }
                    }
                }
                
                obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            }
            
            // ---------- DRAW : GLITCH MASTERPIECE ----------
            function draw() {
                // Apply glitch transform if intensity > 0.1
                ctx.save();
                if (glitchIntensity > 0.1) {
                    const shiftX = (Math.random() - 0.5) * 12 * glitchIntensity;
                    const shiftY = (Math.random() - 0.5) * 6 * glitchIntensity;
                    ctx.translate(shiftX, shiftY);
                    // RGB split effect
                    if (glitchIntensity > 0.4) {
                        ctx.shadowBlur = 0;
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        for (let i = 0; i < imgData.data.length; i += 4) {
                            if (Math.random() < 0.05 * glitchIntensity) {
                                imgData.data[i] = 255;     // R
                                imgData.data[i+1] = 0;     // G
                                imgData.data[i+2] = 255;   // B
                            }
                        }
                        ctx.putImageData(imgData, 0, 0);
                    }
                }
                
                // ---- BACKGROUND ----
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#0a0020');
                grad.addColorStop(1, '#1a0035');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Neon grid
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.3 + (beatPulse / 40);
                for (let i = 0; i < canvas.width + 60; i += 60) {
                    ctx.beginPath();
                    ctx.moveTo(i - bgOffset % 60, canvas.height);
                    ctx.lineTo(i - bgOffset % 60 + 20, GROUND_Y);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1;
                
                // Ground
                ctx.fillStyle = '#2a0a4a';
                ctx.fillRect(0, GROUND_Y, canvas.width, 10);
                ctx.fillStyle = '#f0f';
                ctx.fillRect(0, GROUND_Y + 5, canvas.width, 5);
                
                // Beat flash
                if (beatPulse > 2) {
                    ctx.fillStyle = `rgba(255, 0, 255, ${Math.min(0.3, beatPulse / 30)})`;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                
                // ---- OBSTACLES ----
                for (let obs of obstacles) {
                    if (obs.type === 'spike') {
                        ctx.fillStyle = '#ff3366';
                        ctx.beginPath();
                        ctx.moveTo(obs.x + obs.width/2, obs.y);
                        ctx.lineTo(obs.x, obs.y + obs.height);
                        ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                        ctx.fill();
                    } else if (obs.type === 'saw') {
                        ctx.fillStyle = '#ffaa33';
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#ff6600';
                        ctx.beginPath();
                        for (let i = 0; i < 8; i++) {
                            let angle = (i * Math.PI * 2 / 8);
                            let x1 = obs.x + obs.width/2 + Math.cos(angle) * 15;
                            let y1 = obs.y + obs.height/2 + Math.sin(angle) * 15;
                            if(i===0) ctx.moveTo(x1, y1);
                            else ctx.lineTo(x1, y1);
                        }
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    } else if (obs.type === 'block') {
                        ctx.fillStyle = '#33ccff';
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    } else {
                        // glitchBlock
                        ctx.fillStyle = '#00ffcc';
                        ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                        ctx.fillStyle = '#ff00ff';
                        ctx.fillRect(obs.x + 4, obs.y + 4, obs.width-8, obs.height-8);
                    }
                }
                
                // ---- PLAYER CUBE / SHAPE SHIFTING ----
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0ff';
                ctx.fillStyle = '#ff44ee';
                if (cube.shape === 'cube') {
                    ctx.fillRect(cube.x, cube.y, cube.width, cube.height);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(cube.x+8, cube.y+8, 6, 6);
                    ctx.fillRect(cube.x+22, cube.y+8, 6, 6);
                } else if (cube.shape === 'triangle') {
                    ctx.beginPath();
                    ctx.moveTo(cube.x + cube.width/2, cube.y);
                    ctx.lineTo(cube.x, cube.y + cube.height);
                    ctx.lineTo(cube.x + cube.width, cube.y + cube.height);
                    ctx.fill();
                } else if (cube.shape === 'diamond') {
                    ctx.beginPath();
                    ctx.moveTo(cube.x + cube.width/2, cube.y);
                    ctx.lineTo(cube.x + cube.width, cube.y + cube.height/2);
                    ctx.lineTo(cube.x +
