<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SURVIVAL REALMS · FISH & HUNGER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a1a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .hud {
            position: fixed;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 16px;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            z-index: 20;
            border-left: 3px solid #0f0;
            pointer-events: none;
        }
        .stats-right {
            position: fixed;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 16px;
            color: #ffaa44;
            font-family: monospace;
            font-size: 11px;
            z-index: 20;
            text-align: right;
            pointer-events: none;
        }
        .inventory-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            gap: 8px;
            z-index: 30;
            border: 1px solid gold;
            overflow-x: auto;
            max-width: 95%;
        }
        .inv-slot {
            background: #2a2a2a;
            padding: 6px 10px;
            border-radius: 20px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            color: white;
            min-width: 65px;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #555;
        }
        .inv-slot:active { transform: scale(0.95); background: #3a6a3a; }
        .selected { background: #3a8a3a; border: 2px solid #ffcc44; box-shadow: 0 0 10px gold; }
        .day-cycle {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            font-size: 11px;
        }
        .action-buttons {
            position: fixed;
            bottom: 100px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 30;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #2a3a2a;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 11px;
        }
        .action-btn.active {
            background: #3a8a3a;
            border: 1px solid gold;
            box-shadow: 0 0 8px gold;
        }
        .build-menu {
            position: fixed;
            bottom: 160px;
            left: 20px;
            background: #1a2a1aee;
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 20px;
            display: none;
            gap: 8px;
            z-index: 30;
            flex-wrap: wrap;
        }
        .build-btn {
            background: #3a4a3a;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            color: gold;
            font-size: 10px;
            cursor: pointer;
        }
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a2a0a, #020a02);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-family: monospace;
        }
        .start-title { font-size: 42px; color: #0f0; text-shadow: 0 0 20px green; margin-bottom: 10px; letter-spacing: 4px; }
        .start-sub { color: #aaa; margin-bottom: 20px; font-size: 12px; text-align: center; padding: 0 20px; }
        .start-btns { display: flex; gap: 20px; }
        .start-btn { background: #2a6a2a; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .load-btn { background: #3a4a6a; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .event-toast {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: black;
            color: cyan;
            padding: 8px 18px;
            border-radius: 40px;
            z-index: 150;
            font-weight: bold;
            animation: fadeUp 2s forwards;
            pointer-events: none;
            white-space: nowrap;
            font-size: 12px;
        }
        @keyframes fadeUp { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%,-80%); } }
        .mode-indicator {
            position: fixed;
            top: 80px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            color: cyan;
            z-index: 20;
        }
        .exit-btn {
            position: fixed;
            bottom: 160px;
            left: 120px;
            background: #8a2a2a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            color: white;
            z-index: 30;
            cursor: pointer;
            display: none;
        }
        .hunger-bar {
            position: fixed;
            top: 55px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 10px;
            color: #ffaa66;
            z-index: 20;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="hud" id="hudStats">❤️ 500/500 | ⚔️ DMG 1 | 🧪 L1 | ✨ 0/100</div>
<div class="stats-right" id="statsRight">🪙 10 | 🪵 0 | 🪨 0</div>
<div class="hunger-bar" id="hungerBar">🍗 HUNGER: 100%</div>
<div class="inventory-bar" id="inventoryBar"></div>
<div class="day-cycle" id="dayCycle">🌞 DAY 1</div>
<div class="action-buttons">
    <button class="action-btn" id="tillBtn">🌾 TILL</button>
    <button class="action-btn" id="buildBtn">🏗️ BUILD</button>
    <button class="action-btn" id="fishBtn">🎣 FISH</button>
    <button class="action-btn" id="saveBtn">💾 SAVE</button>
</div>
<div class="build-menu" id="buildMenu">
    <button class="build-btn" data-type="wall">🧱 WALL (15🪵 10🪨)</button>
    <button class="build-btn" data-type="campfire">🔥 CAMPFIRE (10🪵 5🪨)</button>
    <button class="build-btn" data-type="storage">📦 STORAGE (20🪵 15🪨)</button>
</div>
<div class="mode-indicator" id="modeIndicator">📍 MOVE MODE</div>
<div class="exit-btn" id="exitModeBtn">❌ EXIT MODE</div>
<div class="start-overlay" id="startOverlay">
    <div class="start-title">⚙️ SURVIVAL REALMS ⚙️</div>
    <div class="start-sub">tap to move | harvest | build | fish | survive</div>
    <div class="start-btns">
        <button class="start-btn" id="startBtn">▶ NEW GAME</button>
        <button class="load-btn" id="loadBtn">📀 LOAD SAVE</button>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let gameRunning = false;
        
        const WORLD_SIZE = 6000;  // bigger world
        let camera = { x: 0, y: 0 };
        
        // Player
        let player = {
            x: WORLD_SIZE/2, y: WORLD_SIZE/2,
            hp: 500, maxHp: 500,
            damage: 1,
            level: 1, xp: 0, xpNeeded: 100,
            coins: 10,
            wood: 0, stone: 0,
            hunger: 100,
            food: { Fish: 3, Berry: 5 }
        };
        
        // Inventory
        let inventory = {
            seeds: { Pumpkin: 5, Apple: 3, Corn: 6, Wheat: 4, Carrot: 5 },
            selectedCrop: "Pumpkin"
        };
        
        // World objects
        let trees = [];
        let rocks = [];
        let tilledSoil = [];
        let crops = [];
        let structures = [];
        let enemies = [];
        let fishSpots = [];
        
        let particles = [];
        let fishingActive = false;
        let fishingTimer = 0;
        let fishBite = false;
        
        let targetX = null, targetY = null;
        let actionMode = "move";
        let selectedBuild = null;
        
        let dayCount = 1;
        let timeOfDay = 0;
        let isNight = false;
        let campfireX = player.x, campfireY = player.y;
        
        let eventTimer = 0;
        let enemyRespawnTimer = 0;
        
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        function updateCamera() { 
            camera.x = player.x - width/2.5;  // zoomed out
            camera.y = player.y - height/2.5;
            camera.x = Math.min(Math.max(camera.x, 0), WORLD_SIZE - width);
            camera.y = Math.min(Math.max(camera.y, 0), WORLD_SIZE - height);
        }
        function worldToScreen(wx, wy) { return { x: wx - camera.x, y: wy - camera.y }; }
        
        function showToast(msg) { let div = document.createElement('div'); div.className = 'event-toast'; div.innerText = msg; document.body.appendChild(div); setTimeout(()=>div.remove(), 2000); }
        
        function updateUI() {
            document.getElementById('hudStats').innerHTML = `❤️ ${Math.floor(player.hp)}/${player.maxHp} | ⚔️ DMG ${player.damage} | 🧪 L${player.level} | ✨ ${player.xp}/${player.xpNeeded}`;
            document.getElementById('statsRight').innerHTML = `🪙 ${Math.floor(player.coins)} | 🪵 ${player.wood} | 🪨 ${player.stone}`;
            document.getElementById('hungerBar').innerHTML = `🍗 HUNGER: ${Math.floor(player.hunger)}%`;
            document.getElementById('dayCycle').innerHTML = isNight ? `🌙 NIGHT ${dayCount} 🔥` : `🌞 DAY ${dayCount}`;
            let bar = document.getElementById('inventoryBar');
            bar.innerHTML = '';
            // food items
            let foodSlot = document.createElement('div');
            foodSlot.className = `inv-slot`;
            foodSlot.innerHTML = `🐟 Fish<br>${player.food.Fish}`;
            foodSlot.onclick = () => { if(player.food.Fish > 0) { player.food.Fish--; player.hunger = Math.min(100, player.hunger+20); showToast("🍽️ Ate Fish +20 Hunger"); updateUI(); } };
            bar.appendChild(foodSlot);
            let berrySlot = document.createElement('div');
            berrySlot.className = `inv-slot`;
            berrySlot.innerHTML = `🍓 Berry<br>${player.food.Berry}`;
            berrySlot.onclick = () => { if(player.food.Berry > 0) { player.food.Berry--; player.hunger = Math.min(100, player.hunger+10); showToast("🍓 Ate Berry +10 Hunger"); updateUI(); } };
            bar.appendChild(berrySlot);
            // seeds
            for(let [crop, amount] of Object.entries(inventory.seeds)) {
                let slot = document.createElement('div');
                slot.className = `inv-slot ${inventory.selectedCrop === crop ? 'selected' : ''}`;
                slot.innerHTML = `🌱 ${crop}<br>${amount}`;
                slot.onclick = (e) => { e.stopPropagation(); inventory.selectedCrop = crop; updateUI(); showToast(`Selected ${crop} seeds`); };
                bar.appendChild(slot);
            }
        }
        
        function addXP(amount) {
            player.xp += amount;
            while(player.xp >= player.xpNeeded) {
                player.xp -= player.xpNeeded;
                player.level++;
                player.damage++;
                player.maxHp += 25;
                player.hp = player.maxHp;
                player.xpNeeded = Math.floor(100 + player.level * 15);
                showToast(`⚡ LEVEL UP! L${player.level} +DMG +HP`);
            }
            updateUI();
        }
        
        function saveGame() {
            let save = {
                player: { x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp, damage: player.damage, level: player.level, xp: player.xp, coins: player.coins, wood: player.wood, stone: player.stone, hunger: player.hunger, food: player.food },
                inventory: inventory,
                dayCount: dayCount, timeOfDay: timeOfDay,
                structures: structures,
                tilledSoil: tilledSoil,
                crops: crops.map(c => ({ x: c.x, y: c.y, type: c.type, growth: c.growth }))
            };
            localStorage.setItem('survivalRealmSave', JSON.stringify(save));
            showToast("💾 GAME SAVED!");
        }
        
        function loadGame() {
            let saveData = localStorage.getItem('survivalRealmSave');
            if(!saveData) { showToast("No save found!"); return false; }
            let save = JSON.parse(saveData);
            player = { ...player, ...save.player };
            inventory = save.inventory;
            dayCount = save.dayCount;
            timeOfDay = save.timeOfDay;
            structures = save.structures;
            tilledSoil = save.tilledSoil;
            crops = save.crops;
            for(let s of structures) if(s.type === 'campfire') { campfireX = s.x; campfireY = s.y; }
            showToast("📀 GAME LOADED!");
            updateUI();
            return true;
        }
        
        function spawnWorld() {
            for(let i=0;i<100;i++) {
                trees.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, tapsNeeded: 10, tapsRemaining: 10 });
                rocks.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, tapsNeeded: 10, tapsRemaining: 10 });
            }
            for(let i=0;i<30;i++) fishSpots.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE });
            updateUI();
        }
        
        function spawnEnemy() {
            let angle = Math.random() * Math.PI * 2;
            let dist = 500 + Math.random() * 400;
            let x = player.x + Math.cos(angle)*dist, y = player.y + Math.sin(angle)*dist;
            x = Math.min(Math.max(x, 50), WORLD_SIZE-50); y = Math.min(Math.max(y, 50), WORLD_SIZE-50);
            let types = ["GOBLIN", "WOLF", "SLIME", "SKELETON", "BAT"];
            let type = types[Math.floor(Math.random()*types.length)];
            enemies.push({ x, y, hp: 8+player.level, maxHp: 8+player.level, damage: 1, radius: 22, speed: 45, attackCooldown: 0, type });
        }
        
        function startFishing() {
            if(fishingActive) return;
            fishingActive = true;
            fishingTimer = 2 + Math.random() * 4;
            fishBite = false;
            showToast("🎣 Casting line... wait for bite!");
        }
        
        function checkFishBite() {
            if(!fishingActive) return;
            if(fishBite) {
                let caught = Math.random() > 0.3;
                if(caught) {
                    player.food.Fish += 1 + Math.floor(Math.random()*2);
                    showToast(`🐟 Caught Fish! +${1} fish`);
                } else { showToast("❌ Missed!"); }
                fishingActive = false;
                updateUI();
            }
        }
        
        function tillSoil(tx, ty) {
            let gridX = Math.floor(tx / 45) * 45;
            let gridY = Math.floor(ty / 45) * 45;
            for(let t of tilledSoil) if(Math.abs(t.x - gridX) < 5 && Math.abs(t.y - gridY) < 5) return false;
            tilledSoil.push({ x: gridX, y: gridY });
            showToast("🌾 Tilled soil");
            return true;
        }
        
        function plantCrop(tx, ty) {
            let foundTill = null;
            for(let t of tilledSoil) if(Math.hypot(t.x - tx, t.y - ty) < 40) { foundTill = t; break; }
            if(!foundTill) { showToast("❌ Need tilled soil first!"); return false; }
            let cropType = inventory.selectedCrop;
            if(inventory.seeds[cropType] <= 0) { showToast(`❌ No ${cropType} seeds!`); return false; }
            for(let c of crops) if(Math.hypot(c.x - foundTill.x, c.y - foundTill.y) < 30) { showToast("❌ Crop already here"); return false; }
            inventory.seeds[cropType]--;
            crops.push({ x: foundTill.x, y: foundTill.y, type: cropType, growth: 0, maxGrowth: 8 });
            showToast(`🌱 Planted ${cropType}`);
            updateUI();
            return true;
        }
        
        function buildStructure(tx, ty, type) {
            let cost = { wall: { wood: 15, stone: 10 }, campfire: { wood: 10, stone: 5 }, storage: { wood: 20, stone: 15 } };
            let c = cost[type];
            if(player.wood >= c.wood && player.stone >= c.stone) {
                player.wood -= c.wood;
                player.stone -= c.stone;
                structures.push({ x: tx, y: ty, type: type, hp: type==='wall'?50:100 });
                showToast(`🏗️ Built ${type}`);
                if(type === 'campfire') { campfireX = tx; campfireY = ty; }
                updateUI();
            } else { showToast(`❌ Need ${c.wood}🪵 ${c.stone}🪨`); }
        }
        
        function interactWithTile(tx, ty) {
            if(actionMode === "move") {
                for(let t of tilledSoil) if(Math.hypot(t.x - tx, t.y - ty) < 40) return plantCrop(tx, ty);
            }
            for(let i=0;i<trees.length;i++) {
                let t = trees[i];
                if(Math.hypot(tx - t.x, ty - t.y) < 50) {
                    t.tapsRemaining -= player.damage;
                    if(t.tapsRemaining <= 0) { trees.splice(i,1); player.wood += 5+Math.floor(Math.random()*4); showToast(`+${5}🪵 wood`); updateUI(); }
                    else showToast(`🌲 Tree ${t.tapsRemaining}/${t.tapsNeeded}`);
                    return true;
                }
            }
            for(let i=0;i<rocks.length;i++) {
                let r = rocks[i];
                if(Math.hypot(tx - r.x, ty - r.y) < 50) {
                    r.tapsRemaining -= player.damage;
                    if(r.tapsRemaining <= 0) { rocks.splice(i,1); player.stone += 3+Math.floor(Math.random()*3); showToast(`+${3}🪨 stone`); updateUI(); }
                    else showToast(`🪨 Rock ${r.tapsRemaining}/${r.tapsNeeded}`);
                    return true;
                }
            }
            if(actionMode === "till") { tillSoil(tx, ty); return true; }
            if(actionMode === "build" && selectedBuild) { buildStructure(tx, ty, selectedBuild); return true; }
            if(fishingActive) { checkFishBite(); return true; }
            return false;
        }
        
        function exitMode() {
            actionMode = "move";
            selectedBuild = null;
            document.getElementById('modeIndicator').innerHTML = "📍 MOVE MODE";
            document.getElementById('tillBtn').classList.remove('active');
            document.getElementById('buildBtn').classList.remove('active');
            document.getElementById('exitModeBtn').style.display = 'none';
        }
        
        function updateGame(delta) {
            if(!gameRunning) return;
            if(delta > 0.033) delta = 0.033;
            
            timeOfDay += delta / 140;
            if(timeOfDay >= 1) { timeOfDay = 0; dayCount++; isNight = false; showToast("🌅 DAYBREAK"); updateUI(); }
            isNight = timeOfDay > 0.55;
            
            // Hunger drain
            player.hunger -= 0.35 * delta;
            if(player.hunger <= 0) { player.hp -= 2 * delta; player.hunger = 0; if(player.hp <= 0) { gameRunning = false; alert("You starved!"); location.reload(); } }
            if(player.hunger > 100) player.hunger = 100;
            
            let nearCampfire = false;
            for(let s of structures) if(s.type === 'campfire' && Math.hypot(player.x - s.x, player.y - s.y) < 150) nearCampfire = true;
            
            if(targetX !== null && targetY !== null) {
                let dx = targetX - player.x, dy = targetY - player.y;
                if(Math.hypot(dx,dy) < 30) { interactWithTile(targetX, targetY); targetX = null; targetY = null; }
                else {
                    let angle = Math.atan2(dy,dx);
                    let speed = 210;
                    player.x += Math.cos(angle) * speed * delta;
                    player.y += Math.sin(angle) * speed * delta;
                    player.x = Math.min(Math.max(player.x, 35), WORLD_SIZE-35);
                    player.y = Math.min(Math.max(player.y, 35), WORLD_SIZE-35);
                }
            }
            
            // Fishing
            if(fishingActive) {
                fishingTimer -= delta;
                if(fishingTimer <= 0 && !fishBite) { fishBite = true; showToast("🎣 BITE! Tap to reel!"); }
            }
            
            // Crops
            for(let c of crops) { c.growth += delta * 0.2; if(c.growth >= c.maxGrowth && Math.random()<0.015) { let reward = 2+Math.floor(Math.random()*3); inventory.seeds[c.type] += reward; showToast(`🍅 Harvested ${c.type} +${reward}`); crops.splice(crops.indexOf(c),1); updateUI(); } }
            
            // Auto combat + enemies
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let dist = Math.hypot(e.x - player.x, e.y - player.y);
                if(dist < 280 && !(nearCampfire && isNight)) {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    e.x += Math.cos(angle) * e.speed * delta;
                    e.y += Math.sin(angle) * e.speed * delta;
                    if(dist < 45) {
                        if(e.attackCooldown <= 0) { player.hp -= e.damage; e.attackCooldown = 0.9; if(player.hp <= 0) { gameRunning = false; alert("GAME OVER"); location.reload(); } updateUI(); }
                        // Auto attack
                        e.hp -= player.damage * delta * 3;
                        if(e.hp <= 0) { enemies.splice(i,1); i--; let gain = 12+player.level*2; addXP(gain); player.coins += 2+Math.floor(Math.random()*4); updateUI(); showToast(`+${gain} XP`); }
                    }
                }
                if(e.attackCooldown > 0) e.attackCooldown -= delta;
            }
            
            // Enemy respawn
            enemyRespawnTimer += delta;
            if(enemyRespawnTimer > 90 && gameRunning) {
                enemyRespawnTimer = 0;
                let toSpawn = 2 + Math.floor(Math.random()*3);
                for(let i=0;i<toSpawn;i++) spawnEnemy();
                showToast(`💀 Enemies have respawned!`);
            }
            
            let spawnRate = isNight ? 0.5 : 0.15;
            if(Math.random() < spawnRate * delta && enemies.length < (isNight ? 12 : 6)) { if(!(nearCampfire && isNight)) spawnEnemy(); }
            
            eventTimer += delta;
            if(eventTimer > 55 && gameRunning) {
                eventTimer = 0;
                let r = Math.random();
                if(r<0.25) { player.coins += 12; showToast("💰 TRAVELING MERCHANT +12 coins"); updateUI(); }
                else if(r<0.5) { addXP(20); showToast("✨ MYSTIC SHRINE +20 XP"); }
                else if(r<0.75) { player.food.Berry += 5; showToast("🍓 Berry Bush +5 berries"); updateUI(); }
                else { for(let i=0;i<2;i++) spawnEnemy(); showToast("💀 WILD PACK!"); }
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,width,height);
            // Sky gradient
            let grad = ctx.createLinearGradient(0,0,0,height);
            grad.addColorStop(0, isNight ? "#0a1020" : "#87CEEB");
            grad.addColorStop(1, isNight ? "#0a2a3a" : "#5a9e4e");
            ctx.fillStyle = grad; ctx.fillRect(0,0,width,height);
            // Clouds
            for(let i=0;i<30;i++) { ctx.fillStyle = `rgba(255,255,200,0.2)`; ctx.beginPath(); ctx.ellipse(((i*317)%width), ((i*89)%height)+20, 40, 20, 0, 0, Math.PI*2); ctx.fill(); }
            // Ground details
            for(let i=0;i<400;i++) { ctx.fillStyle = isNight ? "#1a4a3a" : "#7cbd5c"; ctx.fillRect(((i*131)%width), ((i*57)%height), 5,5); }
            
            // Trees, rocks, etc (same as before with zoom)
            for(let t of trees) { let s=worldToScreen(t.x,t.y); ctx.fillStyle="#4a3a2a"; ctx.fillRect(s.x-8,s.y-15,16,30); ctx.fillStyle="#2a8c2a"; ctx.beginPath(); ctx.arc(s.x,s.y-18,14,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText(`${t.tapsRemaining}`, s.x-4,s.y-26); }
            for(let r of rocks) { let s=worldToScreen(r.x,r.y); ctx.fillStyle="#888"; ctx.fillRect(s.x-10,s.y-7,20,14); ctx.fillStyle="white"; ctx.fillText(`${r.tapsRemaining}`, s.x-4,s.y-12); }
            for(let t of tilledSoil) { let s=worldToScreen(t.x,t.y); ctx.fillStyle="#8b5a2b"; ctx.fillRect(s.x-20,s.y-14,40,28); ctx.fillStyle="#c97e3a"; ctx.fillRect(s.x-17,s.y-10,34,22); }
            for(let c of crops) { let s=worldToScreen(c.x,c.y); let size = 6+(c.growth/c.maxGrowth)*12; ctx.fillStyle="#aaff77"; ctx.fillRect(s.x-size/2,s.y-size,size,size*1.5); ctx.fillStyle="yellow"; ctx.fillText(c.type[0], s.x-3,s.y-3); }
            for(let s of structures) { let scr=worldToScreen(s.x,s.y); if(s.type==='wall'){ ctx.fillStyle="#aa8866"; ctx.fillRect(scr.x-15,scr.y-10,30,20); } else if(s.type==='campfire'){ ctx.fillStyle="#ff6600"; ctx.beginPath(); ctx.arc(scr.x,scr.y,18,0,Math.PI*2); ctx.fill(); ctx.fillStyle="#ffcc44"; ctx.beginPath(); ctx.arc(scr.x,scr.y,8,0,Math.PI*2); ctx.fill(); } }
            for(let e of enemies) { let s=worldToScreen(e.x,e.y); ctx.fillStyle = e.type==="GOBLIN"?"#aa5533": e.type==="WOLF"?"#886666": e.type==="SLIME"?"#55aa77": e.type==="SKELETON"?"#ccaa88":"#8866aa"; ctx.beginPath(); ctx.ellipse(s.x,s.y,18,22,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText(e.type[0], s.x-6,s.y-5); ctx.fillStyle="red"; ctx.fillRect(s.x-15,s.y-15, (e.hp/e.maxHp)*30,4); }
            
            let campPos = worldToScreen(campfireX, campfireY);
            ctx.globalAlpha=0.2; ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(campPos.x,campPos.y,120,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
            
            // Player
            let ps = worldToScreen(player.x, player.y);
            ctx.fillStyle="#3a6ea5"; ctx.fillRect(ps.x-12,ps.y-8,24,32);
            ctx.fillStyle="#e8c8a0"; ctx.beginPath(); ctx.arc(ps.x,ps.y-14,14,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#5a3a2a"; ctx.fillRect(ps.x-12,ps.y-26,24,14);
            ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(ps.x-6,ps.y-17,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(ps.x+6,ps.y-17,3,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#2a3a5a"; ctx.beginPath(); ctx.arc(ps.x-6,ps.y-17,1.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(ps.x+6,ps.y-17,1.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="#8a6a4a"; ctx.fillRect(ps.x+10,ps.y-10,8,20);
            ctx.fillStyle="white"; ctx.font="bold 10px monospace"; ctx.fillText("SURVIVOR", ps.x-20, ps.y-30);
            
            if(fishingActive) { ctx.fillStyle="cyan"; ctx.font="bold 14px monospace"; ctx.fillText("🎣 FISHING...", width/2-50, 100); }
        }
        
        function handleTap(e) {
            if(!gameRunning) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let sx = (e.touches ? e.touches[0].clientX : e.clientX);
            let sy = (e.touches ? e.touches[0].clientY : e.clientY);
            let wx = camera.x + sx, wy = camera.y + sy;
            if(fishingActive && fishBite) { checkFishBite(); return; }
            if(actionMode === "move") { targetX = wx; targetY = wy; }
            else if(actionMode === "till") { tillSoil(wx, wy); }
            else if(actionMode === "build" && selectedBuild) { buildStructure(wx, wy, selectedBuild); }
            else { targetX = wx; targetY = wy; }
        }
        
        document.getElementById('tillBtn').onclick = () => { actionMode = "till"; selectedBuild = null; document.getElementById('modeIndicator').innerHTML = "🌾 TILL MODE"; document.getElementById('tillBtn').classList.add('active'); document.getElementById('buildBtn').classList.remove('active'); document.getElementById('exitModeBtn').style.display = 'block'; };
        document.getElementById('buildBtn').onclick = () => { let menu = document.getElementById('buildMenu'); menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex'; };
        document.getElementById('fishBtn').onclick = () => { startFishing(); };
        document.getElementById('saveBtn').onclick = () => { saveGame(); };
        document.getElementById('exitModeBtn').onclick = () => { exitMode(); document.getElementById('buildMenu').style.display = 'none'; };
        document.querySelectorAll('.build-btn').forEach(btn => { btn.onclick = () => { actionMode = "build"; selectedBuild = btn.dataset.type; document.getElementById('modeIndicator').innerHTML = `🏗️ BUILD: ${selectedBuild}`; document.getElementById('buildBtn').classList.add('active'); document.getElementById('tillBtn').classList.remove('active'); document.getElementById('buildMenu').style.display = 'none'; document.getElementById('exitModeBtn').style.display = 'block'; }; });
        
        document.getElementById('startBtn').onclick = () => { gameRunning = true; document.getElementById('startOverlay').style.display = 'none'; spawnWorld(); for(let i=0;i<3;i++) spawnEnemy(); updateUI(); };
        document.getElementById('loadBtn').onclick = () => { if(loadGame()) { gameRunning = true; document.getElementById('startOverlay').style.display = 'none'; } };
        
        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('mousedown', handleTap);
        window.addEventListener('resize', ()=>{ resize(); updateCamera(); });
        resize();
        let lastTime=0;
        function loop(now) { let delta = Math.min(0.033, (now-lastTime)/1000); if(delta>0.01 && gameRunning) { updateGame(delta); updateCamera(); draw(); } lastTime=now; requestAnimationFrame(loop); }
        loop(performance.now());
        setInterval(()=>{ if(gameRunning) updateUI(); }, 100);
    })();
</script>
</body>
</html>
