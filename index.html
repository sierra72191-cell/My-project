<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · LIVING WORLD</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000814; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; justify-content: space-between;
        }
        #stats { 
            padding: 20px; color: #00fbff; font-weight: bold; font-size: 18px;
            text-shadow: 0 0 10px #00fbff; background: rgba(0,0,0,0.4); 
        }
        #controls {
            padding: 25px 15px; display: flex; gap: 15px; pointer-events: auto;
            background: linear-gradient(transparent, #001529);
        }
        .btn {
            background: rgba(0, 80, 150, 0.9); color: white; border: 2px solid #00fbff;
            padding: 20px 5px; border-radius: 15px; flex: 1; text-align: center;
            font-size: 14px; font-weight: bold; box-shadow: 0 0 15px rgba(0,251,255,0.2);
        }
        .btn:active { background: #00fbff; color: #000; transform: scale(0.95); }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="stats">
            🪙 <span id="coins">0</span> | 🛡️ <span id="fcount">0</span>
        </div>
        <div id="controls">
            <div class="btn" onclick="spawnPet('Protector', 5)">PROTECTOR (5c)</div>
            <div class="btn" onclick="spawnPet('Scout', 10)">SCOUT (10c)</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let world = { width: 4000, height: 4000 };
    let cam = { x: 2000, y: 2000 };
    let coins = 0;
    let fish = { x: 2000, y: 2000, tx: 2000, ty: 2000, angle: 0, size: 20, wiggle: 0 };
    let entities = []; 

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    function spawnPet(type, cost) {
        if (coins >= cost) {
            coins -= cost;
            entities.push({ type: 'pet', x: fish.x, y: fish.y, petType: type, angle: 0 });
            updateUI();
        }
    }

    function handleInput(e) {
        let touchX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        let touchY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        
        let worldX = touchX + cam.x;
        let worldY = touchY + cam.y;
        
        // Check if we tapped an enemy
        let hit = false;
        entities.forEach(en => {
            if(en.type === 'enemy' && Math.hypot(en.x - worldX, en.y - worldY) < 50) {
                en.dead = true;
                coins += 2;
                hit = true;
            }
        });

        if(!hit) {
            fish.tx = worldX;
            fish.ty = worldY;
        }
        updateUI();
    }

    window.addEventListener('touchstart', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});
    window.addEventListener('mousedown', handleInput);

    function updateUI() {
        document.getElementById('coins').innerText = coins;
        document.getElementById('fcount').innerText = entities.filter(e => e.type === 'pet').length;
    }

    function loop() {
        // Camera smoothing
        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;

        // Fish physics
        fish.x += (fish.tx - fish.x) * 0.04;
        fish.y += (fish.ty - fish.y) * 0.04;
        fish.angle = Math.atan2(fish.ty - fish.y, fish.tx - fish.x);
        fish.wiggle = Math.sin(Date.now() / 150) * 8;

        // Auto-spawn items and enemies
        if(Math.random() < 0.03 && entities.length < 60) {
            let side = Math.random() * Math.PI * 2;
            entities.push({ 
                type: Math.random() < 0.2 ? 'enemy' : 'coin', 
                x: fish.x + Math.cos(side) * 600, 
                y: fish.y + Math.sin(side) * 600 
            });
        }

        ctx.fillStyle = '#000814';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Water Particles (Depth effect)
        ctx.fillStyle = 'rgba(0, 251, 255, 0.1)';
        for(let i=0; i<50; i++) {
            let px = (i * 500) % world.width;
            let py = (i * 700) % world.height;
            ctx.fillRect(px - cam.x, py - cam.y, 2, 2);
        }

        entities = entities.filter(en => {
            let dist = Math.hypot(fish.x - en.x, fish.y - en.y);
            
            if(en.type === 'coin' && dist < 35) { coins++; updateUI(); return false; }
            
            if(en.type === 'pet') {
                let target = { x: fish.x - Math.cos(fish.angle)*50, y: fish.y - Math.sin(fish.angle)*50 };
                let enemy = entities.find(e => e.type === 'enemy' && Math.hypot(e.x - en.x, e.y - en.y) < 250);
                if(enemy && en.petType === 'Protector') target = enemy;
                
                en.x += (target.x - en.x) * 0.07;
                en.y += (target.y - en.y) * 0.07;
                en.angle = Math.atan2(target.y - en.y, target.x - en.x);
                if(enemy && Math.hypot(en.x - enemy.x, en.y - enemy.y) < 30) enemy.dead = true;
            }

            if(en.type === 'enemy') {
                if(en.dead) return false;
                en.x += Math.sin(Date.now()/1000 + en.x) * 1;
            }

            ctx.save();
            ctx.translate(en.x - cam.x, en.y - cam.y);
            if(en.type === 'coin') {
                ctx.fillStyle = '#ffd700'; ctx.shadowBlur = 15; ctx.shadowColor = 'gold';
                ctx.beginPath(); ctx.arc(0,0, 6, 0, 7); ctx.fill();
            } else if(en.type === 'enemy') {
                ctx.fillStyle = '#ff3300'; ctx.shadowBlur = 10; ctx.shadowColor = 'red';
                ctx.beginPath(); for(let i=0; i<8; i++) { ctx.lineTo(Math.cos(i)*12, Math.sin(i)*12); ctx.lineTo(Math.cos(i+0.4)*5, Math.sin(i+0.4)*5); }
                ctx.fill();
            } else if(en.type === 'pet') {
                ctx.rotate(en.angle);
                ctx.fillStyle = en.petType === 'Protector' ? '#ff4444' : '#44ff88';
                ctx.beginPath(); ctx.ellipse(0,0, 10, 6, 0, 0, 7); ctx.fill();
                ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(-12, 5); ctx.lineTo(-12, -5); ctx.fill();
            }
            ctx.restore();
            return true;
        });

        // Draw Player Fish
        ctx.save();
        ctx.translate(fish.x - cam.x, fish.y - cam.y);
        ctx.rotate(fish.angle);
        ctx.shadowBlur = 25; ctx.shadowColor = '#00fbff';
        ctx.fillStyle = '#00fbff';
        // Detailed Tail
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-30, 15 + fish.wiggle/2); ctx.lineTo(-30, -15 - fish.wiggle/2); ctx.fill();
        // Body
        ctx.beginPath(); ctx.ellipse(0, 0, 25, 16, 0, 0, 7); ctx.fill();
        // Fin
        ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-10, -20); ctx.lineTo(-5, -10); ctx.fill();
        // Eye
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(12, -6, 6, 0, 7); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(14, -6, 3, 0, 7); ctx.fill();
        ctx.restore();

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
