<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · COLOSSAL</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #001a33 0%, #00050a 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #stats-panel { 
            position: absolute; top: 10px; left: 10px; color: #00fbff; 
            font-size: 11px; pointer-events: none;
            background: rgba(0,0,0,0.85); padding: 12px; border: 1px solid #00fbff; border-radius: 8px;
            line-height: 1.5; z-index: 10; box-shadow: 0 0 15px rgba(0,251,255,0.2);
        }
        .hp-bar-bg { width: 120px; height: 8px; background: #300; border: 1px solid #f00; margin: 5px 0; }
        #hp-fill { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }

        #event-ui {
            position: absolute; top: 20%; width: 100%; text-align: center;
            color: #ff3300; font-weight: bold; font-size: 20px; text-shadow: 0 0 10px #000;
            pointer-events: none; opacity: 0; transition: opacity 0.5s;
        }

        #audio-prompt {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00fbff; background: rgba(0,21,41,0.95); padding: 30px; border: 2px solid #00fbff;
            border-radius: 20px; text-align: center; z-index: 200; font-weight: bold;
        }

        #controls {
            height: 140px; background: #000d1a; border-top: 2px solid #00fbff;
            display: flex; gap: 15px; padding: 20px 15px 45px 15px; z-index: 100;
        }
        .btn {
            flex: 1; background: linear-gradient(#002244, #001122); color: white; border: 1px solid #00fbff;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 12px; font-weight: bold; box-shadow: 0 4px 0 #005566;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; background: #00fbff; color: #000; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="game-container">
        <div id="event-ui">WORLD EVENT TRIGGERED</div>
        <div id="audio-prompt">TAP TO AWAKEN THE OCEAN<br><small>(Piano & Bass Engine)</small></div>
        <div id="stats-panel">
            <b>ENTITY: OCEAN SOUL</b><br>
            HP: <span id="hpText">15000</span>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            AGE: <span id="ageUI">0</span>s | SIZE: <span id="sizeUI">1.0</span>x<br>
            BIOMASS: <span id="coinUI">0</span> | GUARD: <span id="friendUI">0</span><br>
            MOOD: <span id="stateUI">IDLE</span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyShrimp">TRAINED<br>SHRIMP (5c)</div>
        <div class="btn" id="buyScout">ELITE<br>SCOUT (10c)</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0, friends = [], entities = [], bubbles = [], reefs = [];
    let cam = { x: 2500, y: 2500 };
    let fish = { x: 2500, y: 2500, tx: 2505, ty: 2505, angle: 0, hp: 15000, maxHp: 15000, age: 0, scale: 0.5, mood: 'IDLE' };
    let audioStarted = false, audioCtx, masterGain;

    // AUDIO ENGINE: Piano & Bass
    function startAudio() {
        if (audioStarted) return;
        audioStarted = true;
        document.getElementById('audio-prompt').style.display = 'none';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain(); masterGain.gain.value = 0.15; masterGain.connect(audioCtx.destination);
        
        // Ambient Piano Chords
        const notes = [261.63, 329.63, 392.00, 523.25]; // C Major vibes
        setInterval(() => {
            let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = notes[Math.floor(Math.random()*notes.length)];
            g.gain.setValueAtTime(0, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 1);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 6);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 6);
        }, 5000);

        // Sub Bass Drops
        setInterval(() => {
            let osc = audioCtx.createOscillator(); let g = audioCtx.createGain();
            osc.frequency.setValueAtTime(40, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 2);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2);
            osc.connect(g); g.connect(masterGain);
            osc.start(); osc.stop(audioCtx.currentTime + 2);
        }, 12000);
    }

    function playPing(f) { if(audioStarted) { let o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=f; g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3); o.connect(g); g.connect(masterGain); o.start(); o.stop(audioCtx.currentTime+0.3); } }

    // World Building
    for(let i=0; i<50; i++) reefs.push({x: Math.random()*6000, y: Math.random()*6000, size: 60+Math.random()*150, depth: 0.1+Math.random()*0.4, color: `hsl(220, 30%, ${2+Math.random()*8}%)`});

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.addEventListener('resize', resize); resize();

    // BUTTONS FIXED
    const setupBtn = (id, cost, type) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            if(coins >= cost) { coins -= cost; friends.push({x:fish.x, y:fish.y, type, wiggle:0}); updateUI(); playPing(500); }
            e.preventDefault();
        });
    };
    setupBtn('buyShrimp', 5, 'Shrimp');
    setupBtn('buyScout', 10, 'Scout');

    function updateUI() {
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('friendUI').innerText = friends.length;
        document.getElementById('hpText').innerText = Math.floor(fish.hp);
        document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp)*100 + "%";
        document.getElementById('ageUI').innerText = Math.floor(fish.age);
        document.getElementById('sizeUI').innerText = fish.scale.toFixed(2);
        document.getElementById('stateUI').innerText = fish.mood;
    }

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        let wx = e.touches[0].clientX - rect.left + cam.x;
        let wy = e.touches[0].clientY - rect.top + cam.y;
        let hit = false;
        entities.forEach(en => {
            if((en.type==='shark' || en.type==='urchin') && Math.hypot(en.x-wx, en.y-wy) < 70) {
                en.hp -= 25; hit = true; playPing(150);
                if(en.hp <= 0) en.dead = true;
            }
        });
        if(!hit) { fish.tx = wx; fish.ty = wy; fish.mood = 'HUNTING'; }
        updateUI();
    });

    function showEvent(txt) { let el = document.getElementById('event-ui'); el.innerText = txt; el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 3000); }

    function loop() {
        // Growth & Stats
        fish.age += 1/60;
        fish.scale = 0.5 + (fish.age / 300); // Grow to full size over 5 mins
        if(fish.hp < fish.maxHp) fish.hp += 0.5;

        // Camera & Movement
        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;
        fish.x += (fish.tx - fish.x) * 0.03;
        fish.y += (fish.ty - fish.y) * 0.03;
        fish.angle = Math.atan2(fish.ty - fish.y, fish.tx - fish.x);

        // World Events
        if(Math.random() < 0.001) { showEvent("PREDATOR SURGE"); for(let i=0; i<5; i++) entities.push({x: fish.x+(Math.random()-0.5)*2000, y: fish.y+(Math.random()-0.5)*2000, type:'shark', hp:200}); }

        // Bubbles
        if(Math.random() < 0.2) bubbles.push({x: fish.x + (Math.random()-0.5)*1200, y: cam.y + canvas.height + 50, s: 1+Math.random()*3, v: 1+Math.random()*2});

        ctx.clearRect(0,0, canvas.width, canvas.height);
        reefs.forEach(r => { ctx.fillStyle = r.color; ctx.beginPath(); ctx.arc(r.x - cam.x*r.depth, r.y - cam.y*r.depth, r.size, 0, 7); ctx.fill(); });

        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        bubbles = bubbles.filter(b => { b.y -= b.v; ctx.beginPath(); ctx.arc(b.x-cam.x, b.y-cam.y, b.s, 0, 7); ctx.fill(); return b.y > cam.y - 50; });

        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            if(en.type === 'coin' && d < 50) { coins++; updateUI(); playPing(1000); return false; }
            if((en.type === 'shark' || en.type === 'urchin') && d < 60) { fish.hp -= 0.8; fish.mood = 'INJURED'; }

            ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y);
            if(en.type === 'shark') {
                en.x += (fish.x - en.x) * 0.012; en.y += (fish.y - en.y) * 0.012;
                ctx.rotate(Math.atan2(fish.y-en.y, fish.x-en.x));
                ctx.fillStyle='#2c3e50'; ctx.beginPath(); ctx.ellipse(0,0,40,14,0,0,7); ctx.fill();
                ctx.fillStyle='red'; ctx.beginPath(); ctx.arc(20,-4,2.5,0,7); ctx.fill();
            } else if(en.type === 'urchin') {
                ctx.fillStyle='#1a0633'; ctx.beginPath(); ctx.arc(0,0,18,0,7); ctx.fill();
            } else {
                ctx.fillStyle='#ffd700'; ctx.shadowBlur=10; ctx.shadowColor='gold'; ctx.beginPath(); ctx.arc(0,0,6,0,7); ctx.fill(); ctx.shadowBlur=0;
            }
            ctx.restore();
            return !en.dead;
        });

        // Smart Shrimp Orbit
        friends.forEach((fr, i) => {
            let orbitX = fish.x + Math.cos(Date.now()/800 + i) * (70 + fish.scale*10);
            let orbitY = fish.y + Math.sin(Date.now()/800 + i) * (70 + fish.scale*10);
            let target = { x: orbitX, y: orbitY };
            let enemy = entities.find(e => (e.type==='shark' || e.type==='urchin') && Math.hypot(e.x-fish.x, e.y-fish.y) < 300);
            if(enemy) target = enemy;
            fr.x += (target.x - fr.x) * 0.1; fr.y += (target.y - fr.y) * 0.1;
            if(enemy && Math.hypot(fr.x-enemy.x, fr.y-enemy.y) < 40) { enemy.dead = true; coins++; updateUI(); playPing(700); }
            
            // Draw Shrimp
            ctx.save(); ctx.translate(fr.x-cam.x, fr.y-cam.y);
            ctx.rotate(Math.atan2(fish.y-fr.y, fish.x-fr.x) + Math.PI);
            ctx.fillStyle = '#ff7f50'; ctx.beginPath(); ctx.ellipse(0,0,10,5,0,0,7); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(-12,5); ctx.lineTo(-12,-5); ctx.fill();
            ctx.restore();
        });

        // Draw Player (with Growth Scale)
        ctx.save(); ctx.translate(fish.x-cam.x, fish.y-cam.y); ctx.rotate(fish.angle); ctx.scale(fish.scale, fish.scale);
        ctx.fillStyle = '#00fbff'; ctx.shadowBlur=25; ctx.shadowColor='#00fbff';
        ctx.beginPath(); ctx.ellipse(0,0,25,15,0,0,7); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-35,15); ctx.lineTo(-35,-15); ctx.fill();
        ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(12,-6,6,0,7); ctx.fill();
        ctx.fillStyle='black'; ctx.beginPath(); ctx.arc(14,-6,3,0,7); ctx.fill();
        ctx.restore();

        if(Math.random() < 0.04 && entities.length < 60) entities.push({x: fish.x+(Math.random()-0.5)*2000, y: fish.y+(Math.random()-0.5)*2000, type: Math.random()<0.2 ? 'shark' : 'coin', hp: 100, dead:false});

        requestAnimationFrame(loop);
    }
    loop();
    updateUI();
</script>
</body>
</html>
