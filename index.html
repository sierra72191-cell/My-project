<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · TACTICAL</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000408; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #001a33 0%, #000205 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #stats-panel { 
            position: absolute; top: 12px; left: 12px; color: #00fbff; 
            font-size: 11px; pointer-events: none;
            background: rgba(0, 10, 20, 0.9); padding: 15px; border: 2px solid #00fbff; 
            border-radius: 12px; line-height: 1.6; z-index: 10;
            min-width: 180px;
        }
        .hp-bar-bg { width: 100%; height: 10px; background: #200; border: 1px solid #ff0055; margin: 8px 0; border-radius: 4px; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff00ff); }

        #controls { height: 145px; background: #000a14; border-top: 3px solid #00fbff; display: flex; gap: 12px; padding: 15px 12px 40px 12px; z-index: 100; }
        .btn { flex: 1; background: #001a33; color: #00fbff; border: 2px solid #00fbff; border-radius: 18px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 11px; font-weight: bold; }
        .btn:active { background: #00fbff; color: #000; }
    </style>
</head>
<body onclick="startAudio()">

    <div id="game-container">
        <div id="stats-panel">
            <b style="color: #ff00ff; font-size: 13px;">[ NEON SOUL ]</b><br>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            HP: <span id="hpText">15000</span><br>
            KILLS: <span id="killUI">0</span> | BIOMASS: <span id="coinUI">0</span><br>
            ARMY: <span id="friendUI">0</span> | SIZE: <span id="sizeUI">1.0</span>x
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyShrimp">SHRIMP<br>(DPS)</div>
        <div class="btn" id="buyScout">STARFISH<br>(CC)</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0, kills = 0, friends = [], entities = [], bubbles = [], reefs = [], grass = [], damageTexts = [];
    let cam = { x: 2500, y: 2500 };
    let fish = { x: 2500, y: 2500, tx: 2505, ty: 2505, angle: 0, hp: 15000, maxHp: 15000, age: 0, scale: 0.5, wiggle: 0, flinchX: 0, flinchY: 0 };
    let audioStarted = false;

    function startAudio() { audioStarted = true; }

    // World Gen
    for(let i=0; i<30; i++) reefs.push({x: Math.random()*6000, y: Math.random()*6000, size: 50+Math.random()*80, depth: 0.15, color: `hsl(230, 20%, ${5+Math.random()*5}%)`});
    for(let i=0; i<80; i++) grass.push({x: Math.random()*6000, y: Math.random()*6000, h: 40+Math.random()*40, off: Math.random()*10});

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.addEventListener('resize', resize); resize();

    const setupBtn = (id, type) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            let cost = (type === 'Shrimp' ? 5 : 10);
            if(coins >= cost) { coins -= cost; friends.push({x:fish.x, y:fish.y, type, angle:0}); updateUI(); }
            e.preventDefault();
        });
    };
    setupBtn('buyShrimp', 'Shrimp'); setupBtn('buyScout', 'Scout');

    function updateUI() {
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('friendUI').innerText = friends.length;
        document.getElementById('killUI').innerText = kills;
        document.getElementById('hpText').innerText = Math.floor(fish.hp);
        document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp)*100 + "%";
        document.getElementById('sizeUI').innerText = fish.scale.toFixed(2);
    }

    function addDamageText(x, y, text, color) { damageTexts.push({x, y, text, color, life: 1.0}); }

    function drawEnemy(en) {
        ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y); 
        ctx.rotate(en.angle);
        if(en.type === 'shark') {
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(0,0,50,18,0,0,7); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-35,0); ctx.lineTo(-55, 15*Math.sin(Date.now()/150)); ctx.lineTo(-55, -15*Math.sin(Date.now()/150)); ctx.fill();
            ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(25, -5, 3, 0, 7); ctx.fill();
        } else if(en.type === 'octopus') {
            ctx.fillStyle = '#500'; ctx.beginPath(); ctx.ellipse(0,0,22,16,0,0,7); ctx.fill();
            ctx.strokeStyle = '#500'; ctx.lineWidth = 3;
            for(let i=0; i<8; i++) {
                ctx.beginPath(); ctx.moveTo(0,0);
                let a = (i*Math.PI/4) + Math.sin(Date.now()/200 + i)*0.6;
                ctx.lineTo(Math.cos(a)*30, Math.sin(a)*30); ctx.stroke();
            }
        } else {
            ctx.fillStyle = '#ff4400'; ctx.beginPath(); ctx.ellipse(0,0,20,10,0,0,7); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-28, 8*Math.sin(Date.now()/100)); ctx.lineTo(-28, -8*Math.sin(Date.now()/100)); ctx.fill();
        }
        ctx.restore();
    }

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
    });

    function loop() {
        fish.age += 1/60; fish.scale = 0.5 + (fish.age / 600);
        if(fish.hp < fish.maxHp) fish.hp += 1.2;
        fish.flinchX *= 0.9; fish.flinchY *= 0.9;

        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;
        fish.x += (fish.tx + fish.flinchX - fish.x) * 0.03;
        fish.y += (fish.ty + fish.flinchY - fish.y) * 0.03;
        fish.angle = Math.atan2(fish.ty-fish.y, fish.tx-fish.x);
        fish.wiggle += 0.2;

        ctx.clearRect(0,0, canvas.width, canvas.height);

        // Environment
        reefs.forEach(r => { ctx.fillStyle = r.color; ctx.beginPath(); ctx.arc(r.x - cam.x*r.depth, r.y - cam.y*r.depth, r.size, 0, 7); ctx.fill(); });
        ctx.strokeStyle = '#0a2a1a'; ctx.lineWidth = 3;
        grass.forEach(g => {
            let sx = g.x - cam.x; let sy = g.y - cam.y;
            if(sx > -50 && sx < canvas.width+50) {
                ctx.beginPath(); ctx.moveTo(sx, sy);
                ctx.quadraticCurveTo(sx + Math.sin(Date.now()/1000 + g.off)*15, sy - g.h/2, sx, sy - g.h);
                ctx.stroke();
            }
        });

        // Damage Text System
        ctx.font = "bold 14px Courier New";
        damageTexts = damageTexts.filter(t => {
            t.y -= 1; t.life -= 0.02;
            ctx.fillStyle = t.color.replace(')', `,${t.life})`).replace('rgb', 'rgba');
            ctx.fillText(t.text, t.x-cam.x, t.y-cam.y);
            return t.life > 0;
        });

        // AI Logic: Awareness Radii
        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            if(en.type === 'coin' && d < 60) { coins++; updateUI(); return false; }

            if(en.stun > 0) { en.stun--; ctx.globalAlpha = 0.4; }
            else {
                // If in range (450px), chase. Otherwise, wander.
                if(d < 450) {
                    en.angle = Math.atan2(fish.y - en.y, fish.x - en.x);
                    en.x += Math.cos(en.angle) * en.speed;
                    en.y += Math.sin(en.angle) * en.speed;
                } else {
                    en.x += Math.cos(en.wanderAng) * 0.5;
                    en.y += Math.sin(en.wanderAng) * 0.5;
                    if(Math.random() < 0.01) en.wanderAng = Math.random() * Math.PI * 2;
                    en.angle = en.wanderAng;
                }
            }

            drawEnemy(en); ctx.globalAlpha = 1.0;

            if(d < 70 && en.stun <= 0) {
                fish.hp -= (en.type === 'shark' ? 6 : 1.5);
                let p = Math.atan2(fish.y - en.y, fish.x - en.x);
                fish.flinchX += Math.cos(p) * 40; fish.flinchY += Math.sin(p) * 40;
            }
            return !en.dead;
        });

        friends.forEach((fr, i) => {
            let orbitX = fish.x + Math.cos(Date.now()/1000 + i) * (110 + fish.scale*10);
            let orbitY = fish.y + Math.sin(Date.now()/1000 + i) * (110 + fish.scale*10);
            let enemy = entities.find(e => e.type !== 'coin' && Math.hypot(e.x-fish.x, e.y-fish.y) < 350);
            let target = enemy || {x: orbitX, y: orbitY};
            
            fr.x += (target.x - fr.x) * 0.1; fr.y += (target.y - fr.y) * 0.1;
            
            if(enemy && Math.hypot(fr.x-enemy.x, fr.y-enemy.y) < 60) {
                if(fr.type === 'Shrimp') { 
                    enemy.hp -= 2; 
                    if(Math.random() < 0.1) addDamageText(enemy.x, enemy.y, "-HP", "rgb(255,100,100)");
                    if(enemy.hp <= 0) { enemy.dead=true; coins+=3; kills++; updateUI(); } 
                } else { 
                    if(enemy.stun <= 0) addDamageText(enemy.x, enemy.y, "STUNNED", "rgb(255,255,0)");
                    enemy.stun = 150; 
                }
            }
            ctx.save(); ctx.translate(fr.x-cam.x, fr.y-cam.y);
            if(fr.type === 'Shrimp') {
                ctx.rotate(Math.atan2(target.y-fr.y, target.x-fr.x));
                ctx.fillStyle = '#ff7f50'; ctx.beginPath(); ctx.ellipse(0,0,10,5,0,0,7); ctx.fill();
            } else {
                ctx.rotate(Date.now()/500); ctx.fillStyle = '#f0ff00';
                ctx.beginPath(); for(let j=0; j<5; j++) { ctx.rotate(Math.PI*2/5); ctx.lineTo(12,0); ctx.lineTo(5,3); } ctx.fill();
            }
            ctx.restore();
        });

        // PLAYER
        ctx.save(); ctx.translate(fish.x-cam.x, fish.y-cam.y); ctx.rotate(fish.angle); ctx.scale(fish.scale, fish.scale);
        ctx.shadowBlur=30; ctx.shadowColor='#ff00ff'; ctx.fillStyle = '#cc00ff';
        ctx.beginPath(); ctx.ellipse(0,0,28,16,0,0,7); ctx.fill();
        ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-40, 18*Math.sin(fish.wiggle)); ctx.lineTo(-40, -18*Math.sin(fish.wiggle)); ctx.fill();
        ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(15,-7,7,0,7); ctx.fill();
        ctx.restore();

        if(Math.random() < 0.03 && entities.length < 35) {
            let r = Math.random();
            let type = r < 0.07 ? 'shark' : (r < 0.2 ? 'octopus' : (r < 0.5 ? 'enemyFish' : 'coin'));
            entities.push({x: fish.x+(Math.random()-0.5)*2600, y: fish.y+(Math.random()-0.5)*2600, type, hp: type==='shark'?500:100, speed: type==='shark'?1.2:2.2, stun:0, dead:false, wanderAng: Math.random()*Math.PI*2, angle:0});
        }
        updateUI(); requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
