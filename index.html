<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Separate Game Area */
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #001a33 0%, #00050a 100%); }
        canvas { display: block; width: 100%; height: 100%; }

        /* Stats Overlay */
        #stats { 
            position: absolute; top: 10px; left: 10px; color: #00fbff; 
            font-weight: bold; text-shadow: 0 0 10px #00fbff; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;
        }

        /* Physical Button Bar for Android */
        #controls {
            height: 100px; background: #001529; border-top: 2px solid #00fbff;
            display: flex; gap: 10px; padding: 10px; z-index: 100;
        }
        .btn {
            flex: 1; background: #003366; color: white; border: 1px solid #00fbff;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            text-align: center; font-size: 13px; font-weight: bold; text-transform: uppercase;
        }
        .btn:active { background: #00fbff; color: #000; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="stats">🪙 <span id="coinUI">0</span> | 🛡️ <span id="friendUI">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyProtector">PROTECTOR<br>(5c)</div>
        <div class="btn" id="buyScout">SCOUT<br>(10c)</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0;
    let friends = [];
    let entities = [];
    let cam = { x: 2000, y: 2000 };
    let fish = { 
        x: 2000, y: 2000, tx: 2005, ty: 2005, angle: 0, 
        autoTimer: 0, isManual: false 
    };

    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // FIXED BUTTON LOGIC
    document.getElementById('buyProtector').addEventListener('touchstart', (e) => {
        if(coins >= 5) {
            coins -= 5;
            spawnFriend('Protector');
            updateUI();
        }
    });

    document.getElementById('buyScout').addEventListener('touchstart', (e) => {
        if(coins >= 10) {
            coins -= 10;
            spawnFriend('Scout');
            updateUI();
        }
    });

    function spawnFriend(type) {
        friends.push({ x: fish.x, y: fish.y, type: type, angle: 0 });
    }

    function updateUI() {
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('friendUI').innerText = friends.length;
    }

    // Input
    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
        fish.isManual = true;
        fish.autoTimer = 0;
    });

    function loop() {
        // AUTONOMOUS AI
        if (!fish.isManual || fish.autoTimer > 200) {
            if (Math.random() < 0.01) { // Change direction occasionally
                fish.tx = fish.x + (Math.random() - 0.5) * 600;
                fish.ty = fish.y + (Math.random() - 0.5) * 600;
                fish.isManual = false;
            }
        }
        fish.autoTimer++;

        // Camera
        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;

        // Fish Movement
        fish.x += (fish.tx - fish.x) * 0.03;
        fish.y += (fish.ty - fish.y) * 0.03;
        fish.angle = Math.atan2(fish.ty - fish.y, fish.tx - fish.x);

        // Spawn Items
        if(Math.random() < 0.04 && entities.length < 50) {
            entities.push({
                type: Math.random() < 0.2 ? 'enemy' : 'coin',
                x: fish.x + (Math.random()-0.5) * 1000,
                y: fish.y + (Math.random()-0.5) * 1000
            });
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ocean Background Detail
        ctx.strokeStyle = 'rgba(0, 251, 255, 0.1)';
        for(let i=0; i<5000; i+=250) {
            ctx.beginPath(); ctx.moveTo(i-cam.x, 0-cam.y); ctx.lineTo(i-cam.x, 5000-cam.y); ctx.stroke();
        }

        // Handle Entities
        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            if(en.type === 'coin' && d < 40) { coins++; updateUI(); return false; }
            
            ctx.save();
            ctx.translate(en.x - cam.x, en.y - cam.y);
            if(en.type === 'coin') {
                ctx.fillStyle = 'gold'; ctx.beginPath(); ctx.arc(0,0,6,0,7); ctx.fill();
            } else {
                ctx.fillStyle = 'red'; ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.fill();
            }
            ctx.restore();
            return d < 2000;
        });

        // Friends Logic
        friends.forEach((fr, i) => {
            let target = i === 0 ? fish : friends[i-1];
            fr.x += (target.x - fr.x) * 0.05;
            fr.y += (target.y - fr.y) * 0.05;
            ctx.fillStyle = fr.type === 'Protector' ? '#ff4d4d' : '#4dff88';
            ctx.beginPath(); ctx.arc(fr.x - cam.x, fr.y - cam.y, 8, 0, 7); ctx.fill();
        });

        // Draw Player
        ctx.save();
        ctx.translate(fish.x - cam.x, fish.y - cam.y);
        ctx.rotate(fish.angle);
        ctx.fillStyle = '#00fbff';
        ctx.shadowBlur = 15; ctx.shadowColor = '#00fbff';
        ctx.beginPath(); ctx.ellipse(0, 0, 20, 12, 0, 0, 7); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-25, 10); ctx.lineTo(-25, -10); ctx.fill();
        ctx.restore();

        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
