<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Realms: Mobile Optimized</title>
    <style>
        * { user-select: none; touch-action: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            background: #121412;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            background: #2a2a2a;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Top Bar: Stats */
        .top-stats {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
            border: 1px solid #e0a235;
            border-radius: 12px;
            padding: 5px 15px;
            display: flex;
            gap: 15px;
            color: #ffefc0;
            font-size: 12px;
            white-space: nowrap;
            z-index: 100;
        }

        /* Side Controls: Crafting */
        .side-panel {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }

        .action-btn {
            background: rgba(61, 43, 28, 0.9);
            border: 1px solid #f5bc70;
            color: #ffefcf;
            border-radius: 8px;
            padding: 10px;
            font-size: 10px;
            font-weight: bold;
            width: 80px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .action-btn:active { background: #f5bc70; color: #000; }

        /* Bottom Inventory */
        .bottom-ui {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .inventory-bar {
            background: rgba(0,0,0,0.8);
            border: 1px solid #b87c3a;
            border-radius: 20px;
            padding: 5px 15px;
            display: flex;
            gap: 15px;
            color: #fff;
            font-size: 13px;
            pointer-events: auto;
        }

        #plantMenu {
            display: none;
            position: absolute;
            bottom: 80px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #6b8c3e;
            padding: 10px;
            border-radius: 15px;
            gap: 10px;
            pointer-events: auto;
        }

        .plant-opt {
            padding: 8px;
            background: #2c2418;
            border: 1px solid #daa342;
            color: #ffe1a0;
            border-radius: 5px;
        }

        .toggle-active { background: #6b8c3e !important; color: #fff; border-color: #fff; }
        
        .xp-container { width: 120px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; border: 1px solid #555; }
        .xp-fill { height: 100%; background: #aaf0a0; width: 0%; transition: width 0.3s; }
        
        #tipMsg {
            position: absolute;
            top: 55px;
            background: rgba(0,0,0,0.6);
            color: #f5cd6d;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 10px;
            z-index: 90;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <canvas id="gameCanvas" width="1000" height="700"></canvas>

    <div class="top-stats">
        <span>❤️ <span id="hpVal">500</span></span>
        <span>🍗 <span id="hungerVal">100</span>%</span>
        <span>🌞 DAY <span id="dayVal">1</span></span>
        <div class="xp-container"><div class="xp-fill" id="xpFill"></div></div>
    </div>

    <div id="tipMsg">Tap to move. Collect 🪵 and 🪨 to craft!</div>

    <div class="side-panel">
        <button class="action-btn" id="toggleTillBtn">🌾 TILL</button>
        <button class="action-btn" onclick="craftWall()">🧱 WALL</button>
        <button class="action-btn" onclick="craftTower()">🗼 TOWER</button>
        <button class="action-btn" onclick="craftCampfire()">🔥 CAMP</button>
        <button class="action-btn" onclick="craftCrossbow()">🔨 BOW</button>
        <button class="action-btn" onclick="craftBolts()">🏹 BOLTS</button>
    </div>

    <div class="bottom-ui">
        <div id="plantMenu">
            <button class="plant-opt" onclick="confirmPlant('carrot')">🥕 Carrot</button>
            <button class="plant-opt" onclick="confirmPlant('corn')">🌽 Corn</button>
            <button class="plant-opt" onclick="confirmPlant('apple')">🍎 Apple</button>
            <button class="plant-opt" onclick="confirmPlant('wheat')">🌾 Wheat</button>
        </div>
        <div class="inventory-bar" id="inventoryBar">
            </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // --- Game Logic Constants ---
    const MAP_SIZE = 3000;
    let camera = { x: 0, y: 0 };
    let wood = 15, stone = 10;
    let seeds = { carrot: 3, corn: 2, apple: 1, wheat: 3 };
    let resources = [], structures = [], enemies = [], farmlands = [], projectiles = [];
    let activePlot = null; // for planting menu

    let player = {
        x: MAP_SIZE/2, y: MAP_SIZE/2,
        hp: 500, maxHp: 500, level: 1, xp: 0,
        hunger: 100, boltCount: 0, hasCrossbow: false,
        moveTarget: null
    };

    let game = { day: 1, dayTimer: 120, tillMode: false, gameOver: false };

    // --- Core Functions ---

    function updateUI() {
        document.getElementById('hpVal').innerText = Math.floor(player.hp);
        document.getElementById('hungerVal').innerText = Math.floor(player.hunger);
        document.getElementById('dayVal').innerText = game.day;
        let needed = player.level * 25;
        document.getElementById('xpFill').style.width = (player.xp / needed * 100) + "%";
        
        const inv = document.getElementById('inventoryBar');
        inv.innerHTML = `<span>🪵 ${wood}</span> <span>🪨 ${stone}</span> <span>🏹 ${player.boltCount}</span>`;
        if(player.hasCrossbow) inv.innerHTML += ` <b style="color:gold"> [BOW]</b>`;
    }

    function showTip(msg) {
        document.getElementById('tipMsg').innerText = msg;
    }

    // --- Farming Logic ---
    function handleTill(wx, wy) {
        let plot = farmlands.find(f => Math.hypot(f.x - wx, f.y - wy) < 40);
        if(!plot) {
            farmlands.push({x: wx, y: wy, planted: null, growth: 0, ready: false});
            showTip("Soil ready! Tap it to plant.");
        } else if (!plot.planted) {
            activePlot = plot;
            document.getElementById('plantMenu').style.display = 'flex';
        } else if (plot.ready) {
            seeds[plot.planted] += 3;
            player.hunger = Math.min(100, player.hunger + 15);
            plot.planted = null; plot.ready = false; plot.growth = 0;
            showTip("Harvested & Ate! +Hunger");
        }
    }

    function confirmPlant(type) {
        if(seeds[type] > 0 && activePlot) {
            seeds[type]--;
            activePlot.planted = type;
            activePlot.growth = 0;
            document.getElementById('plantMenu').style.display = 'none';
            showTip("Growing " + type + "...");
        } else {
            showTip("No seeds left!");
        }
    }

    // --- Crafting Logic ---
    function craftWall() { if(wood>=5 && stone>=2){ wood-=5; stone-=2; structures.push({x:player.x, y:player.y, type:'wall'}); } }
    function craftTower() { if(wood>=10 && stone>=10){ wood-=10; stone-=10; structures.push({x:player.x, y:player.y, type:'tower', cooldown:0}); } }
    function craftCampfire() { if(wood>=8){ wood-=8; structures.push({x:player.x, y:player.y, type:'campfire'}); } }
    function craftCrossbow() { if(!player.hasCrossbow && wood>=15){ wood-=15; player.hasCrossbow=true; showTip("Bow Crafted!"); } }
    function craftBolts() { if(wood>=2 && stone>=1){ wood-=2; stone-=1; player.boltCount+=5; } }

    // --- Input Handling ---
    function onTouch(e) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const tx = (touch.clientX - rect.left) * scaleX;
        const ty = (touch.clientY - rect.top) * scaleY;
        const wx = tx + camera.x;
        const wy = ty + camera.y;

        if(game.tillMode) {
            handleTill(wx, wy);
        } else {
            // Resource gathering
            let res = resources.find(r => Math.hypot(r.x - wx, r.y - wy) < 40);
            if(res) {
                res.hp--;
                if(res.hp <= 0) {
                    if(res.type==='tree') wood += 4; else stone += 3;
                    resources.splice(resources.indexOf(res), 1);
                }
            } else {
                player.moveTarget = {x: wx, y: wy};
            }
        }
    }

    // --- Main Game Loop ---
    function init() {
        for(let i=0; i<100; i++) {
            resources.push({
                x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE,
                type: Math.random() > 0.4 ? 'tree' : 'stone', hp: 5
            });
        }
        
        document.getElementById('toggleTillBtn').onclick = () => {
            game.tillMode = !game.tillMode;
            document.getElementById('toggleTillBtn').classList.toggle('toggle-active');
            document.getElementById('plantMenu').style.display = 'none';
        };

        canvas.addEventListener('touchstart', onTouch);
        canvas.addEventListener('mousedown', onTouch);
        requestAnimationFrame(loop);
    }

    function loop() {
        // Simple Physics & AI
        if(player.moveTarget) {
            let dx = player.moveTarget.x - player.x;
            let dy = player.moveTarget.y - player.y;
            let dist = Math.hypot(dx, dy);
            if(dist > 5) {
                player.x += (dx/dist) * 4;
                player.y += (dy/dist) * 4;
            }
        }

        // Hunger 
        player.hunger -= 0.01;
        if(player.hunger <= 0) player.hp -= 0.1;

        // Farming Growth
        farmlands.forEach(f => {
            if(f.planted && !f.ready) {
                f.growth += 0.01;
                if(f.growth > 10) f.ready = true;
            }
        });

        draw();
        updateUI();
        requestAnimationFrame(loop);
    }

    function draw() {
        camera.x = player.x - canvas.width/2;
        camera.y = player.y - canvas.height/2;
        
        ctx.fillStyle = "#34495e";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camera.x, -camera.y);

        // Draw Map Grid
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        for(let i=0; i<MAP_SIZE; i+=100) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, MAP_SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(MAP_SIZE, i); ctx.stroke();
        }

        // Resources
        resources.forEach(r => {
            ctx.fillStyle = r.type === 'tree' ? '#27ae60' : '#7f8c8d';
            ctx.fillRect(r.x-15, r.y-15, 30, 30);
        });

        // Farmlands
        farmlands.forEach(f => {
            ctx.fillStyle = f.ready ? "#f1c40f" : "#8e44ad";
            ctx.fillRect(f.x-20, f.y-20, 40, 40);
            if(f.planted) { ctx.fillStyle="#fff"; ctx.fillText(f.planted, f.x-15, f.y); }
        });

        // Structures
        structures.forEach(s => {
            ctx.fillStyle = "#e67e22";
            ctx.fillRect(s.x-20, s.y-20, 40, 40);
        });

        // Player
        ctx.fillStyle = "white";
        ctx.fillRect(player.x-15, player.y-15, 30, 30);
        
        ctx.restore();
    }

    init();
</script>
</body>
</html>
