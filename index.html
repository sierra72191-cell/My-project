<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SURVIVAL REALMS · FARM & FIGHT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a1f0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        /* HUD */
        .hud {
            position: fixed;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 16px;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            z-index: 20;
            border-left: 3px solid #0f0;
            pointer-events: none;
        }
        .stats-right {
            position: fixed;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 16px;
            color: #ffaa44;
            font-family: monospace;
            font-size: 11px;
            z-index: 20;
            text-align: right;
            pointer-events: none;
        }
        .inventory-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 10px 16px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            z-index: 30;
            border: 1px solid gold;
            overflow-x: auto;
            max-width: 95%;
        }
        .inv-slot {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            min-width: 70px;
            cursor: pointer;
            transition: 0.05s linear;
            border: 1px solid #555;
        }
        .inv-slot:active { transform: scale(0.95); background: #3a6a3a; }
        .selected { background: #3a8a3a; border: 2px solid #ffcc44; box-shadow: 0 0 10px gold; }
        .day-cycle {
            position: fixed;
            bottom: 100px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            font-size: 12px;
        }
        .action-buttons {
            position: fixed;
            bottom: 100px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 30;
        }
        .action-btn {
            background: #2a3a2a;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
        }
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a2a0a, #020a02);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-family: monospace;
        }
        .start-title { font-size: 44px; color: #0f0; text-shadow: 0 0 20px green; margin-bottom: 20px; }
        .start-btn { background: #2a6a2a; border: none; padding: 14px 28px; border-radius: 40px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .event-toast {
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: black;
            color: cyan;
            padding: 8px 18px;
            border-radius: 40px;
            z-index: 150;
            font-weight: bold;
            animation: fadeUp 2s forwards;
            pointer-events: none;
            white-space: nowrap;
            font-size: 12px;
        }
        @keyframes fadeUp { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%,-80%); } }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="hud" id="hudStats">❤️ 500/500 | ⚔️ DMG 1 | 🧪 LVL 1 | ✨ 0/100</div>
<div class="stats-right" id="statsRight">🪙 10 | 🪵 0 | 🪨 0</div>
<div class="inventory-bar" id="inventoryBar"></div>
<div class="day-cycle" id="dayCycle">🌞 DAY 1</div>
<div class="action-buttons">
    <button class="action-btn" id="tillBtn">🌾 TILL SOIL</button>
    <button class="action-btn" id="shopBtn">🛒 SHOP</button>
</div>
<div class="start-overlay" id="startOverlay">
    <div class="start-title">⚙️ SURVIVAL REALMS ⚙️</div>
    <div style="margin-bottom: 20px; text-align:center;">tap to move | select seed → tap tilled soil to plant</div>
    <button class="start-btn" id="startBtn">▶ BEGIN</button>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let gameRunning = false;
        
        const WORLD_SIZE = 5000;
        let camera = { x: 0, y: 0 };
        
        // Player
        let player = {
            x: WORLD_SIZE/2, y: WORLD_SIZE/2,
            hp: 500, maxHp: 500,
            damage: 1,
            level: 1, xp: 0, xpNeeded: 100,
            coins: 10,
            wood: 0, stone: 0
        };
        
        // Inventory system
        let inventory = {
            seeds: { Pumpkin: 3, Apple: 2, Corn: 5, Wheat: 4, Carrot: 3 },
            selectedCrop: "Pumpkin"
        };
        
        // World objects
        let trees = [], rocks = [], enemies = [];
        let tilledSoil = []; // { x, y }
        let crops = [];      // { x, y, type, growth }
        
        let targetX = null, targetY = null;
        let actionMode = "move"; // "till" or "move"
        
        // Day/night
        let dayCount = 1;
        let timeOfDay = 0;
        let isNight = false;
        let campfireX = player.x, campfireY = player.y;
        
        let eventTimer = 0;
        let particles = [];
        
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        function updateCamera() { camera.x = player.x - width/2; camera.y = player.y - height/2; camera.x = Math.min(Math.max(camera.x, 0), WORLD_SIZE - width); camera.y = Math.min(Math.max(camera.y, 0), WORLD_SIZE - height); }
        function worldToScreen(wx, wy) { return { x: wx - camera.x, y: wy - camera.y }; }
        
        function showToast(msg) { let div = document.createElement('div'); div.className = 'event-toast'; div.innerText = msg; document.body.appendChild(div); setTimeout(()=>div.remove(), 2000); }
        
        function updateUI() {
            document.getElementById('hudStats').innerHTML = `❤️ ${Math.floor(player.hp)}/${player.maxHp} | ⚔️ DMG ${player.damage} | 🧪 LVL ${player.level} | ✨ ${player.xp}/${player.xpNeeded}`;
            document.getElementById('statsRight').innerHTML = `🪙 ${Math.floor(player.coins)} | 🪵 ${player.wood} | 🪨 ${player.stone}`;
            document.getElementById('dayCycle').innerHTML = isNight ? `🌙 NIGHT ${dayCount} 🔥` : `🌞 DAY ${dayCount}`;
            // render inventory bar
            let bar = document.getElementById('inventoryBar');
            bar.innerHTML = '';
            for(let [crop, amount] of Object.entries(inventory.seeds)) {
                let slot = document.createElement('div');
                slot.className = `inv-slot ${inventory.selectedCrop === crop ? 'selected' : ''}`;
                slot.innerHTML = `🌱 ${crop}<br>${amount}`;
                slot.onclick = (e) => { e.stopPropagation(); inventory.selectedCrop = crop; updateUI(); showToast(`Selected ${crop} seeds`); };
                bar.appendChild(slot);
            }
        }
        
        function addXP(amount) {
            player.xp += amount;
            while(player.xp >= player.xpNeeded) {
                player.xp -= player.xpNeeded;
                player.level++;
                player.damage++;
                player.maxHp += 25;
                player.hp = player.maxHp;
                player.xpNeeded = Math.floor(100 + player.level * 15);
                showToast(`⚡ LVL UP! +DMG +HP`);
            }
            updateUI();
        }
        
        function spawnWorld() {
            for(let i=0;i<100;i++) { trees.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, hp: 5 }); rocks.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, hp: 8 }); }
            // random seed drops
            for(let i=0;i<30;i++) {
                let cropsList = Object.keys(inventory.seeds);
                let randCrop = cropsList[Math.floor(Math.random()*cropsList.length)];
                inventory.seeds[randCrop] += 1;
            }
            updateUI();
        }
        
        function spawnEnemy() {
            let angle = Math.random() * Math.PI * 2;
            let dist = 350 + Math.random() * 250;
            let x = player.x + Math.cos(angle)*dist, y = player.y + Math.sin(angle)*dist;
            x = Math.min(Math.max(x, 50), WORLD_SIZE-50); y = Math.min(Math.max(y, 50), WORLD_SIZE-50);
            let types = ["GOBLIN", "WOLF", "SLIME"];
            let type = types[Math.floor(Math.random()*3)];
            enemies.push({ x, y, hp: 6+player.level, maxHp: 6+player.level, damage: 1, radius: 22, speed: 42, attackCooldown: 0, type: type });
        }
        
        function tillSoil(tx, ty) {
            // check if already tilled
            for(let t of tilledSoil) if(Math.hypot(t.x - tx, t.y - ty) < 25) return false;
            tilledSoil.push({ x: tx, y: ty });
            showToast("🌾 Tilled soil");
            return true;
        }
        
        function plantCrop(tx, ty) {
            let foundTill = null;
            for(let t of tilledSoil) if(Math.hypot(t.x - tx, t.y - ty) < 30) { foundTill = t; break; }
            if(!foundTill) { showToast("❌ Need tilled soil first!"); return false; }
            let cropType = inventory.selectedCrop;
            if(inventory.seeds[cropType] <= 0) { showToast(`❌ No ${cropType} seeds!`); return false; }
            // check if crop already there
            for(let c of crops) if(Math.hypot(c.x - tx, c.y - ty) < 25) { showToast("❌ Crop already here"); return false; }
            inventory.seeds[cropType]--;
            crops.push({ x: tx, y: ty, type: cropType, growth: 0, maxGrowth: 8 });
            showToast(`🌱 Planted ${cropType}`);
            updateUI();
            return true;
        }
        
        function updateGame(delta) {
            if(!gameRunning) return;
            if(delta > 0.033) delta = 0.033;
            
            timeOfDay += delta / 90;
            if(timeOfDay >= 1) { timeOfDay = 0; dayCount++; isNight = false; showToast("🌅 DAYBREAK"); updateUI(); }
            isNight = timeOfDay > 0.55;
            
            let nearCampfire = Math.hypot(player.x - campfireX, player.y - campfireY) < 130;
            
            // movement
            if(targetX !== null && targetY !== null) {
                let dx = targetX - player.x, dy = targetY - player.y;
                if(Math.hypot(dx,dy) < 20) {
                    if(actionMode === "till") tillSoil(targetX, targetY);
                    else if(actionMode === "move") { /* just move */ }
                    targetX = null; targetY = null;
                } else {
                    let angle = Math.atan2(dy,dx);
                    let speed = 190;
                    player.x += Math.cos(angle) * speed * delta;
                    player.y += Math.sin(angle) * speed * delta;
                    player.x = Math.min(Math.max(player.x, 35), WORLD_SIZE-35);
                    player.y = Math.min(Math.max(player.y, 35), WORLD_SIZE-35);
                }
            }
            
            // crop growth
            for(let c of crops) { c.growth += delta * 0.25; if(c.growth >= c.maxGrowth && Math.random()<0.02) { let reward = 2 + Math.floor(Math.random()*3); inventory.seeds[c.type] += reward; showToast(`🍅 Harvested ${c.type} +${reward} seeds`); crops.splice(crops.indexOf(c),1); updateUI(); } }
            
            // enemies
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let dist = Math.hypot(e.x - player.x, e.y - player.y);
                if(dist < 220 && !(nearCampfire && isNight)) {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    e.x += Math.cos(angle) * e.speed * delta;
                    e.y += Math.sin(angle) * e.speed * delta;
                    if(dist < 32) {
                        if(e.attackCooldown <= 0) { player.hp -= e.damage; e.attackCooldown = 0.8; if(player.hp <= 0) { gameRunning = false; alert("GAME OVER"); location.reload(); } updateUI(); }
                    }
                    if(dist < 55) {
                        e.hp -= player.damage * delta * 3.5;
                        if(e.hp <= 0) { enemies.splice(i,1); i--; let gain = 12+player.level*2; addXP(gain); player.coins += 2+Math.floor(Math.random()*4); updateUI(); showToast(`+${gain} XP +🪙`); }
                    }
                }
                if(e.attackCooldown > 0) e.attackCooldown -= delta;
            }
            
            let spawnRate = isNight ? 1.2 : 0.35;
            if(Math.random() < spawnRate * delta && enemies.length < (isNight ? 12 : 5)) { if(!(nearCampfire && isNight)) spawnEnemy(); }
            
            eventTimer += delta;
            if(eventTimer > 50 && gameRunning) {
                eventTimer = 0;
                if(Math.random()<0.4) { player.coins += 8; showToast("💰 TRAVELING MERCHANT +8 coins"); updateUI(); }
                else if(Math.random()<0.7) { addXP(20); showToast("✨ MYSTIC SHRINE +20 XP"); }
                else { for(let i=0;i<2;i++) spawnEnemy(); showToast("💀 RAIDERS!"); }
            }
        }
        
        function draw() {
            ctx.clearRect(0,0,width,height);
            let bgColor = isNight ? "#0a1f2a" : "#5a9e4e";
            ctx.fillStyle = bgColor; ctx.fillRect(0,0,width,height);
            // ground texture
            for(let i=0;i<400;i++) { ctx.fillStyle = isNight ? "#1a4a3a" : "#7cbd5c"; ctx.fillRect((i*137)%width, (i*89)%height, 3,3); }
            // trees
            for(let t of trees) { let s=worldToScreen(t.x,t.y); ctx.fillStyle="#4a3a2a"; ctx.fillRect(s.x-8,s.y-15,16,30); ctx.fillStyle="#2a8c2a"; ctx.beginPath(); ctx.arc(s.x,s.y-18,14,0,Math.PI*2); ctx.fill(); }
            // rocks
            for(let r of rocks) { let s=worldToScreen(r.x,r.y); ctx.fillStyle="#888"; ctx.fillRect(s.x-10,s.y-7,20,14); }
            // tilled soil
            for(let t of tilledSoil) { let s=worldToScreen(t.x,t.y); ctx.fillStyle="#8b5a2b"; ctx.fillRect(s.x-12,s.y-8,24,16); ctx.fillStyle="#c97e3a"; ctx.fillRect(s.x-10,s.y-6,20,12); }
            // crops
            for(let c of crops) { let s=worldToScreen(c.x,c.y); let size = 6 + (c.growth/c.maxGrowth)*10; ctx.fillStyle = "#aaff77"; ctx.fillRect(s.x-size/2,s.y-size,size,size*1.5); ctx.fillStyle="yellow"; ctx.font="10px monospace"; ctx.fillText(c.type[0], s.x-3,s.y-3); }
            // enemies
            for(let e of enemies) { let s=worldToScreen(e.x,e.y); ctx.fillStyle = e.type==="GOBLIN"?"#aa5533": e.type==="WOLF"?"#886666":"#55aa77"; ctx.beginPath(); ctx.ellipse(s.x,s.y,18,22,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText(e.type[0], s.x-6,s.y-5); }
            // campfire aura
            let campPos = worldToScreen(campfireX, campfireY);
            ctx.globalAlpha=0.25; ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(campPos.x,campPos.y,85,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
            // player robot
            let ps = worldToScreen(player.x, player.y);
            ctx.fillStyle="#77ccff"; ctx.fillRect(ps.x-14,ps.y-18,28,34); ctx.fillStyle="#aaa"; ctx.fillRect(ps.x-8,ps.y-30,16,14); ctx.fillStyle="cyan"; ctx.fillRect(ps.x-6,ps.y-26,5,7); ctx.fillRect(ps.x+2,ps.y-26,5,7);
            ctx.fillStyle="white"; ctx.font="bold 12px monospace"; ctx.fillText("🤖", ps.x-4, ps.y-18);
            // particles
            for(let p of particles) { let s=worldToScreen(p.x,p.y); ctx.fillStyle=`rgba(255,100,0,${p.life})`; ctx.fillRect(s.x-2,s.y-2,4,4); }
            if(actionMode === "till") { ctx.fillStyle="white"; ctx.font="bold 14px monospace"; ctx.fillText("🌾 TILL MODE", 20, 80); }
        }
        
        function handleTap(e) {
            if(!gameRunning) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let sx, sy;
            if(e.touches) { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }
            else { sx=e.clientX; sy=e.clientY; }
            let wx = camera.x + sx, wy = camera.y + sy;
            // if planting mode: plant crop on tilled soil
            if(actionMode === "move") { targetX = wx; targetY = wy; }
            else if(actionMode === "till") { tillSoil(wx, wy); }
        }
        
        document.getElementById('tillBtn').onclick = () => { actionMode = "till"; showToast("🔨 TILL MODE: tap soil to till"); };
        document.getElementById('shopBtn').onclick = () => { showToast("🛒 SHOP coming soon!"); };
        document.getElementById('startBtn').onclick = () => { gameRunning = true; document.getElementById('startOverlay').style.display = 'none'; spawnWorld(); for(let i=0;i<3;i++) spawnEnemy(); updateUI(); };
        
        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('mousedown', handleTap);
        window.addEventListener('resize', ()=>{ resize(); updateCamera(); });
        resize();
        let lastTime=0;
        function loop(now) { let delta = Math.min(0.033, (now-lastTime)/1000); if(delta>0.01 && gameRunning) { updateGame(delta); updateCamera(); draw(); } lastTime=now; requestAnimationFrame(loop); }
        loop(performance.now());
        setInterval(()=>{ if(gameRunning) updateUI(); }, 100);
    })();
</script>
</body>
</html>
