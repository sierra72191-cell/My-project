<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nova Realms: Swarm Edition</title>
    <style>
        * { user-select: none; touch-action: none; box-sizing: border-box; outline: none; }
        body { margin: 0; background: #0a0c0a; height: 100vh; width: 100vw; overflow: hidden; font-family: monospace; color: #eee; }
        
        canvas { display: block; width: 100%; height: 100%; object-fit: cover; }

        /* Sleeker Top Bar */
        .top-ui {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 30px;
            padding: 4px 15px; display: flex; gap: 12px; align-items: center; z-index: 10; font-size: 11px;
        }
        .xp-bar { width: 80px; height: 6px; background: #222; border-radius: 3px; overflow: hidden; border: 1px solid #555; }
        .xp-fill { height: 100%; background: #00ffcc; width: 0%; }

        /* Micro Side Buttons */
        .side-btns {
            position: absolute; right: 10px; top: 55%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 5px; z-index: 10;
        }
        .btn {
            background: rgba(40,40,40,0.9); border: 1px solid #666; color: #fff;
            padding: 8px; border-radius: 6px; font-size: 9px; width: 65px; text-align: center;
        }
        .btn:active { background: #e0a235; color: #000; }
        .active-mode { background: #4a6723 !important; border-color: #b5ff6a; }

        /* Bottom Inventory Bar */
        .inv-bar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 1px solid #b87c3a; border-radius: 12px;
            padding: 5px 12px; display: flex; gap: 10px; z-index: 10; font-size: 12px;
        }

        #plantSelect {
            display: none; position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background: #1a1a1a; border: 2px solid #6b8c3e; border-radius: 10px; padding: 8px; gap: 8px;
        }
    </style>
</head>
<body>

<div class="top-ui">
    <span>❤️ <span id="hp">500</span></span>
    <span>🍗 <span id="hunger">100</span>%</span>
    <span>⚔️ Lv.<span id="lvl">1</span></span>
    <div class="xp-bar"><div class="xp-fill" id="xpF"></div></div>
    <span>🌞 <span id="day">1</span></span>
</div>

<div class="side-btns">
    <button class="btn" id="tillBtn">🌾 TILL</button>
    <button class="btn" onclick="craft('wall')">🧱 WALL</button>
    <button class="btn" onclick="craft('tower')">🗼 TOWER</button>
    <button class="btn" onclick="craft('fire')">🔥 CAMP</button>
    <button class="btn" onclick="craft('bolt')">🏹 BOLTS</button>
</div>

<div id="plantSelect">
    <button class="btn" onclick="confirmPlant('carrot')">🥕</button>
    <button class="btn" onclick="confirmPlant('corn')">🌽</button>
    <button class="btn" onclick="confirmPlant('apple')">🍎</button>
</div>

<div class="inv-bar" id="inv">
    <span>🪵 0</span><span>🪨 0</span><span>🏹 0</span>
</div>

<script>
const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');

const MAP_SIZE = 4000;
let cam = { x: 0, y: 0 };
let player = { x: 2000, y: 2000, hp: 500, maxHp: 500, hunger: 100, lvl: 1, xp: 0, bolts: 0, target: null };
let resources = [], enemies = [], structures = [], plots = [], particles = [];
let wood = 12, stone = 8, day = 1, tillMode = false, selectedPlot = null;

// Initial Setup
function init() {
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.onresize();
    spawnWorld();
    requestAnimationFrame(loop);
}

function spawnWorld() {
    for(let i=0; i<150; i++) spawnRes();
}

function spawnRes() {
    resources.push({
        x: Math.random()*MAP_SIZE, y: Math.random()*MAP_SIZE,
        type: Math.random() > 0.4 ? 'tree' : 'rock', taps: 10
    });
}

function spawnEnemy() {
    if(enemies.length > 40) return;
    const side = Math.random() * 4;
    let x = (Math.random() < 0.5) ? player.x - 800 : player.x + 800;
    let y = (Math.random() < 0.5) ? player.y - 800 : player.y + 800;
    const type = Math.random() > 0.3 ? 'spider' : 'snail';
    enemies.push({ x, y, type, hp: 50, alert: false });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    // Player Move
    if(player.target) {
        let dx = player.target.x - player.x, dy = player.target.y - player.y;
        let d = Math.hypot(dx, dy);
        if(d > 5) { player.x += dx/d * 5; player.y += dy/d * 5; }
    }

    cam.x = player.x - canvas.width/2;
    cam.y = player.y - canvas.height/2;

    // Orbit Ring Logic
    let ringSize = 60 + (player.lvl * 10);
    enemies.forEach((e, i) => {
        let d = Math.hypot(e.x - player.x, e.y - player.y);
        
        // Line of Sight Swarm
        if(d < 400) e.alert = true;
        if(e.alert) {
            let angle = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(angle) * (e.type === 'spider' ? 3 : 1.5);
            e.y += Math.sin(angle) * (e.type === 'spider' ? 3 : 1.5);
        }

        // Ring Damage
        if(d < ringSize) {
            e.hp -= 0.5; // Damage per frame/sec
            if(e.hp <= 0) { 
                enemies.splice(i, 1); 
                player.xp += 10; 
                if(player.xp >= player.lvl * 50) { player.lvl++; player.xp = 0; player.maxHp += 50; player.hp = player.maxHp; }
            }
        }

        // Player Contact Damage
        if(d < 30) player.hp -= 0.1;
    });

    // Tower Defense logic
    structures.forEach(s => {
        if(s.type === 'tower') {
            enemies.forEach(e => {
                if(Math.hypot(s.x-e.x, s.y-e.y) < 150) e.hp -= 0.2;
            });
        }
    });

    // Auto-Respawn
    if(Math.random() < 0.02) spawnEnemy();
    player.hunger -= 0.005;
    
    updateUI();
}

function draw() {
    ctx.fillStyle = '#1a1d1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    // Grid
    ctx.strokeStyle = '#222';
    for(let i=0; i<MAP_SIZE; i+=200) {
        ctx.strokeRect(i, 0, 200, MAP_SIZE);
        ctx.strokeRect(0, i, MAP_SIZE, 200);
    }

    // Plots
    plots.forEach(p => {
        ctx.fillStyle = '#5d4037'; // Brown soil
        ctx.fillRect(p.x-25, p.y-25, 50, 50);
        if(p.planted) {
            ctx.fillStyle = p.growth >= 100 ? 'gold' : '#2ecc71';
            ctx.fillRect(p.x-10, p.y-10, 20, 20);
            if(!p.ready && p.growth < 100) p.growth += 0.1;
        }
    });

    // Structures
    structures.forEach(s => {
        ctx.fillStyle = s.type === 'wall' ? '#111' : (s.type === 'fire' ? '#e67e22' : '#3498db');
        ctx.fillRect(s.x-20, s.y-20, 40, 40);
        if(s.type === 'tower') {
            ctx.strokeStyle = 'rgba(52, 152, 219, 0.3)';
            ctx.beginPath(); ctx.arc(s.x, s.y, 150, 0, Math.PI*2); ctx.stroke();
        }
    });

    // Resources
    resources.forEach(r => {
        ctx.fillStyle = r.type === 'tree' ? '#27ae60' : '#7f8c8d';
        ctx.fillRect(r.x-20, r.y-20, 40, 40);
        ctx.fillStyle = '#fff'; ctx.font = '10px Arial';
        ctx.fillText(r.taps, r.x-5, r.y-25);
    });

    // Enemies
    enemies.forEach(e => {
        ctx.fillStyle = e.type === 'spider' ? '#000' : '#555';
        ctx.fillRect(e.x-18, e.y-18, 36, 36);
        // Visual "legs" or impact
        ctx.strokeStyle = ctx.fillStyle;
        ctx.strokeRect(e.x-22, e.y-22, 44, 44);
    });

    // Player & Orbit Ring
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x-15, player.y-15, 30, 30);
    ctx.strokeStyle = 'cyan';
    ctx.lineWidth = 2;
    ctx.beginPath(); 
    ctx.arc(player.x, player.y, 60 + (player.lvl*10), 0, Math.PI*2); 
    ctx.stroke();

    ctx.restore();
}

function updateUI() {
    document.getElementById('hp').innerText = Math.floor(player.hp);
    document.getElementById('hunger').innerText = Math.floor(player.hunger);
    document.getElementById('lvl').innerText = player.lvl;
    document.getElementById('day').innerText = day;
    document.getElementById('xpF').style.width = (player.xp / (player.lvl*50) * 100) + "%";
    document.getElementById('inv').innerHTML = `<span>🪵 ${wood}</span> <span>🪨 ${stone}</span> <span>🏹 ${player.bolts}</span>`;
}

canvas.addEventListener('touchstart', (e) => {
    const rect = canvas.getBoundingClientRect();
    const tx = e.touches[0].clientX - rect.left, ty = e.touches[0].clientY - rect.top;
    const wx = tx + cam.x, wy = ty + cam.y;

    if(tillMode) {
        let p = plots.find(p => Math.hypot(p.x-wx, p.y-wy) < 50);
        if(!p) plots.push({x: wx, y: wy, planted: null, growth: 0});
        else { selectedPlot = p; document.getElementById('plantSelect').style.display = 'flex'; }
        return;
    }

    let res = resources.find(r => Math.hypot(r.x-wx, r.y-wy) < 50);
    if(res) {
        res.taps--;
        if(res.taps <= 0) {
            if(res.type === 'tree') wood += 5; else stone += 5;
            resources.splice(resources.indexOf(res), 1);
            spawnRes(); // Respawn elsewhere
        }
    } else {
        player.target = { x: wx, y: wy };
    }
});

function craft(item) {
    if(item === 'wall' && wood >= 5) { wood -= 5; structures.push({x: player.x, y: player.y, type: 'wall'}); }
    if(item === 'tower' && wood >= 15 && stone >= 10) { wood -= 15; stone -= 10; structures.push({x: player.x, y: player.y, type: 'tower'}); }
    if(item === 'fire' && wood >= 10) { wood -= 10; structures.push({x: player.x, y: player.y, type: 'fire'}); }
    if(item === 'bolt' && wood >= 2) { wood -= 2; player.bolts += 5; }
}

document.getElementById('tillBtn').onclick = () => {
    tillMode = !tillMode;
    document.getElementById('tillBtn').classList.toggle('active-mode');
};

function confirmPlant(type) {
    if(selectedPlot) {
        selectedPlot.planted = type;
        selectedPlot.growth = 0;
        document.getElementById('plantSelect').style.display = 'none';
    }
}

init();
</script>
</body>
</html>
