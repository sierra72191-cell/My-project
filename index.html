<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SURVIVAL REALMS · ROBOT SURVIVOR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body {
            background: #0a1f0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        /* HUD */
        .hud {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 20px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            z-index: 20;
            border-left: 3px solid #0f0;
            pointer-events: none;
            line-height: 1.5;
        }
        .stats-right {
            position: fixed;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            padding: 8px 14px;
            border-radius: 20px;
            color: #ffaa44;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            z-index: 20;
            border-right: 3px solid gold;
            text-align: right;
            pointer-events: none;
        }
        .inventory {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-family: monospace;
            font-size: 12px;
            z-index: 20;
            display: flex;
            gap: 12px;
            pointer-events: none;
        }
        .day-cycle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
        }
        .shop-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a1aff;
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            z-index: 30;
            border: 1px solid gold;
            display: none;
        }
        .shop-btn {
            background: #2a3a2a;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: gold;
            font-weight: bold;
            cursor: pointer;
        }
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0a2a0a, #020a02);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-family: monospace;
        }
        .start-title {
            font-size: 48px;
            color: #0f0;
            text-shadow: 0 0 20px green;
            margin-bottom: 20px;
        }
        .start-btn {
            background: #2a6a2a;
            border: none;
            padding: 16px 32px;
            border-radius: 40px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }
        .event-toast {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: black;
            color: cyan;
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 150;
            font-weight: bold;
            animation: fadeUp 2s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%,-50%) scale(0.9);}
            100% { opacity: 0; transform: translate(-50%,-100%) scale(1.1);}
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div class="hud" id="hudStats">❤️ 500 HP | ⚔️ DMG 1 | 🧪 LVL 1 | ✨ XP 0/100</div>
<div class="stats-right" id="statsRight">🪵 0 | 🪨 0 | 🌾 0 | 🪙 0</div>
<div class="inventory" id="inventory">🔧 0 Walls | 🌱 Seeds: 0</div>
<div class="day-cycle" id="dayCycle">🌞 DAY 1</div>
<div class="shop-panel" id="shopPanel">
    <button class="shop-btn" id="buyWeapon">⚔️ +DMG (50🪙)</button>
    <button class="shop-btn" id="buyArmor">🛡️ +HP (50🪙)</button>
    <button class="shop-btn" id="buySeed">🌱 Seed (10🪙)</button>
    <button class="shop-btn" id="buyWall">🧱 Wall (20🪙)</button>
</div>
<div class="start-overlay" id="startOverlay">
    <div class="start-title">⚙️ SURVIVAL REALMS ⚙️</div>
    <div style="margin-bottom: 20px;">tap to move | auto-fight | day/night cycle</div>
    <button class="start-btn" id="startBtn">▶ BEGIN</button>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let gameRunning = false;
        
        // WORLD (large)
        const WORLD_SIZE = 5000;
        let camera = { x: 0, y: 0 };
        
        // PLAYER
        let player = {
            x: WORLD_SIZE/2,
            y: WORLD_SIZE/2,
            hp: 500,
            maxHp: 500,
            damage: 1,
            level: 1,
            xp: 0,
            xpNeeded: 100,
            coins: 10,
            wood: 0,
            stone: 0,
            seeds: 3,
            walls: 0
        };
        
        let targetX = null, targetY = null;
        
        // WORLD ENTITIES
        let trees = [];
        let rocks = [];
        let plants = [];
        let walls = [];
        let enemies = [];
        let items = [];
        
        // day/night
        let dayCount = 1;
        let timeOfDay = 0; // 0-1, 0 = dawn, 0.5 = night
        let nightDuration = 0;
        let isNight = false;
        let campfireActive = false;
        let campfireX = player.x, campfireY = player.y;
        
        // random events
        let eventTimer = 0;
        
        // particles
        let particles = [];
        
        // resize and camera
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        function updateCamera() {
            camera.x = player.x - width/2;
            camera.y = player.y - height/2;
            camera.x = Math.min(Math.max(camera.x, 0), WORLD_SIZE - width);
            camera.y = Math.min(Math.max(camera.y, 0), WORLD_SIZE - height);
        }
        
        function worldToScreen(wx, wy) {
            return { x: wx - camera.x, y: wy - camera.y };
        }
        
        // spawn resources
        function spawnWorld() {
            for(let i=0;i<120;i++) {
                trees.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, hp: 5 });
                rocks.push({ x: Math.random() * WORLD_SIZE, y: Math.random() * WORLD_SIZE, hp: 8 });
            }
        }
        
        function spawnEnemyAroundPlayer() {
            if(!gameRunning) return;
            let angle = Math.random() * Math.PI * 2;
            let dist = 350 + Math.random() * 250;
            let x = player.x + Math.cos(angle)*dist;
            let y = player.y + Math.sin(angle)*dist;
            x = Math.min(Math.max(x, 50), WORLD_SIZE-50);
            y = Math.min(Math.max(y, 50), WORLD_SIZE-50);
            enemies.push({
                x, y, hp: 5 + player.level, maxHp: 5+player.level,
                damage: 1, radius: 20, speed: 45,
                attackCooldown: 0
            });
        }
        
        function showToast(msg) {
            let div = document.createElement('div');
            div.className = 'event-toast';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(()=>div.remove(), 2000);
        }
        
        function updateUI() {
            document.getElementById('hudStats').innerHTML = `❤️ ${Math.floor(player.hp)}/${player.maxHp} | ⚔️ DMG ${player.damage} | 🧪 LVL ${player.level} | ✨ ${player.xp}/${player.xpNeeded}`;
            document.getElementById('statsRight').innerHTML = `🪵 ${player.wood} | 🪨 ${player.stone} | 🌾 ${Math.floor(player.seeds)} | 🪙 ${Math.floor(player.coins)}`;
            document.getElementById('inventory').innerHTML = `🧱 Walls: ${player.walls} | 🌱 Seeds: ${Math.floor(player.seeds)}`;
            document.getElementById('dayCycle').innerHTML = isNight ? `🌙 NIGHT ${dayCount} 🔥` : `🌞 DAY ${dayCount}`;
        }
        
        function addXP(amount) {
            player.xp += amount;
            while(player.xp >= player.xpNeeded) {
                player.xp -= player.xpNeeded;
                player.level++;
                player.damage++;
                player.maxHp += 25;
                player.hp = player.maxHp;
                player.xpNeeded = Math.floor(100 + player.level * 15);
                showToast(`⚡ LEVEL UP! LVL ${player.level} | +DMG +HP`);
            }
            updateUI();
        }
        
        // actions
        function interactWithTile(tx, ty) {
            // chop trees
            for(let i=0;i<trees.length;i++) {
                let t = trees[i];
                if(Math.hypot(tx - t.x, ty - t.y) < 35) {
                    t.hp -= player.damage;
                    if(t.hp <= 0) {
                        trees.splice(i,1);
                        player.wood += 1 + Math.floor(Math.random()*2);
                        showToast("+🪵 wood");
                        updateUI();
                    }
                    return true;
                }
            }
            // mine rocks
            for(let i=0;i<rocks.length;i++) {
                let r = rocks[i];
                if(Math.hypot(tx - r.x, ty - r.y) < 35) {
                    r.hp -= player.damage;
                    if(r.hp <= 0) {
                        rocks.splice(i,1);
                        player.stone += 1;
                        showToast("+🪨 stone");
                        updateUI();
                    }
                    return true;
                }
            }
            // plant seeds
            if(player.seeds >= 1 && Math.random() < 0.6) {
                player.seeds -= 1;
                plants.push({ x: tx, y: ty, growth: 0, maxGrowth: 5 });
                showToast("🌱 planted seed");
                updateUI();
                return true;
            }
            return false;
        }
        
        function updateGame(delta) {
            if(!gameRunning) return;
            if(delta > 0.033) delta = 0.033;
            
            // day/night cycle (90 sec day, 45 sec night)
            timeOfDay += delta / 90;
            if(timeOfDay >= 1) { timeOfDay = 0; dayCount++; isNight = false; updateUI(); showToast("🌅 DAYBREAK"); }
            isNight = timeOfDay > 0.55;
            nightDuration = isNight ? delta : 0;
            
            // campfire protection (no enemies near campfire)
            let nearCampfire = Math.hypot(player.x - campfireX, player.y - campfireY) < 110;
            
            // move to target
            if(targetX !== null && targetY !== null) {
                let dx = targetX - player.x, dy = targetY - player.y;
                if(Math.hypot(dx,dy) < 12) {
                    targetX = null; targetY = null;
                    interactWithTile(player.x, player.y);
                } else {
                    let angle = Math.atan2(dy,dx);
                    let speed = 180;
                    player.x += Math.cos(angle) * speed * delta;
                    player.y += Math.sin(angle) * speed * delta;
                    player.x = Math.min(Math.max(player.x, 30), WORLD_SIZE-30);
                    player.y = Math.min(Math.max(player.y, 30), WORLD_SIZE-30);
                }
            }
            
            // plant growth
            for(let p of plants) { p.growth += delta * 0.3; if(p.growth >= p.maxGrowth && Math.random()<0.02) { player.seeds += 1; plants.splice(plants.indexOf(p),1); showToast("🌾 harvested +1 seed"); updateUI(); } }
            
            // enemy AI + auto combat
            for(let i=0;i<enemies.length;i++) {
                let e = enemies[i];
                let distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);
                // detection range
                if(distToPlayer < 200 && !nearCampfire) {
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    e.x += Math.cos(angle) * e.speed * delta;
                    e.y += Math.sin(angle) * e.speed * delta;
                    if(distToPlayer < 28) {
                        if(e.attackCooldown <= 0) {
                            player.hp -= e.damage;
                            e.attackCooldown = 0.8;
                            if(player.hp <= 0) { gameRunning = false; alert("GAME OVER"); location.reload(); }
                            updateUI();
                        }
                    }
                    // player auto attack
                    if(distToPlayer < 45) {
                        e.hp -= player.damage * delta * 3;
                        if(e.hp <= 0) {
                            enemies.splice(i,1); i--;
                            let gainedXP = 15 + player.level*2;
                            addXP(gainedXP);
                            player.coins += 3 + Math.floor(Math.random()*5);
                            showToast(`+${gainedXP} XP +${3} coins`);
                            updateUI();
                        }
                    }
                }
                if(e.attackCooldown > 0) e.attackCooldown -= delta;
            }
            
            // spawn enemies (more at night)
            let spawnRate = isNight ? 1.4 : 0.45;
            if(Math.random() < spawnRate * delta && enemies.length < (isNight ? 10 : 5)) {
                if(!nearCampfire || !isNight) spawnEnemyAroundPlayer();
            }
            
            // random events
            eventTimer += delta;
            if(eventTimer > 45 && gameRunning) {
                eventTimer = 0;
                let r = Math.random();
                if(r<0.3) { player.coins += 10; showToast("💰 WANDERING TRADER +10 coins"); }
                else if(r<0.6) { addXP(25); showToast("✨ MYSTIC SHRINE +25 XP"); }
                else { for(let i=0;i<2;i++) spawnEnemyAroundPlayer(); showToast("💀 WILD PACK ATTACK!"); }
                updateUI();
            }
            
            // particles
            for(let i=0;i<particles.length;i++) { particles[i].life -= delta; if(particles[i].life<=0) particles.splice(i,1), i--; }
        }
        
        // DRAW
        function draw() {
            ctx.clearRect(0,0,width,height);
            let bgColor = isNight ? "#0a1a2a" : "#5a9e4e";
            ctx.fillStyle = bgColor;
            ctx.fillRect(0,0,width,height);
            
            // grass details
            for(let i=0;i<200;i++) { ctx.fillStyle = isNight ? "#2a4a3a" : "#7cbd5c"; ctx.fillRect((i*131)%width, (i*57)%height, 2,2); }
            
            // trees
            for(let t of trees) { let s=worldToScreen(t.x,t.y); ctx.fillStyle="#3c2a1c"; ctx.fillRect(s.x-8,s.y-15,16,30); ctx.fillStyle="#2a8c2a"; ctx.beginPath(); ctx.arc(s.x,s.y-18,12,0,Math.PI*2); ctx.fill(); }
            // rocks
            for(let r of rocks) { let s=worldToScreen(r.x,r.y); ctx.fillStyle="#777"; ctx.fillRect(s.x-9,s.y-6,18,12); }
            // plants
            for(let p of plants) { let s=worldToScreen(p.x,p.y); ctx.fillStyle="#aaff77"; ctx.fillRect(s.x-3,s.y-5,6,10); }
            // walls
            for(let w of walls) { let s=worldToScreen(w.x,w.y); ctx.fillStyle="#aa8866"; ctx.fillRect(s.x-12,s.y-10,24,20); }
            // enemies
            for(let e of enemies) { let s=worldToScreen(e.x,e.y); ctx.fillStyle="#aa3355"; ctx.beginPath(); ctx.ellipse(s.x,s.y,16,20,0,0,Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText("👾",s.x-8,s.y-5); }
            
            // campfire aura
            let campPos = worldToScreen(campfireX, campfireY);
            ctx.globalAlpha=0.3; ctx.fillStyle="orange"; ctx.beginPath(); ctx.arc(campPos.x,campPos.y,70,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
            
            // player (robot)
            let ps = worldToScreen(player.x, player.y);
            ctx.fillStyle="#88ccff"; ctx.fillRect(ps.x-12,ps.y-15,24,30); ctx.fillStyle="#aaa"; ctx.fillRect(ps.x-6,ps.y-25,12,12); ctx.fillStyle="cyan"; ctx.fillRect(ps.x-4,ps.y-22,4,6); ctx.fillRect(ps.x,ps.y-22,4,6);
            
            // particles
            for(let p of particles) { let s=worldToScreen(p.x,p.y); ctx.fillStyle=`rgba(255,200,0,${p.life})`; ctx.fillRect(s.x-3,s.y-3,6,6); }
            
            // UI text
            if(campfireActive) { ctx.fillStyle="white"; ctx.font="bold 14px monospace"; ctx.fillText("🔥 CAMPFIRE SAFE ZONE", campPos.x-70,campPos.y-50); }
        }
        
        // input
        function handleTap(e) {
            if(!gameRunning) return;
            e.preventDefault();
            let rect = canvas.getBoundingClientRect();
            let sx, sy;
            if(e.touches) { sx=e.touches[0].clientX; sy=e.touches[0].clientY; }
            else { sx=e.clientX; sy=e.clientY; }
            let wx = camera.x + sx, wy = camera.y + sy;
            targetX = wx; targetY = wy;
            // interaction burst
        }
        
        function openShop() {
            document.getElementById('shopPanel').style.display = 'flex';
        }
        
        // buying
        document.getElementById('buyWeapon').onclick = () => { if(player.coins>=50) { player.coins-=50; player.damage+=2; showToast("⚔️ +2 DMG"); updateUI(); } else showToast("not enough coins"); };
        document.getElementById('buyArmor').onclick = () => { if(player.coins>=50) { player.coins-=50; player.maxHp+=30; player.hp=player.maxHp; showToast("🛡️ +30 MAX HP"); updateUI(); } };
        document.getElementById('buySeed').onclick = () => { if(player.coins>=10) { player.coins-=10; player.seeds+=3; showToast("🌱 +3 seeds"); updateUI(); } };
        document.getElementById('buyWall').onclick = () => { if(player.coins>=20 && player.wood>=5 && player.stone>=3) { player.coins-=20; player.wood-=5; player.stone-=3; player.walls++; walls.push({ x: player.x, y: player.y }); showToast("🧱 wall built"); updateUI(); } else showToast("need 20🪙 +5🪵 +3🪨"); };
        
        function startGame() {
            gameRunning = true;
            document.getElementById('startOverlay').style.display = 'none';
            spawnWorld();
            for(let i=0;i<3;i++) spawnEnemyAroundPlayer();
            campfireActive = true;
            updateUI();
        }
        
        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('mousedown', handleTap);
        window.addEventListener('resize', ()=>{ resize(); updateCamera(); });
        resize();
        let lastTime=0;
        function loop(now) {
            let delta = Math.min(0.033, (now-lastTime)/1000);
            if(delta>0.01 && gameRunning) { updateGame(delta); updateCamera(); draw(); }
            lastTime=now;
            requestAnimationFrame(loop);
        }
        document.getElementById('startBtn').onclick = startGame;
        setInterval(()=>{ if(gameRunning) updateUI(); }, 100);
        loop(performance.now());
    })();
</script>
</body>
</html>
