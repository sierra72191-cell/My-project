<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · EXPLORER</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000408; font-family: 'Courier New', monospace; display: flex; flex-direction: column; height: 100vh; }
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle at center, #001a33 0%, #000205 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #stats-panel { 
            position: absolute; top: 12px; left: 12px; color: #00fbff; 
            font-size: 10px; pointer-events: none;
            background: rgba(0, 10, 20, 0.9); padding: 15px; border: 2px solid #ff00ff; 
            border-radius: 12px; line-height: 1.5; z-index: 10; min-width: 190px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }
        .hp-bar-bg { width: 100%; height: 8px; background: #200; border: 1px solid #ff0055; margin: 6px 0; border-radius: 4px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff00ff); transition: width 0.3s; }

        #controls { height: 130px; background: #000a14; border-top: 2px solid #ff00ff; display: flex; gap: 8px; padding: 12px 10px 35px 10px; z-index: 100; }
        .btn { flex: 1; background: #001a33; color: #00fbff; border: 1px solid #00fbff; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .btn:active { background: #ff00ff; color: #fff; transform: scale(0.95); }
    </style>
</head>
<body onclick="startAudio()">

    <div id="game-container">
        <div id="stats-panel">
            <b style="color: #ff00ff; font-size: 12px;">SOUL CHASSIS: LVL <span id="lvlUI">1</span></b><br>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            SHIELD: <span id="shUI">0</span>% | HP: <span id="hpText">15000</span><br>
            KILLS: <span id="killUI">0</span> | BIOMASS: <span id="coinUI">0</span><br>
            EXP: <span id="expUI">0</span>/50 | SIZE: <span id="sizeUI">1.0</span>x
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyShrimp">SHRIMP<br>(5c)</div>
        <div class="btn" id="buyScout">STAR<br>(10c)</div>
        <div class="btn" id="buyTurtle">TURTLE<br>(20c)</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0, kills = 0, exp = 0, lvl = 1, friends = [], entities = [], bubbles = [], reefs = [], grass = [], damageTexts = [];
    let cam = { x: 2500, y: 2500 };
    let fish = { x: 2500, y: 2500, tx: 2505, ty: 2505, angle: 0, hp: 15000, maxHp: 15000, shield: 0, age: 0, scale: 0.5, wiggle: 0, flinchX: 0, flinchY: 0, wanderTimer: 0 };
    let audioStarted = false;

    function startAudio() { audioStarted = true; }

    // World Gen with Parallax Layers
    for(let i=0; i<40; i++) reefs.push({x: Math.random()*6000, y: Math.random()*6000, size: 40+Math.random()*100, depth: 0.1+Math.random()*0.2, color: `hsl(250, 20%, ${3+Math.random()*4}%)`});
    for(let i=0; i<100; i++) grass.push({x: Math.random()*6000, y: Math.random()*6000, h: 30+Math.random()*40, off: Math.random()*10});

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.addEventListener('resize', resize); resize();

    const setupBtn = (id, type) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            let costs = {Shrimp:5, Scout:10, Turtle:20};
            if(coins >= costs[type]) { coins -= costs[type]; friends.push({x:fish.x, y:fish.y, type, angle:0, hp:100}); updateUI(); }
            e.preventDefault();
        });
    };
    setupBtn('buyShrimp', 'Shrimp'); setupBtn('buyScout', 'Scout'); setupBtn('buyTurtle', 'Turtle');

    function updateUI() {
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('killUI').innerText = kills;
        document.getElementById('hpText').innerText = Math.floor(fish.hp);
        document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp)*100 + "%";
        document.getElementById('sizeUI').innerText = fish.scale.toFixed(2);
        document.getElementById('lvlUI').innerText = lvl;
        document.getElementById('expUI').innerText = exp;
        document.getElementById('shUI').innerText = Math.floor(fish.shield);
    }

    function addText(x, y, text, color) { damageTexts.push({x, y, text, color, life: 1.0}); }

    function drawTurtle(x, y) {
        ctx.save(); ctx.translate(x-cam.x, y-cam.y);
        ctx.fillStyle = '#2e8b57'; ctx.beginPath(); ctx.ellipse(0,0,18,14,0,0,7); ctx.fill(); // Shell
        ctx.fillStyle = '#3cb371'; ctx.beginPath(); ctx.arc(12,0,6,0,7); ctx.fill(); // Head
        ctx.restore();
    }

    function drawEnemy(en) {
        ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y); ctx.rotate(en.angle);
        if(en.type === 'shark') {
            ctx.fillStyle = '#0a0a0a'; ctx.beginPath(); ctx.ellipse(0,0,50,16,0,0,7); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-30,0); ctx.lineTo(-50, 12*Math.sin(Date.now()/150)); ctx.lineTo(-50, -12*Math.sin(Date.now()/150)); ctx.fill();
        } else if(en.type === 'octopus') {
            ctx.fillStyle = '#400'; ctx.beginPath(); ctx.ellipse(0,0,20,14,0,0,7); ctx.fill();
        } else {
            ctx.fillStyle = '#ff4400'; ctx.beginPath(); ctx.ellipse(0,0,18,9,0,0,7); ctx.fill();
        }
        ctx.restore();
    }

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
        fish.wanderTimer = 300; // Reset curiosity on manual touch
    });

    function loop() {
        // LEVELING SYSTEM
        if(exp >= lvl * 50) { exp = 0; lvl++; fish.maxHp += 2000; fish.hp = fish.maxHp; addText(fish.x, fish.y-50, "LEVEL UP!", "magenta"); }
        
        fish.age += 1/60; fish.scale = 0.5 + (lvl * 0.1);
        if(fish.hp < fish.maxHp) fish.hp += (1 + lvl);
        fish.flinchX *= 0.9; fish.flinchY *= 0.9;

        // CURIOSITY ENGINE: If idle, find coins or explore ruins
        fish.wanderTimer--;
        if(fish.wanderTimer <= 0) {
            let target = entities.find(e => e.type==='coin' && Math.hypot(e.x-fish.x, e.y-fish.y) < 800);
            if(target) { fish.tx = target.x; fish.ty = target.y; }
            else { fish.tx += (Math.random()-0.5)*500; fish.ty += (Math.random()-0.5)*500; }
            fish.wanderTimer = 180 + Math.random()*200;
        }

        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;
        fish.x += (fish.tx + fish.flinchX - fish.x) * 0.03;
        fish.y += (fish.ty + fish.flinchY - fish.y) * 0.03;
        fish.angle = Math.atan2(fish.ty-fish.y, fish.tx-fish.x);
        fish.wiggle += 0.2;

        ctx.clearRect(0,0, canvas.width, canvas.height);

        // Environment
        reefs.forEach(r => { ctx.fillStyle = r.color; ctx.beginPath(); ctx.arc(r.x - cam.x*r.depth, r.y - cam.y*r.depth, r.size, 0, 7); ctx.fill(); });
        ctx.strokeStyle = '#051a10'; ctx.lineWidth = 2;
        grass.forEach(g => {
            let sx = g.x - cam.x; let sy = g.y - cam.y;
            ctx.beginPath(); ctx.moveTo(sx, sy);
            ctx.quadraticCurveTo(sx + Math.sin(Date.now()/1000 + g.off)*15, sy - g.h/2, sx, sy - g.h); ctx.stroke();
        });

        // Floating Text
        damageTexts = damageTexts.filter(t => {
            t.y -= 1.5; t.life -= 0.02;
            ctx.fillStyle = t.color.replace(')', `,${t.life})`).replace('rgb', 'rgba');
            ctx.fillText(t.text, t.x-cam.x, t.y-cam.y); return t.life > 0;
        });

        // Entities & Enemies
        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            if(en.type === 'coin' && d < 65) { coins++; exp += 5; updateUI(); return false; }
            if(en.stun > 0) { en.stun--; ctx.globalAlpha = 0.4; }
            else if(d < 450) {
                en.angle = Math.atan2(fish.y - en.y, fish.x - en.x);
                en.x += Math.cos(en.angle) * en.speed; en.y += Math.sin(en.angle) * en.speed;
            }
            drawEnemy(en); ctx.globalAlpha = 1.0;
            if(d < 70 && en.stun <= 0) {
                if(fish.shield > 0) fish.shield -= 2;
                else fish.hp -= (en.type === 'shark' ? 10 : 3);
                let p = Math.atan2(fish.y - en.y, fish.x - en.x);
                fish.flinchX += Math.cos(p) * 45; fish.flinchY += Math.sin(p) * 45;
            }
            return !en.dead;
        });

        // Army & The New Turtle
        fish.shield = 0;
        friends.forEach((fr, i) => {
            let orbitX = fish.x + Math.cos(Date.now()/1000 + i) * (110 + (lvl*10));
            let orbitY = fish.y + Math.sin(Date.now()/1000 + i) * (110 + (lvl*10));
            let enemy = entities.find(e => e.type !== 'coin' && Math.hypot(e.x-fish.x, e.y-fish.y) < 400);
            let target = enemy || {x: orbitX, y: orbitY};
            fr.x += (target.x - fr.x) * 0.1; fr.y += (target.y - fr.y) * 0.1;
            
            if(fr.type === 'Turtle') fish.shield = Math.min(100, fish.shield + 20); // Each turtle adds 20% shield

            if(enemy && Math.hypot(fr.x-enemy.x, fr.y-enemy.y) < 65) {
                if(fr.type === 'Shrimp') { 
                    enemy.hp -= 2.5; if(enemy.hp <= 0) { enemy.dead=true; coins+=3; kills++; exp+=20; updateUI(); } 
                } else if(fr.type === 'Scout') { enemy.stun = 180; }
            }
            if(fr.type === 'Shrimp') { ctx.save(); ctx.translate(fr.x-cam.x, fr.y-cam.y); ctx.rotate(Math.atan2(target.y-fr.y, target.x-fr.x)); ctx.fillStyle='#ff7f50'; ctx.beginPath(); ctx.ellipse(0,0,10,5,0,0,7); ctx.fill(); ctx.restore(); }
            else if(fr.type === 'Scout') { ctx.save(); ctx.translate(fr.x-cam.x, fr.y-cam.y); ctx.rotate(Date.now()/500); ctx.fillStyle='#f0ff00'; ctx.beginPath(); for(let j=0; j<5; j++) { ctx.rotate(Math.PI*2/5); ctx.lineTo(12,0); ctx.lineTo(5,3); } ctx.fill(); ctx.restore(); }
            else drawTurtle(fr.x, fr.y);
        });

        // PLAYER: NEON SOUL
        ctx.save(); ctx.translate(fish.x-cam.x, fish.y-cam.y); ctx.rotate(fish.angle); ctx.scale(fish.scale, fish.scale);
        if(fish.shield > 0) { ctx.strokeStyle = '#00fbff'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0,0,40,0,7); ctx.stroke(); }
        ctx.shadowBlur=30; ctx.shadowColor='#ff00ff'; ctx.fillStyle = '#cc00ff';
        ctx.beginPath(); ctx.ellipse(0,0,28,16,0,0,7); ctx.fill();
        ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-40, 18*Math.sin(fish.wiggle)); ctx.lineTo(-40, -18*Math.sin(fish.wiggle)); ctx.fill();
        ctx.restore();

        if(Math.random() < 0.04 && entities.length < 35) {
            let r = Math.random();
            let type = r < 0.08 ? 'shark' : (r < 0.2 ? 'octopus' : (r < 0.5 ? 'enemyFish' : 'coin'));
            entities.push({x: fish.x+(Math.random()-0.5)*2600, y: fish.y+(Math.random()-0.5)*2600, type, hp: type==='shark'?500:100, speed: type==='shark'?1.3:2.3, stun:0, dead:false, angle:0});
        }
        updateUI(); requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
