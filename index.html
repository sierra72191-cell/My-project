<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · EVOLUTION</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000408; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: linear-gradient(to bottom, #001a33 0%, #000205 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #stats-panel { 
            position: absolute; top: 12px; left: 12px; color: #00fbff; 
            font-size: 10px; pointer-events: none;
            background: rgba(0, 10, 20, 0.9); padding: 15px; border: 1px solid #00fbff; 
            border-radius: 12px; z-index: 10; min-width: 220px;
        }
        .depth-highlight { color: #fff; font-size: 14px; text-shadow: 0 0 10px #00fbff; font-weight: bold; display: block; margin-top: 5px; }
        .hp-bar-bg { width: 100%; height: 100%; background: #200; margin: 6px 0; border-radius: 4px; border: 1px solid #ff0055; height: 10px;}
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff00ff); transition: width 0.3s; }

        #controls { height: 140px; background: #00070e; border-top: 2px solid #00fbff; display: flex; gap: 8px; padding: 10px; z-index: 100; padding-bottom: 35px; }
        .btn { flex: 1; background: #001a33; color: #00fbff; border: 1px solid #00fbff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }
        .icon-box { font-size: 22px; margin-bottom: 4px; }
        
        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; color: #00fbff; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="initGame()">
        <h1>[ BEGIN EVOLUTION ]<br><small style="font-size: 14px; color: #ff00ff;">Grow • Survive • Explore</small></h1>
    </div>

    <div id="game-container">
        <div id="stats-panel">
            <b style="color: #ff00ff;">SURVIVAL TIME: <span id="timeUI">0:00</span></b>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            <span class="depth-highlight">DEPTH: <span id="depthUI">0</span>m</span>
            BIOMASS: <span id="coinUI">0</span> | SIZE: <span id="sizeUI">1.0</span>x
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyShrimp"><div class="icon-box">🦐</div>WAR WORM</div>
        <div class="btn" id="buyScout"><div class="icon-box">⭐</div>STAR FISH</div>
        <div class="btn" id="buyTurtle"><div class="icon-box">🐢</div>TURTLE</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0, friends = [], entities = [], startTime = 0;
    let cam = { x: 0, y: 0 }, audioCtx, pianoGain;
    
    let fish = { 
        x: 0, y: 0, tx: 0, ty: 0, angle: 0, 
        hp: 15000, maxHp: 15000, 
        scale: 0.2, // Starts small
        wiggle: 0, flinchX: 0, flinchY: 0, isTouching: false 
    };

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        pianoGain = audioCtx.createGain(); pianoGain.gain.value = 0.1;
        pianoGain.connect(audioCtx.destination);
        setInterval(() => playNote(220 + Math.random()*220, 4, pianoGain), 6000);
    }

    function playNote(freq, dur, gainNode) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = freq;
        g.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function initGame() {
        document.getElementById('start-overlay').style.display = 'none';
        startTime = Date.now();
        initAudio();
        resize(); loop();
    }

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.addEventListener('resize', resize);

    // Controls
    const setupBtn = (id, type) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            let costs = {Shrimp:15, Scout:30, Turtle:60};
            if(coins >= costs[type]) { 
                coins -= costs[type]; 
                friends.push({x:fish.x, y:fish.y, type, lunge:0}); 
            }
            e.stopPropagation();
        });
    };
    setupBtn('buyShrimp', 'Shrimp'); setupBtn('buyScout', 'Scout'); setupBtn('buyTurtle', 'Turtle');

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
        fish.isTouching = true;
    });
    canvas.addEventListener('touchmove', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
    });
    canvas.addEventListener('touchend', () => fish.isTouching = false);

    function loop() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(elapsed / 60);
        const secs = (elapsed % 60).toString().padStart(2, '0');
        
        // GROWTH LOGIC: Increase scale over time
        fish.scale = 0.2 + (elapsed * 0.001); 
        
        document.getElementById('timeUI').innerText = `${mins}:${secs}`;
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('sizeUI').innerText = fish.scale.toFixed(2);
        document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp)*100 + "%";
        document.getElementById('depthUI').innerText = Math.floor(fish.y / 10);

        // Slow camera and fish movement
        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.02;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.02;
        fish.x += (fish.tx - fish.x) * 0.02;
        fish.y += (fish.ty - fish.y) * 0.02;
        fish.angle = Math.atan2(fish.ty-fish.y, fish.tx-fish.x);
        fish.wiggle += 0.1;

        ctx.clearRect(0,0, canvas.width, canvas.height);

        // Update Entities
        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            
            // SWARM LOGIC: Drift unless fish is near (400px)
            if (d < 400 && en.type !== 'coin') {
                en.angle = Math.atan2(fish.y - en.y, fish.x - en.x);
                en.x += Math.cos(en.angle) * 1.5;
                en.y += Math.sin(en.angle) * 1.5;
                // Damage: 1dmg per second (roughly 0.016 per frame)
                fish.hp -= 0.15; 
            } else if (en.type !== 'coin') {
                en.x += Math.cos(en.drift) * 0.5;
                en.y += Math.sin(en.drift) * 0.5;
            }

            if(en.type === 'coin' && d < 50) { coins += 5; return false; }

            ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y); ctx.rotate(en.angle);
            ctx.fillStyle = en.type==='coin'?'#ffd700':'#ff4a00';
            ctx.beginPath(); ctx.ellipse(0,0,en.type==='coin'?8:20, en.type==='coin'?8:10, 0,0,7); ctx.fill();
            if(en.type !== 'coin') {
                ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-15,-20,30,3);
                ctx.fillStyle='#ff0055'; ctx.fillRect(-15,-20,30*(en.hp/100),3);
            }
            ctx.restore();
            return d < 2000 && en.hp > 0;
        });

        // Companions Tethered Close
        friends.forEach((fr, i) => {
            let orbitX = fish.x + Math.cos(Date.now()/1000 + i) * 60;
            let orbitY = fish.y + Math.sin(Date.now()/1000 + i) * 60;
            fr.x += (orbitX - fr.x) * 0.05;
            fr.y += (orbitY - fr.y) * 0.05;
            
            // Combat
            let target = entities.find(e => e.type !== 'coin' && Math.hypot(e.x-fr.x, e.y-fr.y) < 150);
            if(target) target.hp -= 0.5;

            ctx.fillStyle = fr.type === 'Shrimp' ? '#ff7f50' : '#1e3d24';
            ctx.beginPath(); ctx.arc(fr.x-cam.x, fr.y-cam.y, 8, 0, 7); ctx.fill();
        });

        // Draw Fishy
        ctx.save(); ctx.translate(fish.x-cam.x, fish.y-cam.y); ctx.rotate(fish.angle); ctx.scale(fish.scale, fish.scale);
        ctx.shadowBlur=20; ctx.shadowColor='#ff00ff'; ctx.fillStyle='#cc00ff';
        ctx.beginPath(); ctx.ellipse(0,0,40,20,0,0,7); ctx.fill();
        ctx.fillStyle='#ff00ff'; ctx.beginPath(); ctx.moveTo(-20,0); ctx.lineTo(-50, 20*Math.sin(fish.wiggle)); ctx.lineTo(-50, -20*Math.sin(fish.wiggle)); ctx.fill();
        ctx.restore();

        if(Math.random() < 0.03 && entities.length < 40) {
            let a = Math.random()*7;
            entities.push({
                x: fish.x+Math.cos(a)*1000, y: fish.y+Math.sin(a)*1000, 
                type: Math.random()<0.3?'coin':'enemy', hp: 100, angle: 0, drift: Math.random()*7
            });
        }

        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
