<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON TRANCE: PIANO RUSH</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff00ff; --bg: #050505; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* UI LAYERS */
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; padding-top: 60px;
            z-index: 5;
        }
        .score-box { font-size: 40px; color: var(--neon); text-shadow: 0 0 20px var(--neon); font-weight: 900; letter-spacing: 2px; }
        .combo-text { font-size: 30px; color: var(--pink); opacity: 0; transition: 0.2s; transform: translateY(10px); text-shadow: 0 0 15px var(--pink); }
        .combo-active { opacity: 1; transform: translateY(0); }

        /* MENU OVERLAY */
        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center;
        }
        .logo { font-size: 3.5rem; margin: 0; background: linear-gradient(to bottom, var(--neon), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px var(--neon)); font-weight: 900; }
        .best-score { color: #555; margin-top: 10px; font-size: 1.2rem; letter-spacing: 3px; }
        button {
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            padding: 18px 50px; font-size: 22px; cursor: pointer; border-radius: 4px;
            box-shadow: 0 0 15px var(--neon); margin-top: 40px; transition: 0.3s;
            text-transform: uppercase; font-weight: bold;
        }
        button:active { transform: scale(0.95); background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="logo">NEON RUSH</h1>
        <div class="best-score">HIGH SCORE: <span id="best">0</span></div>
        <button onclick="bootGame()">INITIALIZE ENGINE</button>
    </div>

    <div id="ui-layer">
        <div class="score-box" id="scoreDisplay">0000</div>
        <div class="combo-text" id="comboDisplay">COMBO X2</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        /**
         * TRANCE PIANO ENGINE - SINGLE FILE EDITION
         * Optimized for Android / GitHub / Performance
         */

        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const bestDisplay = document.getElementById('best');

        // Game State
        let score = 0, combo = 0, isActive = false, frameCount = 0;
        let speed = 7, shake = 0, pulse = 0;
        let bestScore = localStorage.getItem('trance_best_v2') || 0;
        
        // Entities
        let tiles = [], particles = [];
        const lanes = 4;
        let laneW, canvasW, canvasH;

        // Audio System
        let audioCtx;
        const scale = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63];

        bestDisplay.innerText = bestScore;

        function resize() {
            canvasW = canvas.width = window.innerWidth * window.devicePixelRatio;
            canvasH = canvas.height = window.innerHeight * window.devicePixelRatio;
            laneW = canvasW / lanes;
        }
        window.addEventListener('resize', resize);
        resize();

        class Tile {
            constructor(lane) {
                this.lane = lane;
                this.x = lane * laneW;
                this.y = -400;
                this.h = 320;
                this.active = true;
                this.color = `hsl(${180 + (Math.random() * 100)}, 100%, 60%)`;
            }

            update() { this.y += speed; }

            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                
                // Draw tile body
                ctx.fillRect(this.x + 12, this.y, laneW - 24, this.h);
                
                // Trance geometric pattern
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.globalAlpha = 0.4;
                ctx.strokeRect(this.x + 30, this.y + 30, laneW - 60, this.h - 60);
                ctx.restore();
            }
        }

        function triggerAudio(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // "Trance" Synth Settings
            osc.type = (type === 'bass') ? 'sawtooth' : 'triangle';
            const freq = scale[Math.floor(Math.random() * scale.length)];
            osc.frequency.setValueAtTime(type === 'bass' ? freq / 2 : freq * 1.5, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        }

        function createBurst(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 0.5) * 25,
                    life: 1.0,
                    color
                });
            }
        }

        function bootGame() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('overlay').style.display = 'none';
            score = 0; speed = 8; combo = 0;
            tiles = []; particles = [];
            scoreDisplay.innerText = "0000";
            isActive = true;
            updateLoop();
        }

        function gameOver() {
            isActive = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('trance_best_v2', score);
            }
            bestDisplay.innerText = bestScore;
            document.getElementById('overlay').style.display = 'flex';
            document.querySelector('.logo').innerText = "VIBE LOST";
            comboDisplay.classList.remove('combo-active');
        }

        function updateLoop() {
            if (!isActive) return;

            // 1. Scene Feedback (The "Trance" Trail)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; 
            ctx.fillRect(0, 0, canvasW, canvasH);
            
            // 2. Camera Shake & Rhythmic Pulse
            pulse += 0.04;
            if (shake > 0) {
                ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
                shake *= 0.92;
            }

            // 3. Render Lanes
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 2;
            for(let i=0; i<=lanes; i++) {
                ctx.beginPath(); ctx.moveTo(i * laneW, 0); ctx.lineTo(i * laneW, canvasH); ctx.stroke();
            }

            // 4. Tile Management
            if (frameCount % Math.floor(Math.max(15, 50 - speed)) === 0) {
                tiles.push(new Tile(Math.floor(Math.random() * lanes)));
            }

            for (let i = tiles.length - 1; i >= 0; i--) {
                let t = tiles[i];
                t.update();
                t.draw();

                // Missed Tile
                if (t.y > canvasH) {
                    if (t.active) gameOver();
                    tiles.splice(i, 1);
                }
            }

            // 5. Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.025;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.fillRect(p.x, p.y, 6, 6);
                if (p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1.0;

            // 6. Game Progression
            frameCount++;
            speed += 0.0015;
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset camera
            requestAnimationFrame(updateLoop);
        }

        // Input Logic
        const handleInput = (clientX, clientY) => {
            if (!isActive) return;
            const rect = canvas.getBoundingClientRect();
            const x = (clientX - rect.left) * (canvasW / rect.width);
            const y = (clientY - rect.top) * (canvasH / rect.height);
            
            let hit = false;
            tiles.forEach(t => {
                // Generous hit box for mobile thumbs
                if (t.active && x > t.x && x < t.x + laneW && y > t.y - 100 && y < t.y + t.h + 100) {
                    t.active = false;
                    hit = true;
                    score += 10 + (combo * 2);
                    combo++;
                    shake = 18;
                    
                    scoreDisplay.innerText = score.toString().padStart(4, '0');
                    if (combo > 4) {
                        comboDisplay.innerText = `COMBO X${Math.floor(combo/4) + 1}`;
                        comboDisplay.classList.add('combo-active');
                    }
                    
                    createBurst(x, y, t.color);
                    triggerAudio(combo % 8 === 0 ? 'bass' : 'lead');
                }
            });

            if (!hit && y > canvasH * 0.4) {
                gameOver();
            }
        };

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput(e.touches[e.touches.length - 1].clientX, e.touches[e.touches.length - 1].clientY);
        }, {passive: false});

        canvas.addEventListener('mousedown', (e) => {
            handleInput(e.clientX, e.clientY);
        });

    </script>
</body>
</html>
