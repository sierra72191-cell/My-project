<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Deep Sea Aura</title>
    <style>
        * { user-select: none; touch-action: none; box-sizing: border-box; }
        body { margin: 0; background: #00121d; height: 100vh; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        canvas { display: block; width: 100vw; height: 100vh; background: linear-gradient(to bottom, #004e92, #000428); }

        /* Minimalist Underwater UI */
        .game-ui {
            position: absolute; top: 20px; left: 20px;
            color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none; z-index: 10;
        }
        .stat-line { font-size: 14px; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .hp-bar-bg { width: 150px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
        .hp-fill { height: 100%; background: #00ff88; width: 100%; transition: width 0.3s; }

        .kill-counter {
            position: absolute; top: 20px; right: 20px;
            color: #ff4b4b; font-weight: bold; font-size: 18px; text-align: right;
        }

        #timer { font-size: 12px; color: #add8e6; }
    </style>
</head>
<body>

<div class="game-ui">
    <div class="stat-line">SIZE LVL: <span id="lvl">1</span></div>
    <div class="hp-bar-bg"><div class="hp-fill" id="hpBar"></div></div>
    <div id="timer">SURVIVED: 0s</div>
</div>

<div class="kill-counter">
    💀 <span id="kills">0</span><br>
    <small style="font-size: 10px; color: #fff;">FISHY KILLS</small>
</div>

<script>
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
document.body.appendChild(canvas);

const WORLD_SIZE = 4000;
let cam = { x: 0, y: 0 };
let player = {
    x: 2000, y: 2000,
    hp: 100, maxHp: 100,
    lvl: 1, kills: 0,
    size: 15, speed: 1.5,
    angle: 0, targetAngle: 0,
    isManual: false,
    startTime: Date.now()
};

let entities = []; // Other fish
let bubbles = [];

function init() {
    window.onresize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    };
    window.onresize();

    // Populate the sea
    for(let i=0; i<80; i++) spawnFish(true);
    for(let i=0; i<40; i++) spawnBubble();

    requestAnimationFrame(loop);
}

function spawnFish(init = false) {
    let x = init ? Math.random() * WORLD_SIZE : (Math.random() < 0.5 ? player.x - 1000 : player.x + 1000);
    let y = init ? Math.random() * WORLD_SIZE : (Math.random() < 0.5 ? player.y - 1000 : player.y + 1000);
    entities.push({
        x: x, y: y,
        hp: 50,
        size: 10 + Math.random() * 20,
        speed: 1 + Math.random(),
        angle: Math.random() * Math.PI * 2,
        color: `hsl(${Math.random() * 360}, 60%, 60%)`,
        state: 'wander'
    });
}

function spawnBubble() {
    bubbles.push({
        x: Math.random() * WORLD_SIZE,
        y: Math.random() * WORLD_SIZE,
        r: 1 + Math.random() * 4,
        speed: 0.5 + Math.random()
    });
}

function update() {
    // 1. Autonomous Intelligence
    if (!player.isManual) {
        // Drift and wander
        player.targetAngle += (Math.random() - 0.5) * 0.1;
    }
    
    // Smooth angle transition
    let diff = player.targetAngle - player.angle;
    player.angle += diff * 0.05;

    // Movement
    player.x += Math.cos(player.angle) * player.speed;
    player.y += Math.sin(player.angle) * player.speed;

    // Camera follow
    cam.x += (player.x - canvas.width/2 - cam.x) * 0.1;
    cam.y += (player.y - canvas.height/2 - cam.y) * 0.1;

    // 2. Aura Ring Logic
    let auraRadius = player.size * 3.5;
    entities.forEach((f, index) => {
        let d = Math.hypot(f.x - player.x, f.y - player.y);
        
        // Attack logic
        if (d < auraRadius) {
            f.hp -= 0.5; // Damage within ring
            if (f.hp <= 0) {
                entities.splice(index, 1);
                player.kills++;
                levelUp();
                spawnFish(); // Keep world populated
            }
        }

        // Enemy AI (Aggressive if close)
        if (d < 200) {
            f.state = 'attack';
            let angleToPlayer = Math.atan2(player.y - f.y, player.x - f.x);
            f.angle += (angleToPlayer - f.angle) * 0.02;
            
            if (d < player.size + f.size) {
                player.hp -= 0.1; // 1 damage per second roughly
            }
        } else {
            f.state = 'wander';
            f.angle += (Math.random() - 0.5) * 0.05;
        }

        f.x += Math.cos(f.angle) * f.speed;
        f.y += Math.sin(f.angle) * f.speed;
    });

    // Bubbles
    bubbles.forEach(b => {
        b.y -= b.speed;
        if (b.y < cam.y - 100) b.y = cam.y + canvas.height + 100;
    });

    // Stats UI Update
    document.getElementById('lvl').innerText = player.lvl;
    document.getElementById('kills').innerText = player.kills;
    document.getElementById('hpBar').style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById('timer').innerText = `SURVIVED: ${Math.floor((Date.now() - player.startTime)/1000)}s`;

    if (player.hp <= 0) location.reload();
}

function levelUp() {
    if (player.kills % 5 === 0) {
        player.lvl++;
        player.size += 5;
        player.speed += 0.2;
        player.maxHp += 20;
        player.hp = player.maxHp;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Light Rays (From your reference image)
    let grd = ctx.createLinearGradient(canvas.width/2, 0, canvas.width/2, 400);
    grd.addColorStop(0, "rgba(255,255,255,0.2)");
    grd.addColorStop(1, "transparent");
    ctx.fillStyle = grd;
    ctx.fillRect(0,0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-cam.x, -cam.y);

    // Draw Bubbles
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    bubbles.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fill();
    });

    // Draw Aura Ring
    ctx.strokeStyle = "rgba(0, 255, 255, 0.4)";
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size * 3.5, 0, Math.PI*2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Draw Entities
    entities.forEach(f => {
        ctx.save();
        ctx.translate(f.x, f.y);
        ctx.rotate(f.angle);
        ctx.fillStyle = f.color;
        // Simple Fish Shape
        ctx.beginPath();
        ctx.ellipse(0, 0, f.size, f.size/2, 0, 0, Math.PI*2);
        ctx.fill();
        // Tail
        ctx.beginPath();
        ctx.moveTo(-f.size, 0);
        ctx.lineTo(-f.size - 10, -10);
        ctx.lineTo(-f.size - 10, 10);
        ctx.fill();
        ctx.restore();
    });

    // Draw Our Fishy
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.ellipse(0, 0, player.size, player.size/1.8, 0, 0, Math.PI*2);
    ctx.fill();
    // Eye
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(player.size/2, -2, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Controls
window.addEventListener('touchstart', (e) => {
    player.isManual = true;
    const touch = e.touches[0];
    player.targetAngle = Math.atan2(touch.clientY - canvas.height/2, touch.clientX - canvas.width/2);
    
    // Release manual control after 3 seconds of no touching
    clearTimeout(window.controlTimeout);
    window.controlTimeout = setTimeout(() => player.isManual = false, 3000);
});

init();
</script>
</body>
</html>
