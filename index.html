<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCEAN REALMS · SYMPHONY</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000408; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; }
        #game-container { flex-grow: 1; position: relative; overflow: hidden; background: linear-gradient(to bottom, #001a33 0%, #000205 100%); }
        canvas { display: block; width: 100%; height: 100%; }
        
        #stats-panel { 
            position: absolute; top: 12px; left: 12px; color: #00fbff; 
            font-size: 10px; pointer-events: none;
            background: rgba(0, 10, 20, 0.9); padding: 15px; border: 1px solid #00fbff; 
            border-radius: 12px; z-index: 10; min-width: 210px;
        }
        .depth-highlight { color: #fff; font-size: 14px; text-shadow: 0 0 10px #00fbff; font-weight: bold; display: block; margin-top: 5px; }
        .hp-bar-bg { width: 100%; height: 8px; background: #200; margin: 6px 0; border-radius: 4px; border: 1px solid #ff0055; }
        #hp-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff00ff); }

        #controls { height: 140px; background: #00070e; border-top: 2px solid #00fbff; display: flex; gap: 8px; padding: 10px; z-index: 100; padding-bottom: 35px; }
        .btn { flex: 1; background: #001a33; color: #00fbff; border: 1px solid #00fbff; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; }
        .icon-box { font-size: 22px; margin-bottom: 4px; filter: drop-shadow(0 0 5px #00fbff); }
        .btn:active { background: #00fbff; color: #000; }
        
        #start-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; color: #00fbff; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <div id="start-overlay" onclick="initGame()">
        <h1>[ INITIALIZE SOUL ]<br><small style="font-size: 14px;">Tap to Sync Audio & Start</small></h1>
    </div>

    <div id="game-container">
        <div id="stats-panel">
            <b style="color: #ff00ff;">NEON SOUL LVL <span id="lvlUI">1</span></b>
            <div class="hp-bar-bg"><div id="hp-fill"></div></div>
            <span class="depth-highlight">DEPTH: <span id="depthUI">0</span>m</span>
            BIOMASS: <span id="coinUI">0</span> | ARMY: <span id="friendUI">0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <div id="controls">
        <div class="btn" id="buyShrimp"><div class="icon-box">🦐</div>WAR WORM</div>
        <div class="btn" id="buyScout"><div class="icon-box">⭐</div>STAR FISH</div>
        <div class="btn" id="buyTurtle"><div class="icon-box">🐢</div>TURTLE</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let coins = 0, kills = 0, exp = 0, lvl = 1, friends = [], entities = [], particles = [];
    let cam = { x: 0, y: 0 }, audioCtx, pianoGain, bassGain;
    let fish = { x: 0, y: 0, tx: 0, ty: 0, angle: 0, hp: 15000, maxHp: 15000, shield: 0, scale: 0.5, wiggle: 0, flinchX: 0, flinchY: 0, wanderTimer: 100 };

    // --- AUDIO ENGINE ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        pianoGain = audioCtx.createGain(); pianoGain.gain.value = 0.15;
        bassGain = audioCtx.createGain(); bassGain.gain.value = 0.2;
        pianoGain.connect(audioCtx.destination);
        bassGain.connect(audioCtx.destination);
        
        // Loop Ambient Piano
        setInterval(() => playNote(220 + Math.random()*440, 1.5, pianoGain), 3000);
        // Loop Bass Drop
        setInterval(() => playNote(55, 0.8, bassGain, 'triangle'), 8000);
    }

    function playNote(freq, dur, gainNode, type='sine') {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        g.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function playSFX(freq, type='square', vol=0.1) {
        if(!audioCtx) return;
        playNote(freq, 0.1, {gain: {value: vol}}, type);
    }

    function initGame() {
        document.getElementById('start-overlay').style.display = 'none';
        initAudio(); resize(); loop();
    }

    function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight; }
    window.addEventListener('resize', resize);

    const setupBtn = (id, type) => {
        document.getElementById(id).addEventListener('touchstart', (e) => {
            let costs = {Shrimp:5, Scout:10, Turtle:20};
            if(coins >= costs[type]) { 
                coins -= costs[type]; 
                friends.push({x:fish.x, y:fish.y, type, lunge:0, angle:0}); 
                playSFX(880, 'sine', 0.05); updateUI(); 
            }
            e.stopPropagation();
        });
    };
    setupBtn('buyShrimp', 'Shrimp'); setupBtn('buyScout', 'Scout'); setupBtn('buyTurtle', 'Turtle');

    function updateUI() {
        document.getElementById('coinUI').innerText = coins;
        document.getElementById('hp-fill').style.width = (fish.hp/fish.maxHp)*100 + "%";
        document.getElementById('lvlUI').innerText = lvl;
        document.getElementById('depthUI').innerText = Math.max(0, Math.floor(fish.y / 10));
        document.getElementById('friendUI').innerText = friends.length;
    }

    function drawEye(x, y, size) {
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x, y, size, 0, 7); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x + size*0.4, y, size*0.5, 0, 7); ctx.fill();
    }

    canvas.addEventListener('touchstart', (e) => {
        const rect = canvas.getBoundingClientRect();
        fish.tx = e.touches[0].clientX - rect.left + cam.x;
        fish.ty = e.touches[0].clientY - rect.top + cam.y;
        fish.wanderTimer = 500;
    });

    function loop() {
        let depth = Math.max(0, Math.floor(fish.y / 10));
        let diff = 1 + (depth / 400);

        cam.x += (fish.x - canvas.width/2 - cam.x) * 0.05;
        cam.y += (fish.y - canvas.height/2 - cam.y) * 0.05;
        fish.x += (fish.tx + fish.flinchX - fish.x) * 0.04;
        fish.y += (fish.ty + fish.flinchY - fish.y) * 0.04;
        fish.angle = Math.atan2(fish.ty-fish.y, fish.tx-fish.x);
        fish.wiggle += 0.2; fish.flinchX *= 0.9; fish.flinchY *= 0.9;

        ctx.clearRect(0,0, canvas.width, canvas.height);

        // --- OCEAN BACKGROUND ---
        ctx.fillStyle = 'rgba(0, 251, 255, 0.03)';
        for(let i=0; i<3; i++) { // Light shafts
            ctx.beginPath(); ctx.moveTo(200+i*300 - cam.x*0.1, -100);
            ctx.lineTo(400+i*300 - cam.x*0.1, canvas.height+100); ctx.lineWidth=80; ctx.stroke();
        }

        // Entities & Enemies
        entities = entities.filter(en => {
            let d = Math.hypot(fish.x - en.x, fish.y - en.y);
            if(en.type === 'coin' && d < 60) { coins += Math.floor(2 * diff); playSFX(1200); updateUI(); return false; }
            
            if(en.stun > 0) { en.stun--; ctx.globalAlpha = 0.4; }
            else if(d < 400 * diff) {
                en.angle = Math.atan2(fish.y - en.y, fish.x - en.x);
                en.x += Math.cos(en.angle) * en.speed; en.y += Math.sin(en.angle) * en.speed;
            }
            
            ctx.save(); ctx.translate(en.x-cam.x, en.y-cam.y); ctx.rotate(en.angle);
            ctx.fillStyle = en.type === 'shark' ? '#050505' : (en.type==='coin'?'#ffd700':'#ff4400');
            ctx.beginPath(); ctx.ellipse(0,0,en.type==='shark'?50:18, en.type==='shark'?16:10, 0,0,7); ctx.fill();
            if(en.type !== 'coin') drawEye(en.type==='shark'?25:10, -4, en.type==='shark'?4:2);
            ctx.restore(); ctx.globalAlpha = 1.0;

            if(d < 65 && en.stun <= 0 && en.type !== 'coin') {
                playSFX(100, 'triangle', 0.2); // Impact sound
                if(fish.shield > 0) fish.shield -= 2; else fish.hp -= 10 * diff;
                fish.flinchX += (fish.x-en.x)*0.3;
            }
            return d < 2000 && !en.dead;
        });

        // Army & Animations
        fish.shield = 0;
        friends.forEach((fr, i) => {
            let orbitX = fish.x + Math.cos(Date.now()/1000 + i) * 110;
            let orbitY = fish.y + Math.sin(Date.now()/1000 + i) * 110;
            let target = entities.find(e => e.type !== 'coin' && Math.hypot(e.x-fish.x, e.y-fish.y) < 350) || {x: orbitX, y: orbitY};
            
            fr.lunge = Math.max(0, fr.lunge - 0.1);
            let speed = fr.type === 'Shrimp' ? 0.15 : 0.08;
            fr.x += (target.x - fr.x) * speed; fr.y += (target.y - fr.y) * speed;
            let ang = Math.atan2(target.y-fr.y, target.x-fr.x);

            if(fr.type === 'Shrimp' && target.hp) {
                if(Math.hypot(fr.x-target.x, fr.y-target.y) < 80 && fr.lunge <= 0) {
                    fr.lunge = 1.0; playSFX(400, 'square', 0.05); // Shrimp Attack sound
                    target.hp -= 10; if(target.hp <= 0) target.dead = true;
                }
            } else if(fr.type === 'Scout' && target.type) {
                if(Math.hypot(fr.x-target.x, fr.y-target.y) < 80 && target.stun <= 0) {
                    playSFX(1500, 'sine', 0.05); target.stun = 120;
                }
            }

            ctx.save(); ctx.translate(fr.x-cam.x, fr.y-cam.y); ctx.rotate(ang);
            if(fr.type === 'Shrimp') { // Anatomical Shrimp
                ctx.fillStyle = '#ff7f50'; ctx.beginPath(); ctx.ellipse(fr.lunge*20,0,14,6,0,0,7); ctx.fill();
                ctx.strokeStyle='#ff7f50'; ctx.moveTo(10,-2); ctx.lineTo(20,-8); ctx.stroke();
            } else if(fr.type === 'Turtle') {
                fish.shield = Math.min(100, fish.shield + 20);
                ctx.fillStyle = '#1e4d2b'; ctx.beginPath(); ctx.ellipse(0,0,20,16,0,0,7); ctx.fill();
                ctx.fillStyle = '#2e8b57'; ctx.beginPath(); ctx.arc(16,0,8,0,7); ctx.fill();
                drawEye(18, -3, 2);
            } else { // Starfish
                ctx.rotate(Date.now()/500); ctx.fillStyle='#f0ff00';
                ctx.beginPath(); for(let j=0; j<5; j++) { ctx.rotate(Math.PI*2/5); ctx.lineTo(12,0); ctx.lineTo(5,3); } ctx.fill();
            }
            ctx.restore();
        });

        // Player
        ctx.save(); ctx.translate(fish.x-cam.x, fish.y-cam.y); ctx.rotate(fish.angle); ctx.scale(fish.scale, fish.scale);
        if(fish.shield > 0) { ctx.strokeStyle='#00fbff'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,45,0,7); ctx.stroke(); }
        ctx.shadowBlur=25; ctx.shadowColor='#ff00ff'; ctx.fillStyle='#cc00ff';
        ctx.beginPath(); ctx.ellipse(0,0,32,18,0,0,7); ctx.fill();
        ctx.fillStyle='#ff00ff'; ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-45, 20*Math.sin(fish.wiggle)); ctx.lineTo(-45, -20*Math.sin(fish.wiggle)); ctx.fill();
        drawEye(18, -6, 5); ctx.restore();

        if(Math.random() < 0.04 * diff && entities.length < 35) {
            let a = Math.random()*7;
            entities.push({x: fish.x+Math.cos(a)*1100, y: fish.y+Math.sin(a)*1100, type: Math.random()<0.1?'shark':(Math.random()<0.4?'enemyFish':'coin'), hp: 100*diff, speed: 1.5, stun:0, dead:false, angle:0});
        }
        updateUI(); requestAnimationFrame(loop);
    }
</script>
</body>
</html>
