<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Copper Realms - Pillared Command Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #0f0a05 0%, #1f1409 100%);
      font-family: 'Segoe UI', 'Roboto', 'Impact', 'Arial Black', sans-serif;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ===== SPIRAL PILLERS ===== */
    .pillar-left, .pillar-right {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 28px;
      background: repeating-linear-gradient(
        180deg,
        #b87333 0px,
        #d4943f 8px,
        #7a3e1a 16px,
        #cd7f32 24px,
        #e0a44c 32px,
        #b87333 40px
      );
      box-shadow: 0 0 20px rgba(205, 127, 50, 0.6), inset 0 0 12px rgba(255,215,0,0.3);
      z-index: 10;
      animation: copperShimmer 3s ease-in-out infinite;
    }

    .pillar-left {
      left: 0;
      border-right: 2px solid #f0bc6e;
    }

    .pillar-right {
      right: 0;
      border-left: 2px solid #f0bc6e;
    }

    /* Spiral grooves on pillars */
    .pillar-left::before, .pillar-right::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        45deg,
        rgba(0,0,0,0.3) 0px,
        rgba(0,0,0,0.3) 2px,
        transparent 2px,
        transparent 12px
      );
      pointer-events: none;
    }

    /* Animated metallic shimmer */
    @keyframes copperShimmer {
      0% { filter: brightness(1) drop-shadow(0 0 2px #ffb347); }
      50% { filter: brightness(1.15) drop-shadow(0 0 8px #ff8c00); }
      100% { filter: brightness(1) drop-shadow(0 0 2px #ffb347); }
    }

    /* Spiral coil accents on pillars */
    .pillar-left::after, .pillar-right::after {
      content: "⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸";
      position: absolute;
      bottom: 20%;
      left: 4px;
      font-size: 14px;
      white-space: nowrap;
      transform: rotate(90deg) scaleX(-1);
      color: #ffd699;
      opacity: 0.5;
      letter-spacing: 4px;
      pointer-events: none;
    }

    .pillar-right::after {
      content: "⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸⤸";
      transform: rotate(-90deg);
      right: 4px;
      left: auto;
    }

    /* Main container */
    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: rgba(10, 6, 3, 0.75);
      border-radius: 64px;
      padding: 24px 20px 40px;
      backdrop-filter: blur(8px);
      box-shadow: 0 25px 45px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,200,100,0.3);
      border: 1px solid rgba(205, 127, 50, 0.7);
      position: relative;
      z-index: 2;
    }

    /* Header with bold copper */
    h1 {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 3rem;
      text-align: center;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #FDB72A 0%, #CD7F32 35%, #E6A155 65%, #B87333 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
      margin-bottom: 8px;
      word-break: keep-all;
    }

    /* Date/Time panel - glowing */
    .datetime {
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      font-size: 1.15rem;
      background: #1f160ed9;
      display: inline-block;
      width: 100%;
      padding: 12px;
      border-radius: 60px;
      margin: 15px 0 25px;
      color: #f5bc70;
      border: 1px solid #cd7f32;
      box-shadow: 0 0 12px rgba(205,127,50,0.4), inset 0 0 6px rgba(0,0,0,0.5);
    }

    /* Stat cards */
    .stat-card {
      background: linear-gradient(125deg, #1c130b, #110b06);
      border-radius: 48px;
      padding: 18px 22px;
      margin-bottom: 28px;
      border-left: 6px solid #e09d42;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,215,0,0.2);
    }

    .stat-label {
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #e0a44c;
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 2.4rem;
      font-weight: 800;
      font-family: monospace;
      color: #ffe0a3;
      text-shadow: 0 0 5px #ff9f2e;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    /* Button rows - now includes +10 +5 +1 */
    .button-row {
      display: flex;
      gap: 14px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .copper-btn {
      flex: 1;
      background: radial-gradient(circle at 30% 25%, #e8a850, #a5511f);
      border: none;
      padding: 14px 6px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: monospace;
      color: #221000;
      text-shadow: 0 1px 0 #ffcf8a;
      box-shadow: 0 4px 0 #5c2b0e;
      transition: 0.06s linear;
      cursor: pointer;
      text-align: center;
      min-width: 70px;
    }

    .copper-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #5c2b0e;
    }

    /* Special small increment buttons */
    .copper-btn.small-add {
      background: radial-gradient(circle at 30% 25%, #c9823a, #8a3f16);
      font-size: 1rem;
    }

    .reset-btn {
      background: radial-gradient(#7a4e2a, #4f2c12);
      color: #ffcb8a;
      text-shadow: none;
      box-shadow: 0 4px 0 #2d180a;
    }

    /* Total banked card */
    .total-banked {
      background: linear-gradient(115deg, #2b1a0c, #170f07);
      border: 2px solid #e7b15a;
    }
    .total-banked .stat-value {
      font-size: 2.8rem;
      color: #ffcd82;
    }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.7rem;
      color: #b87a3c;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<!-- SPIRAL PILLERS holding up the website -->
<div class="pillar-left"></div>
<div class="pillar-right"></div>

<div class="container">
  <h1>⚡ COPPER REALMS ⚡</h1>
  <div class="datetime">
    <span id="dateDisplay"></span> &nbsp;⛁&nbsp; 
    <span id="timeDisplay"></span>
  </div>

  <!-- Lbs Received -->
  <div class="stat-card">
    <div class="stat-label">📦 LBS RECEIVED (TODAY)</div>
    <div class="stat-value" id="receivedValue">0</div>
    <div class="button-row">
      <button class="copper-btn small-add" id="addReceived1">+1 lb</button>
      <button class="copper-btn small-add" id="addReceived5">+5 lbs</button>
      <button class="copper-btn small-add" id="addReceived10">+10 lbs</button>
      <button class="copper-btn small-add" id="addReceived50">+50 lbs</button>
      <button class="copper-btn reset-btn" id="resetReceivedBtn">↺ RESET</button>
    </div>
  </div>

  <!-- Lbs Refined -->
  <div class="stat-card">
    <div class="stat-label">⚙️ LBS REFINED (TODAY)</div>
    <div class="stat-value" id="refinedValue">0</div>
    <div class="button-row">
      <button class="copper-btn small-add" id="addRefined1">+1 lb</button>
      <button class="copper-btn small-add" id="addRefined5">+5 lbs</button>
      <button class="copper-btn small-add" id="addRefined10">+10 lbs</button>
      <button class="copper-btn small-add" id="addRefined50">+50 lbs</button>
      <button class="copper-btn reset-btn" id="resetRefinedBtn">↺ RESET</button>
    </div>
  </div>

  <!-- Total Copper Banked -->
  <div class="stat-card total-banked">
    <div class="stat-label">🏦 TOTAL COPPER BANKED (ALL TIME)</div>
    <div class="stat-value" id="bankedValue">0</div>
    <div class="button-row">
      <button class="copper-btn" id="addToBankBtn" style="background: radial-gradient(#d68f3a, #8a451d);">✨ ADD TODAY'S REFINED TO BANK ✨</button>
    </div>
    <div style="margin-top: 12px; font-size:0.75rem; color:#e7a352;">Tap to move refined lbs → permanent vault</div>
  </div>

  <!-- Utilities -->
  <div class="reset-area" style="display: flex; gap: 12px; justify-content: center; margin-top: 12px;">
    <button class="small-btn" id="resetDailyBtn" style="background:#2f2216; border:1px solid #c27e3a; padding:10px 18px; border-radius:40px; color:#f0bc6e;">🔄 RESET TODAY</button>
    <button class="small-btn" id="fullResetBtn" style="background:#2f2216; border:1px solid #a03e1a; padding:10px 18px; border-radius:40px; color:#e6955c;">⚠️ NUKE ALL</button>
  </div>
  <footer>spiral pillars of copper • command center • auto‑save</footer>
</div>

<script>
  // Storage keys
  const STORAGE = {
    lastDate: "copper_lastDate",
    dailyReceived: "copper_dailyReceived",
    dailyRefined: "copper_dailyRefined",
    totalBanked: "copper_totalBanked",
  };

  function getTodayStr() {
    return new Date().toISOString().split('T')[0];
  }

  let state = {
    dailyReceived: 0,
    dailyRefined: 0,
    totalBanked: 0
  };

  function loadData() {
    let lastDate = localStorage.getItem(STORAGE.lastDate);
    let today = getTodayStr();
    let totalBanked = parseFloat(localStorage.getItem(STORAGE.totalBanked)) || 0;

    if (lastDate === today) {
      state.dailyReceived = parseFloat(localStorage.getItem(STORAGE.dailyReceived)) || 0;
      state.dailyRefined = parseFloat(localStorage.getItem(STORAGE.dailyRefined)) || 0;
    } else {
      state.dailyReceived = 0;
      state.dailyRefined = 0;
      localStorage.setItem(STORAGE.lastDate, today);
      localStorage.setItem(STORAGE.dailyReceived, 0);
      localStorage.setItem(STORAGE.dailyRefined, 0);
    }
    state.totalBanked = totalBanked;
  }

  function saveDaily() {
    localStorage.setItem(STORAGE.dailyReceived, state.dailyReceived);
    localStorage.setItem(STORAGE.dailyRefined, state.dailyRefined);
    localStorage.setItem(STORAGE.totalBanked, state.totalBanked);
    localStorage.setItem(STORAGE.lastDate, getTodayStr());
  }

  function updateUI() {
    document.getElementById('receivedValue').innerText = Math.floor(state.dailyReceived);
    document.getElementById('refinedValue').innerText = Math.floor(state.dailyRefined);
    document.getElementById('bankedValue').innerText = Math.floor(state.totalBanked);
  }

  function addReceived(amount) {
    state.dailyReceived += amount;
    if (state.dailyReceived < 0) state.dailyReceived = 0;
    saveDaily();
    updateUI();
  }

  function addRefined(amount) {
    let newRefined = state.dailyRefined + amount;
    if (newRefined <= state.dailyReceived) {
      state.dailyRefined = newRefined;
    } else {
      state.dailyRefined = state.dailyReceived;
      showFloatingMsg("⚠️ Can't refine more than received today!", "#b0451a");
    }
    if (state.dailyRefined < 0) state.dailyRefined = 0;
    saveDaily();
    updateUI();
  }

  function resetReceived() {
    state.dailyReceived = 0;
    if (state.dailyRefined > state.dailyReceived) state.dailyRefined = 0;
    saveDaily();
    updateUI();
  }

  function resetRefined() {
    state.dailyRefined = 0;
    saveDaily();
    updateUI();
  }

  function addRefinedToBank() {
    if (state.dailyRefined > 0) {
      state.totalBanked += state.dailyRefined;
      state.dailyRefined = 0;
      saveDaily();
      updateUI();
      showFloatingMsg(`✅ ${Math.floor(state.totalBanked)} total banked!`, "#2a6b2a");
    } else {
      showFloatingMsg("No refined lbs to bank today!", "#8b3a1a");
    }
  }

  function resetDaily() {
    state.dailyReceived = 0;
    state.dailyRefined = 0;
    saveDaily();
    updateUI();
    showFloatingMsg("Today's stats reset", "#a35e2a");
  }

  function fullReset() {
    if (confirm("⚠️ PERMANENT: erase ALL Copper Realms data?")) {
      state.dailyReceived = 0;
      state.dailyRefined = 0;
      state.totalBanked = 0;
      localStorage.setItem(STORAGE.lastDate, getTodayStr());
      saveDaily();
      updateUI();
      showFloatingMsg("System nuked. Start fresh.", "#6a2e0e");
    }
  }

  function showFloatingMsg(text, bgColor) {
    let msg = document.createElement('div');
    msg.innerText = text;
    msg.style.position = 'fixed';
    msg.style.bottom = '30px';
    msg.style.left = '20px';
    msg.style.right = '20px';
    msg.style.backgroundColor = bgColor;
    msg.style.color = '#ffe6c7';
    msg.style.padding = '14px';
    msg.style.borderRadius = '60px';
    msg.style.textAlign = 'center';
    msg.style.fontWeight = 'bold';
    msg.style.zIndex = '999';
    msg.style.fontFamily = 'monospace';
    msg.style.boxShadow = '0 4px 20px black';
    msg.style.border = '1px solid #ffc285';
    document.body.appendChild(msg);
    setTimeout(() => msg.remove(), 1700);
  }

  function checkDateChange() {
    let storedDate = localStorage.getItem(STORAGE.lastDate);
    let today = getTodayStr();
    if (storedDate !== today) {
      state.dailyReceived = 0;
      state.dailyRefined = 0;
      localStorage.setItem(STORAGE.lastDate, today);
      localStorage.setItem(STORAGE.dailyReceived, 0);
      localStorage.setItem(STORAGE.dailyRefined, 0);
      updateUI();
      showFloatingMsg("🪙 New day! Received & Refined reset", "#876b42");
    }
  }

  function updateDateTime() {
    const now = new Date();
    document.getElementById('dateDisplay').innerText = now.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
    document.getElementById('timeDisplay').innerText = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function bindEvents() {
    document.getElementById('addReceived1').addEventListener('click', () => addReceived(1));
    document.getElementById('addReceived5').addEventListener('click', () => addReceived(5));
    document.getElementById('addReceived10').addEventListener('click', () => addReceived(10));
    document.getElementById('addReceived50').addEventListener('click', () => addReceived(50));
    document.getElementById('resetReceivedBtn').addEventListener('click', resetReceived);
    
    document.getElementById('addRefined1').addEventListener('click', () => addRefined(1));
    document.getElementById('addRefined5').addEventListener('click', () => addRefined(5));
    document.getElementById('addRefined10').addEventListener('click', () => addRefined(10));
    document.getElementById('addRefined50').addEventListener('click', () => addRefined(50));
    document.getElementById('resetRefinedBtn').addEventListener('click', resetRefined);
    
    document.getElementById('addToBankBtn').addEventListener('click', addRefinedToBank);
    document.getElementById('resetDailyBtn').addEventListener('click', resetDaily);
    document.getElementById('fullResetBtn').addEventListener('click', fullReset);
  }

  function init() {
    loadData();
    bindEvents();
    updateUI();
    updateDateTime();
    setInterval(() => {
      updateDateTime();
      checkDateChange();
    }, 1000);
  }
  init();
</script>
</body>
</html>
