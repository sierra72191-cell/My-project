<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Copper Realms - Command Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(145deg, #1a0f05 0%, #2c1a0a 100%);
      font-family: 'Segoe UI', 'Roboto', 'Impact', 'Arial Black', sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Main container - big tap targets */
    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 64px;
      padding: 24px 20px 40px;
      backdrop-filter: blur(2px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,215,130,0.2);
      border: 1px solid rgba(205, 127, 50, 0.4);
    }

    /* Header */
    h1 {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: 3.2rem;
      text-align: center;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #FDB72A 0%, #CD7F32 40%, #B87333 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      margin-bottom: 8px;
      word-break: keep-all;
    }

    /* Date/Time panel */
    .datetime {
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      font-size: 1.2rem;
      background: #2e241d;
      display: inline-block;
      width: 100%;
      padding: 12px;
      border-radius: 60px;
      margin: 15px 0 25px;
      color: #e7b874;
      border: 1px solid #c27e3a;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.5), 0 4px 8px rgba(0,0,0,0.2);
    }

    /* Card style for stats */
    .stat-card {
      background: #1f160e;
      border-radius: 48px;
      padding: 18px 20px;
      margin-bottom: 25px;
      border-left: 8px solid #cd7f32;
      box-shadow: 0 8px 12px rgba(0,0,0,0.3);
    }

    .stat-label {
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #c98f4b;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2.2rem;
      font-weight: 800;
      font-family: monospace;
      color: #ffcd94;
      text-shadow: 0 2px 3px black;
      letter-spacing: 1px;
    }

    /* Button row */
    .button-row {
      display: flex;
      gap: 18px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .copper-btn {
      flex: 1;
      background: radial-gradient(circle at 30% 10%, #e09d42, #a0522d);
      border: none;
      padding: 16px 10px;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: bold;
      font-family: 'Segoe UI', 'Roboto', 'Impact', sans-serif;
      color: #2a1808;
      text-shadow: 0 1px 0 #ffce8e;
      box-shadow: 0 5px 0 #5e2e14;
      transition: 0.07s linear;
      cursor: pointer;
      text-align: center;
      letter-spacing: 1px;
      min-width: 100px;
    }

    .copper-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #5e2e14;
    }

    /* Reset/nuke small button */
    .reset-area {
      margin-top: 15px;
      text-align: center;
    }
    .small-btn {
      background: #3a2a1c;
      border: 1px solid #b87333;
      padding: 10px 20px;
      border-radius: 50px;
      color: #cf9f5e;
      font-weight: bold;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .small-btn:active {
      background: #201608;
    }

    .total-banked {
      background: linear-gradient(115deg, #2c1d10, #1e130b);
      border: 2px solid #f0b45a;
    }

    .total-banked .stat-value {
      font-size: 2.6rem;
      color: #f7bc5a;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.7rem;
      color: #9b7a48;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>⚡ COPPER REALMS ⚡</h1>
  <div class="datetime">
    <span id="dateDisplay">--</span> &nbsp;|&nbsp; 
    <span id="timeDisplay">--:--:--</span>
  </div>

  <!-- Lbs Received -->
  <div class="stat-card">
    <div class="stat-label">📦 LBS RECEIVED (TODAY)</div>
    <div class="stat-value" id="receivedValue">0</div>
    <div class="button-row">
      <button class="copper-btn" id="addReceived50">+50 lbs</button>
      <button class="copper-btn" id="addReceived100">+100 lbs</button>
      <button class="copper-btn" id="resetReceivedBtn">↺ RESET</button>
    </div>
  </div>

  <!-- Lbs Refined -->
  <div class="stat-card">
    <div class="stat-label">⚙️ LBS REFINED (TODAY)</div>
    <div class="stat-value" id="refinedValue">0</div>
    <div class="button-row">
      <button class="copper-btn" id="addRefined50">+50 lbs</button>
      <button class="copper-btn" id="addRefined100">+100 lbs</button>
      <button class="copper-btn" id="resetRefinedBtn">↺ RESET</button>
    </div>
  </div>

  <!-- Total Copper Banked (persistent across days) -->
  <div class="stat-card total-banked">
    <div class="stat-label">🏦 TOTAL COPPER BANKED (ALL TIME)</div>
    <div class="stat-value" id="bankedValue">0</div>
    <div class="button-row">
      <button class="copper-btn" id="addToBankBtn" style="background: radial-gradient(#b87333, #7a3e1a);">➕ ADD TODAY'S REFINED TO BANK</button>
    </div>
    <div style="margin-top: 12px; font-size:0.8rem; color:#c27e4a;">*Tap to move today's refined lbs into permanent bank</div>
  </div>

  <!-- Quick actions -->
  <div class="reset-area">
    <button class="small-btn" id="resetDailyBtn">🔄 RESET TODAY'S RECEIVED & REFINED</button>
    <button class="small-btn" id="fullResetBtn" style="margin-left:10px;">⚠️ NUKE ALL DATA ⚠️</button>
  </div>
  <footer>copper realms • command center • auto-save</footer>
</div>

<script>
  // ---------- STORAGE KEYS ----------
  // For daily reset detection: we store last active date + per-day values + bank
  const STORAGE = {
    lastDate: "copper_lastDate",
    dailyReceived: "copper_dailyReceived",
    dailyRefined: "copper_dailyRefined",
    totalBanked: "copper_totalBanked",
  };

  // Helper: get today's date string YYYY-MM-DD
  function getTodayStr() {
    const d = new Date();
    return d.toISOString().split('T')[0];
  }

  // Load or initialize data, resetting daily values if a new day
  function loadData() {
    let lastDate = localStorage.getItem(STORAGE.lastDate);
    let today = getTodayStr();
    let dailyReceived = 0;
    let dailyRefined = 0;
    let totalBanked = parseFloat(localStorage.getItem(STORAGE.totalBanked)) || 0;

    if (lastDate === today) {
      // same day, load daily values as they were
      dailyReceived = parseFloat(localStorage.getItem(STORAGE.dailyReceived)) || 0;
      dailyRefined = parseFloat(localStorage.getItem(STORAGE.dailyRefined)) || 0;
    } else {
      // new day! we reset daily values but keep totalBanked
      // also we could decide to automatically add nothing — user manually adds refined to bank.
      dailyReceived = 0;
      dailyRefined = 0;
      // Save new date and clear daily counters
      localStorage.setItem(STORAGE.lastDate, today);
      localStorage.setItem(STORAGE.dailyReceived, 0);
      localStorage.setItem(STORAGE.dailyRefined, 0);
    }

    // ensure Lbs Refined cannot exceed Received? not necessary but can show integrity later
    return { dailyReceived, dailyRefined, totalBanked };
  }

  // Update UI, save to localStorage
  let state = loadData();

  function saveDaily() {
    localStorage.setItem(STORAGE.dailyReceived, state.dailyReceived);
    localStorage.setItem(STORAGE.dailyRefined, state.dailyRefined);
    localStorage.setItem(STORAGE.totalBanked, state.totalBanked);
    // Keep lastDate fresh (but we already set date once. still, ensure it matches today)
    localStorage.setItem(STORAGE.lastDate, getTodayStr());
  }

  function updateUI() {
    document.getElementById('receivedValue').innerText = Math.floor(state.dailyReceived);
    document.getElementById('refinedValue').innerText = Math.floor(state.dailyRefined);
    document.getElementById('bankedValue').innerText = Math.floor(state.totalBanked);
    // optional: if refined > received, visual warn? but not needed.
  }

  function addReceived(amount) {
    state.dailyReceived += amount;
    if (state.dailyReceived < 0) state.dailyReceived = 0;
    saveDaily();
    updateUI();
  }

  function addRefined(amount) {
    // can't refine more than received today? Keep realistic: but for flexibility, let's cap refined <= received
    let newRefined = state.dailyRefined + amount;
    if (newRefined <= state.dailyReceived) {
      state.dailyRefined = newRefined;
    } else {
      // if trying to refine beyond received, just set refined = received
      state.dailyRefined = state.dailyReceived;
      // subtle alert feel
      let toast = document.createElement('div');
      toast.innerText = "⚠️ Can't refine more than received today!";
      toast.style.position = 'fixed'; toast.style.bottom='20px'; toast.style.left='20px'; toast.style.right='20px';
      toast.style.backgroundColor='#a1301a'; toast.style.color='#ffbf87'; toast.style.padding='12px'; toast.style.borderRadius='40px';
      toast.style.textAlign='center'; toast.style.fontWeight='bold'; toast.style.zIndex='999';
      document.body.appendChild(toast);
      setTimeout(()=> toast.remove(), 1500);
    }
    if (state.dailyRefined < 0) state.dailyRefined = 0;
    saveDaily();
    updateUI();
  }

  function resetReceived() {
    state.dailyReceived = 0;
    // if refined > received now, refined should also reset to keep logic clean
    if (state.dailyRefined > state.dailyReceived) {
      state.dailyRefined = 0;
    }
    saveDaily();
    updateUI();
  }

  function resetRefined() {
    state.dailyRefined = 0;
    saveDaily();
    updateUI();
  }

  // Add today's refined amount to total banked
  function addRefinedToBank() {
    if (state.dailyRefined > 0) {
      state.totalBanked += state.dailyRefined;
      // After adding to bank, we set dailyRefined = 0 (since it's banked)
      state.dailyRefined = 0;
      // Received remains the same (already processed incoming material)
      saveDaily();
      updateUI();
      // subtle feedback
      let msg = document.createElement('div');
      msg.innerText = `✅ ${Math.floor(state.dailyRefined)} lbs banked! Well done.`;
      msg.style.position='fixed'; msg.style.bottom='70px'; msg.style.left='20px'; msg.style.right='20px';
      msg.style.backgroundColor='#2c6e2c'; msg.style.color='#f9e2a1'; msg.style.padding='12px'; msg.style.borderRadius='40px';
      msg.style.textAlign='center'; msg.style.fontWeight='bold';
      document.body.appendChild(msg);
      setTimeout(()=> msg.remove(), 1500);
      // actual value now refined = 0 after banking, but we have to re-show
    } else {
      let warn = document.createElement('div');
      warn.innerText = "No refined lbs to bank today!";
      warn.style.position='fixed'; warn.style.bottom='70px'; warn.style.left='20px'; warn.style.right='20px';
      warn.style.backgroundColor='#ad4c2c'; warn.style.color='#ffe2b5'; warn.style.padding='12px'; warn.style.borderRadius='40px';
      warn.style.textAlign='center';
      document.body.appendChild(warn);
      setTimeout(()=> warn.remove(), 1500);
    }
  }

  // Reset only daily (received & refined) but keep bank
  function resetDaily() {
    state.dailyReceived = 0;
    state.dailyRefined = 0;
    saveDaily();
    updateUI();
  }

  // Full nuclear reset
  function fullReset() {
    if (confirm("⚠️ NUKE ALL DATA? Total Banked will be erased. Proceed?")) {
      state.dailyReceived = 0;
      state.dailyRefined = 0;
      state.totalBanked = 0;
      localStorage.setItem(STORAGE.lastDate, getTodayStr());
      saveDaily();
      updateUI();
    }
  }

  // check for date change while app is open every minute
  function checkDateChange() {
    let storedDate = localStorage.getItem(STORAGE.lastDate);
    let today = getTodayStr();
    if (storedDate !== today) {
      // day changed while app is open -> reset daily values
      state.dailyReceived = 0;
      state.dailyRefined = 0;
      localStorage.setItem(STORAGE.lastDate, today);
      localStorage.setItem(STORAGE.dailyReceived, 0);
      localStorage.setItem(STORAGE.dailyRefined, 0);
      updateUI();
    }
  }

  // update date/time display
  function updateDateTime() {
    const now = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateDisplay').innerText = now.toLocaleDateString(undefined, options);
    document.getElementById('timeDisplay').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
  }

  // attach all listeners
  function bindEvents() {
    document.getElementById('addReceived50').addEventListener('click', () => addReceived(50));
    document.getElementById('addReceived100').addEventListener('click', () => addReceived(100));
    document.getElementById('resetReceivedBtn').addEventListener('click', resetReceived);
    document.getElementById('addRefined50').addEventListener('click', () => addRefined(50));
    document.getElementById('addRefined100').addEventListener('click', () => addRefined(100));
    document.getElementById('resetRefinedBtn').addEventListener('click', resetRefined);
    document.getElementById('addToBankBtn').addEventListener('click', addRefinedToBank);
    document.getElementById('resetDailyBtn').addEventListener('click', resetDaily);
    document.getElementById('fullResetBtn').addEventListener('click', fullReset);
  }

  // initial sync, updateUI and timer
  function init() {
    bindEvents();
    updateUI();
    updateDateTime();
    setInterval(() => {
      updateDateTime();
      checkDateChange();
    }, 1000);
    // add touch/click robustness
  }

  init();
</script>
</body>
</html>
